// ==== 犬 (図形ベース、体は回転しない) ====
function drawDog(e, custom) {
  const sc = wScale();
  const s = w2s(e.x, e.y);
  const spd = Math.hypot(e.vx, e.vy);
  const fa = e.heading; // 顔・しっぽの向きに使う (体は固定)
  const szMul = custom.size === 's' ? 0.82 : (custom.size === 'l' ? 1.18 : 1.0);
  const R = e.size * szMul;
  const r = R * sc;
  const body = custom.color;
  const shade = shadeColor(body, 0.65);

  ctx.save();
  ctx.translate(s.x, s.y);

  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(2*sc, 5*sc, r*0.82, r*0.33, 0, 0, Math.PI*2); ctx.fill();

  // 体 (向きに合わせた楕円)
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.ellipse(0, 0, r*0.82, r*0.62, fa, 0, Math.PI*2); ctx.fill();

  // 模様
  if (custom.pattern === 'spot') {
    ctx.fillStyle = shade;
    const spotPos = [[0.2, 0.1, 0.22], [-0.2, -0.2, 0.18], [-0.1, 0.3, 0.16]];
    spotPos.forEach(p => {
      const px = Math.cos(fa)*p[0]*r - Math.sin(fa)*p[1]*r;
      const py = Math.sin(fa)*p[0]*r + Math.cos(fa)*p[1]*r;
      ctx.beginPath(); ctx.ellipse(px, py, r*p[2], r*p[2]*0.8, fa, 0, Math.PI*2); ctx.fill();
    });
  } else if (custom.pattern === 'belt') {
    ctx.fillStyle = shade;
    ctx.save();
    ctx.rotate(fa);
    ctx.fillRect(-r*0.12, -r*0.62, r*0.24, r*1.24);
    ctx.restore();
  } else if (custom.pattern === 'stripe') {
    ctx.fillStyle = shade;
    ctx.save();
    ctx.rotate(fa);
    [-r*0.4, -r*0.15, r*0.1, r*0.35].forEach(x => {
      ctx.fillRect(x, -r*0.62, r*0.07, r*1.24);
    });
    ctx.restore();
  }

  // 頭
  const hx = Math.cos(fa)*r*0.88, hy = Math.sin(fa)*r*0.88;
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(hx, hy, r*0.56, 0, Math.PI*2); ctx.fill();

  // 耳
  const perp = fa + Math.PI/2;
  [-1, 1].forEach(side => {
    const ex = hx + Math.cos(perp)*side*r*0.42, ey = hy + Math.sin(perp)*side*r*0.42;
    ctx.fillStyle = shade;
    if (custom.ear === 'floppy') {
      ctx.beginPath();
      ctx.ellipse(ex + Math.cos(fa)*r*-0.05, ey + Math.sin(fa)*r*-0.05, r*0.3, r*0.42, fa, 0, Math.PI*2);
      ctx.fill();
    } else if (custom.ear === 'pointy') {
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(ex + Math.cos(perp)*side*r*0.25 + Math.cos(fa)*r*0.05, ey + Math.sin(perp)*side*r*0.25 + Math.sin(fa)*r*0.05);
      ctx.lineTo(ex + Math.cos(fa)*r*0.05, ey + Math.sin(fa)*r*0.05);
      ctx.closePath(); ctx.fill();
    } else {  // round
      ctx.beginPath();
      ctx.arc(ex + Math.cos(perp)*side*r*0.1, ey + Math.sin(perp)*side*r*0.1, r*0.22, 0, Math.PI*2);
      ctx.fill();
    }
  });

  // 鼻
  ctx.fillStyle = '#1a0808';
  ctx.beginPath(); ctx.arc(hx + Math.cos(fa)*r*0.43, hy + Math.sin(fa)*r*0.43, r*0.15, 0, Math.PI*2); ctx.fill();

  // 目 (ハイライト付き)
  [-1, 1].forEach(side => {
    const ex = hx + Math.cos(perp)*side*r*0.27 + Math.cos(fa)*r*0.16;
    const ey = hy + Math.sin(perp)*side*r*0.27 + Math.sin(fa)*r*0.16;
    ctx.fillStyle = '#100808';
    ctx.beginPath(); ctx.arc(ex, ey, r*0.13, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(ex + r*0.04, ey - r*0.04, r*0.05, 0, Math.PI*2); ctx.fill();
  });

  // しっぽ (速度で振り速度増加)
  const wagSpd = 6 + Math.min(10, spd * 0.04);
  const ta = fa + Math.PI + Math.sin(totalT * wagSpd) * 0.7;
  ctx.strokeStyle = body; ctx.lineWidth = 2.8*sc; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-Math.cos(fa)*r*0.65, -Math.sin(fa)*r*0.65);
  ctx.quadraticCurveTo(Math.cos(ta)*r, Math.sin(ta)*r, Math.cos(ta)*r*1.6, Math.sin(ta)*r*1.6);
  ctx.stroke();

  ctx.restore();
}

// ==== 背景・地形 ====
function drawGround() {
  // 草地タイル
  const pxW = PIXEL * wScale();
  const tileW = 48 * wScale();
  const startX = Math.floor((camX - VIEW_W/2) / 48) * 48;
  const endX = camX + VIEW_W/2 + 48;
  const startY = Math.floor((camY - CH/(CW/VIEW_W)/2) / 48) * 48;
  const endY = camY + CH/(CW/VIEW_W)/2 + 48;
  for (let wy = startY; wy < endY; wy += 48) {
    for (let wx = startX; wx < endX; wx += 48) {
      // チェッカー風に2色
      const checker = ((Math.floor(wx/48) + Math.floor(wy/48)) & 1);
      ctx.fillStyle = checker ? PALETTE.grass1 : PALETTE.grass2;
      const [sx, sy] = w2s(wx, wy);
      ctx.fillRect(Math.floor(sx), Math.floor(sy), Math.ceil(tileW)+1, Math.ceil(tileW)+1);
    }
  }
}

function drawForest() {
  const sc = wScale();
  // 暗い森の背景
  ctx.fillStyle = '#1e4010';
  ctx.fillRect(0, 0, CW, CH);
  // 牧草地ポリゴン
  ctx.fillStyle = '#4a8c38';
  ctx.beginPath();
  for (let i = 0; i <= FOREST_POINTS; i++) {
    const idx = i % FOREST_POINTS;
    const a = idx / FOREST_POINTS * Math.PI * 2;
    const r = FOREST_R[idx];
    const [sx, sy] = w2s(Math.cos(a)*r, Math.sin(a)*r);
    if (i === 0) ctx.moveTo(sx, sy);
    else ctx.lineTo(sx, sy);
  }
  ctx.closePath();
  ctx.fill();
  // 草テクスチャ (小さな四角)
  ctx.save();
  ctx.globalAlpha = 0.09;
  for (let gx = -50; gx < CW + 50; gx += 20) {
    for (let gy = -50; gy < CH + 50; gy += 20) {
      ctx.fillStyle = (gx + gy) % 40 === 0 ? '#3a7030' : '#528c3e';
      ctx.fillRect(gx, gy, 16, 16);
    }
  }
  ctx.restore();
  // 森のふちに木のシルエット (v0.8風)
  ctx.fillStyle = 'rgba(20, 50, 10, 0.55)';
  for (let i = 0; i < FOREST_POINTS; i += 2) {
    const a = i / FOREST_POINTS * Math.PI * 2;
    const r = FOREST_R[i];
    const x = Math.cos(a) * r, y = Math.sin(a) * r;
    if (!isVisible(x, y, 60)) continue;
    const [sx, sy] = w2s(x, y);
    const tr = (8 + Math.sin(i * 7.3) * 3) * sc;
    // 森の内側2列
    const x2 = Math.cos(a) * (r + 30), y2 = Math.sin(a) * (r + 30);
    const [s2x, s2y] = w2s(x2, y2);
    ctx.beginPath(); ctx.arc(s2x, s2y, tr, 0, Math.PI*2); ctx.fill();
    const x3 = Math.cos(a) * (r + 80), y3 = Math.sin(a) * (r + 80);
    const [s3x, s3y] = w2s(x3, y3);
    ctx.beginPath(); ctx.arc(s3x, s3y, tr * 1.2, 0, Math.PI*2); ctx.fill();
  }
}

function drawPonds() {
  const sc = wScale();
  PONDS.forEach(p => {
    if (!isVisible(p.x, p.y, p.r + 20)) return;
    const [sx, sy] = w2s(p.x, p.y);
    const r = p.r * sc;
    const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, r);
    g.addColorStop(0, '#62b2da'); g.addColorStop(1, '#2e70a8');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(sx, sy, r, r*0.7, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5;
    ctx.stroke();
    // 波紋
    ctx.strokeStyle = 'rgba(200,230,250,0.25)'; ctx.lineWidth = 1;
    const wave = (Math.sin(totalT*1.5) + 1) * 0.1 + 0.4;
    ctx.beginPath();
    ctx.ellipse(sx, sy, r*wave, r*0.7*wave, 0, 0, Math.PI*2);
    ctx.stroke();
  });
}

function drawTrees() {
  const sc = wScale();
  // y座標昇順にソート (下にある木ほど手前のレイヤー)
  const sorted = TREES.slice().sort((a, b) => a.y - b.y);
  sorted.forEach(t => {
    if (!isVisible(t.x, t.y, t.r + 20)) return;
    const [sx, sy] = w2s(t.x, t.y);
    const r = t.r * sc;
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(sx+3, sy+5, r, r*0.42, 0, 0, Math.PI*2);
    ctx.fill();
    // 幹
    ctx.fillStyle = '#7a5230';
    ctx.fillRect(sx - 2*sc, sy - 2*sc, 4*sc, t.r*sc + 4*sc);
    // 葉 (ラディアルグラデ)
    if (t.variant === 'tall') {
      const lg = ctx.createRadialGradient(sx-3, sy-6, 0, sx, sy, r);
      lg.addColorStop(0, '#a0d860'); lg.addColorStop(0.5, '#58a028'); lg.addColorStop(1, '#306018');
      ctx.fillStyle = lg;
      ctx.beginPath();
      ctx.ellipse(sx, sy - r*0.15, r*0.75, r, 0, 0, Math.PI*2);
      ctx.fill();
    } else {
      const lg = ctx.createRadialGradient(sx-3, sy-3, 0, sx, sy, r);
      lg.addColorStop(0, '#70c242'); lg.addColorStop(0.6, '#4a9028'); lg.addColorStop(1, '#2e5818');
      ctx.fillStyle = lg;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
    }
  });
}

function drawHuts() {
  const sc = wScale();
  // y順に手前→奥 (下に描く=手前)
  const sorted = HUTS.slice().sort((a, b) => a.y - b.y);
  sorted.forEach(h => {
    if (!isVisible(h.x, h.y, Math.max(h.w, h.h) + 20)) return;
    const [hx, hy] = w2s(h.x - h.w/2, h.y - h.h/2);
    const hw = h.w * sc, hh = h.h * sc;
    const hcsx = hx + hw/2, hcsy = hy + hh/2;
    const isHouse = h.style === 'house';
    // 方向 (0-3 を N/E/S/W に)
    const dirs = ['N', 'E', 'S', 'W'];
    const dir = dirs[Math.round((h.rot || 0) / (Math.PI/2)) % 4];
    // 影
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(hx+5, hy+5, hw, hh);
    // 屋根 (2色、棟で分割)
    if (dir === 'N' || dir === 'S') {
      ctx.fillStyle = isHouse ? '#b04040' : '#c8a870';
      ctx.fillRect(hx, hy, hw/2, hh);
      ctx.fillStyle = isHouse ? '#902828' : '#b89060';
      ctx.fillRect(hx + hw/2, hy, hw/2, hh);
    } else {
      ctx.fillStyle = isHouse ? '#b04040' : '#c8a870';
      ctx.fillRect(hx, hy, hw, hh/2);
      ctx.fillStyle = isHouse ? '#902828' : '#b89060';
      ctx.fillRect(hx, hy + hh/2, hw, hh/2);
    }
    // 外枠
    ctx.strokeStyle = isHouse ? '#501818' : '#6a4010';
    ctx.lineWidth = 2;
    ctx.strokeRect(hx, hy, hw, hh);
    // 棟 (屋根の中央線)
    ctx.strokeStyle = isHouse ? '#401010' : '#5a3008';
    ctx.lineWidth = 3; ctx.lineCap = 'round';
    if (dir === 'N' || dir === 'S') {
      ctx.beginPath(); ctx.moveTo(hcsx, hy+3); ctx.lineTo(hcsx, hy+hh-3); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(hx+3, hcsy); ctx.lineTo(hx+hw-3, hcsy); ctx.stroke();
    }
    // ドア
    ctx.fillStyle = isHouse ? '#3a2010' : '#4a2808';
    const dw = Math.min(hw, hh) * 0.28, dh = Math.min(hw, hh) * 0.2;
    if (dir === 'S') ctx.fillRect(hcsx - dw/2, hy + hh - dh, dw, dh);
    else if (dir === 'N') ctx.fillRect(hcsx - dw/2, hy, dw, dh);
    else if (dir === 'E') ctx.fillRect(hx + hw - dh, hcsy - dw/2, dh, dw);
    else ctx.fillRect(hx, hcsy - dw/2, dh, dw);
    // 民家なら煙突
    if (isHouse) {
      ctx.fillStyle = '#3a2818';
      ctx.fillRect(hcsx - 3*sc, hcsy - 3*sc, 6*sc, 6*sc);
    }
  });
}

function drawPens() {
  PENS.forEach(pen => {
    if (!isVisible(pen.cx, pen.cy, pen.size + 40)) return;
    // 内側の地面 (ダート色)
    const [cx, cy] = w2s(pen.cx, pen.cy);
    const ps = pen.size * wScale();
    ctx.fillStyle = PALETTE.pen;
    ctx.fillRect(cx - ps, cy - ps, ps*2, ps*2);
    // ドット風の地面模様
    ctx.fillStyle = PALETTE.dirt2;
    const pxW = 6 * wScale();
    for (let dx = -ps; dx < ps; dx += pxW*3) {
      for (let dy = -ps; dy < ps; dy += pxW*3) {
        if ((Math.floor(dx + dy) % 5) === 0) {
          ctx.fillRect(cx + dx, cy + dy, pxW, pxW);
        }
      }
    }

    // 柵 (pixel-style: wooden posts + rails)
    const walls = penWalls(pen);
    walls.forEach(w => drawFenceSegment(w.x1, w.y1, w.x2, w.y2));

    // 中央の看板 (ポール + 木の板 + ドット絵動物)
    drawPenSign(pen);
  });
}

function drawPenSign(pen) {
  const [cx, cy] = w2s(pen.cx, pen.cy);
  const ws = wScale();
  const signW = 56 * ws, signH = 44 * ws;
  const poleW = 4 * ws, poleH = 22 * ws;
  // ポール
  ctx.fillStyle = PALETTE.penPost;
  ctx.fillRect(cx - poleW/2, cy, poleW, poleH);
  // 看板本体
  const boardC = {
    sheep:'#d8b060', goose:'#60a0c8',
    chicken:'#e0a840', cow:'#a89080', pig:'#d898a0',
  }[pen.penType] || '#d0c060';
  ctx.fillStyle = boardC;
  roundRect(ctx, cx - signW/2, cy - signH - 4*ws, signW, signH, 6*ws);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1.5;
  ctx.stroke();
  // ミニ動物 (図形で簡易に描画)
  const mx = cx, my = cy - signH/2 - 4*ws;
  const mr = 14 * ws;
  ctx.save();
  ctx.translate(mx, my);
  drawPenSignAnimal(pen.penType, mr, ws);
  ctx.restore();
}

function drawPenSignAnimal(penType, r, sc) {
  const ang = -Math.PI/2;  // 上向き
  if (penType === 'sheep') {
    const st = ANIMAL_STYLE.white_sheep;
    ctx.fillStyle = st.wool;
    ctx.beginPath(); ctx.ellipse(0, 0, r, r*0.8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    for (let i = 0; i < 4; i++) {
      const pa = (i/4)*Math.PI*2;
      ctx.beginPath();
      ctx.arc(Math.cos(pa)*r*0.45, Math.sin(pa)*r*0.45, r*0.26, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle = st.face;
    ctx.beginPath();
    ctx.ellipse(0, -r*0.6, r*0.42, r*0.38, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#1a0a06';
    ctx.beginPath(); ctx.arc(-r*0.15, -r*0.65, r*0.08, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(r*0.15, -r*0.65, r*0.08, 0, Math.PI*2); ctx.fill();
  } else if (penType === 'goose') {
    const st = ANIMAL_STYLE.goose;
    ctx.fillStyle = st.body;
    ctx.beginPath(); ctx.ellipse(0, r*0.2, r*0.9, r*0.62, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = st.body; ctx.lineWidth = r*0.4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -r*0.8); ctx.stroke();
    ctx.fillStyle = st.body;
    ctx.beginPath(); ctx.arc(0, -r*0.8, r*0.32, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e0a020';
    ctx.beginPath();
    ctx.moveTo(0, -r*1.1); ctx.lineTo(r*0.2, -r*0.75); ctx.lineTo(-r*0.2, -r*0.75);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#1a0a06';
    ctx.beginPath(); ctx.arc(0, -r*0.82, r*0.06, 0, Math.PI*2); ctx.fill();
  } else if (penType === 'chicken') {
    const st = ANIMAL_STYLE.chicken;
    ctx.fillStyle = st.body;
    ctx.beginPath(); ctx.ellipse(0, r*0.15, r*0.85, r*0.65, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = st.body;
    ctx.beginPath(); ctx.arc(0, -r*0.5, r*0.42, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = st.comb;
    ctx.beginPath(); ctx.arc(0, -r*0.8, r*0.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = st.beak;
    ctx.beginPath();
    ctx.moveTo(0, -r*0.3); ctx.lineTo(r*0.2, -r*0.1); ctx.lineTo(-r*0.2, -r*0.1);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#1a0808';
    ctx.beginPath(); ctx.arc(-r*0.12, -r*0.55, r*0.06, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(r*0.12, -r*0.55, r*0.06, 0, Math.PI*2); ctx.fill();
  } else if (penType === 'cow') {
    const st = ANIMAL_STYLE.cow;
    ctx.fillStyle = st.body;
    ctx.beginPath(); ctx.ellipse(0, r*0.2, r, r*0.7, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = st.patch;
    ctx.beginPath(); ctx.ellipse(-r*0.3, r*0.1, r*0.28, r*0.22, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(r*0.35, r*0.35, r*0.22, r*0.2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = st.body;
    ctx.beginPath(); ctx.arc(0, -r*0.5, r*0.45, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = st.nose;
    ctx.beginPath(); ctx.ellipse(0, -r*0.3, r*0.26, r*0.2, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = st.horn; ctx.lineWidth = r*0.08; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-r*0.3, -r*0.75); ctx.lineTo(-r*0.45, -r*0.9); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r*0.3, -r*0.75); ctx.lineTo(r*0.45, -r*0.9); ctx.stroke();
    ctx.fillStyle = '#1a0a06';
    ctx.beginPath(); ctx.arc(-r*0.15, -r*0.5, r*0.06, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(r*0.15, -r*0.5, r*0.06, 0, Math.PI*2); ctx.fill();
  } else if (penType === 'pig') {
    const st = ANIMAL_STYLE.pig;
    ctx.fillStyle = st.body;
    ctx.beginPath(); ctx.ellipse(0, r*0.2, r*0.9, r*0.72, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = st.body;
    ctx.beginPath(); ctx.arc(0, -r*0.5, r*0.45, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = st.nose;
    ctx.beginPath();
    ctx.ellipse(0, -r*0.3, r*0.26, r*0.22, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#3a1818';
    ctx.beginPath(); ctx.arc(-r*0.08, -r*0.28, r*0.04, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(r*0.08, -r*0.28, r*0.04, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = st.dark;
    ctx.beginPath();
    ctx.moveTo(-r*0.35, -r*0.7); ctx.lineTo(-r*0.55, -r*0.55); ctx.lineTo(-r*0.25, -r*0.5);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(r*0.35, -r*0.7); ctx.lineTo(r*0.55, -r*0.55); ctx.lineTo(r*0.25, -r*0.5);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#1a0a06';
    ctx.beginPath(); ctx.arc(-r*0.15, -r*0.55, r*0.06, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(r*0.15, -r*0.55, r*0.06, 0, Math.PI*2); ctx.fill();
  }
}

function drawFenceSegment(x1, y1, x2, y2) {
  const [s1x, s1y] = w2s(x1, y1);
  const [s2x, s2y] = w2s(x2, y2);
  const dx = s2x - s1x, dy = s2y - s1y;
  const len = Math.hypot(dx, dy);
  const postSpacing = 22 * wScale();
  const nPosts = Math.max(2, Math.ceil(len / postSpacing));
  // レール (2本)
  ctx.strokeStyle = PALETTE.penWood;
  ctx.lineWidth = Math.max(2, 4 * wScale());
  ctx.lineCap = 'butt';
  const nx = -dy/len, ny = dx/len;
  for (const off of [-5, 5]) {
    ctx.beginPath();
    ctx.moveTo(s1x + nx*off*wScale(), s1y + ny*off*wScale());
    ctx.lineTo(s2x + nx*off*wScale(), s2y + ny*off*wScale());
    ctx.stroke();
  }
  // ポスト
  ctx.fillStyle = PALETTE.penPost;
  for (let i = 0; i <= nPosts; i++) {
    const t = i / nPosts;
    const px = s1x + dx*t, py = s1y + dy*t;
    const w = Math.max(3, 5*wScale());
    ctx.fillRect(px - w/2, py - w*1.6, w, w*3);
  }
}

function drawFarmer() {
  if (!FARMER) return;
  if (!isVisible(FARMER.x, FARMER.y, 40)) return;
  const sc = wScale();
  const [sx, sy] = w2s(FARMER.x, FARMER.y);
  const r = 16 * sc;
  ctx.save();
  ctx.translate(sx, sy);
  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(3*sc, 5*sc, r*0.7, r*0.28, 0, 0, Math.PI*2); ctx.fill();
  // 足
  ctx.fillStyle = '#4a3020';
  ctx.fillRect(-r*0.35, r*0.3, r*0.3, r*0.55);
  ctx.fillRect(r*0.05, r*0.3, r*0.3, r*0.55);
  // 胴
  ctx.fillStyle = '#3060a0';
  ctx.beginPath(); ctx.ellipse(0, r*0.1, r*0.45, r*0.55, 0, 0, Math.PI*2); ctx.fill();
  // 腕
  ctx.strokeStyle = '#3060a0'; ctx.lineWidth = r*0.28; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-r*0.45, 0); ctx.lineTo(-r*0.7, r*0.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r*0.45, 0); ctx.lineTo(r*0.75, r*0.35); ctx.stroke();
  // 首
  ctx.fillStyle = '#d8a878';
  ctx.beginPath(); ctx.ellipse(0, -r*0.45, r*0.18, r*0.22, 0, 0, Math.PI*2); ctx.fill();
  // 頭
  ctx.beginPath(); ctx.arc(0, -r*0.82, r*0.38, 0, Math.PI*2); ctx.fill();
  // 帽子 (麦わら)
  ctx.fillStyle = '#c89050';
  ctx.beginPath(); ctx.ellipse(0, -r*1.08, r*0.55, r*0.14, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#a87038';
  ctx.fillRect(-r*0.28, -r*1.5, r*0.56, r*0.45);
  // 目
  ctx.fillStyle = '#1a1008';
  ctx.beginPath(); ctx.arc(-r*0.12, -r*0.82, r*0.06, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(r*0.12, -r*0.82, r*0.06, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // 警告リング
  if (farmerNearBarks > 0 && farmerNearBarks < 3) {
    const rRing = FARMER_BARK_RANGE * sc;
    ctx.strokeStyle = `rgba(216, 96, 72, ${0.4 + Math.sin(totalT*3)*0.3})`;
    ctx.lineWidth = 3;
    ctx.setLineDash([10, 8]);
    ctx.beginPath(); ctx.arc(sx, sy, rRing, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(216, 96, 72, 0.9)';
    const msg = `あと ${3 - farmerNearBarks} 回`;
    ctx.font = `bold ${Math.round(14*sc)}px sans-serif`;
    ctx.textAlign = 'center';
    const w = ctx.measureText(msg).width + 16;
    ctx.fillRect(sx - w/2, sy - 58*sc, w, 20*sc);
    ctx.fillStyle = 'white';
    ctx.fillText(msg, sx, sy - 44*sc);
  }
}

function drawBarks() {
  barks.forEach(b => {
    const [sx, sy] = w2s(b.x, b.y);
    const r = b.r * wScale();
    ctx.strokeStyle = `rgba(255, 232, 128, ${b.life})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = `rgba(255, 232, 128, ${b.life*0.5})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(sx, sy, r*0.6, 0, Math.PI*2); ctx.stroke();
  });
}

function drawOffscreenMarkers() {
  if (!dog) return;
  const cx = CW/2, cy = CH/2;
  const margin = 44;
  function marker(tx, ty, color, label, bgColor) {
    const [sx, sy] = w2s(tx, ty);
    if (sx > margin && sx < CW-margin && sy > margin && sy < CH-margin) return;
    const dx = sx - cx, dy = sy - cy;
    const a = Math.atan2(dy, dx);
    const mx = cx + Math.cos(a) * Math.min((CW/2-margin)/Math.abs(Math.cos(a)||0.001), (CH/2-margin)/Math.abs(Math.sin(a)||0.001));
    const my = cy + Math.sin(a) * Math.min((CW/2-margin)/Math.abs(Math.cos(a)||0.001), (CH/2-margin)/Math.abs(Math.sin(a)||0.001));
    // 矢印
    ctx.save();
    ctx.translate(mx, my);
    ctx.rotate(a);
    ctx.fillStyle = color;
    ctx.strokeStyle = 'rgba(20,40,20,0.85)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(14, 0); ctx.lineTo(-9, -9); ctx.lineTo(-5, 0); ctx.lineTo(-9, 9);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
    if (label) {
      // 緑系の背景 (木の看板風)
      const boxW = 28, boxH = 16;
      ctx.fillStyle = bgColor || 'rgba(74, 128, 56, 0.92)';  // 草色
      ctx.fillRect(mx-boxW/2, my+12, boxW, boxH);
      ctx.strokeStyle = 'rgba(30,60,20,0.9)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(mx-boxW/2, my+12, boxW, boxH);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, mx, my + 12 + boxH/2);
    }
  }
  PENS.forEach(p => {
    const emoji = p.penType==='sheep'?'🐑':p.penType==='goose'?'🪿':p.penType==='chicken'?'🐔':p.penType==='cow'?'🐄':p.penType==='pig'?'🐖':'?';
    marker(p.cx, p.cy, '#ffe680', emoji, 'rgba(74, 128, 56, 0.92)');
  });
  if (FARMER) marker(FARMER.x, FARMER.y, '#ffb088', '👨‍🌾', 'rgba(120, 80, 48, 0.92)');
  ENTITIES.forEach(e => { if (e.type === 'wolf') marker(e.x, e.y, '#ff8080', '🐺', 'rgba(120, 48, 48, 0.92)'); });
}

function drawAll() {
  if (!dog) return;
  // カメラ追従
  camX += (dog.x - camX) * 0.15;
  camY += (dog.y - camY) * 0.15;

  ctx.clearRect(0, 0, CW, CH);

  // === レイヤー順 (下→上) ===
  // 1. 森 (背景の暗い部分 + 牧草地ポリゴン)
  drawForest();
  // 2. 池 (一番下の地面の上)
  drawPonds();
  // 3. 柵 (動物の下)
  drawPens();

  // 4. 動物 (y順)
  const animals = ENTITIES.filter(e => e.type !== 'dog' && e.type !== 'tractor' && e.type !== 'truck');
  animals.sort((a, b) => a.y - b.y);
  animals.forEach(e => {
    if (!isVisible(e.x, e.y, 60)) return;
    drawAnimal(e);
  });

  // 5. 犬 (動物より上)
  if (isVisible(dog.x, dog.y, 60)) drawDog(dog, DOG_CUSTOM);

  // 6. 木・建物・車両 (動物より上、y順)
  const overhead = [];
  TREES.forEach(t => {
    if (isVisible(t.x, t.y, t.r + 20)) overhead.push({kind:'tree', y:t.y, obj:t});
  });
  HUTS.forEach(h => {
    if (isVisible(h.x, h.y, Math.max(h.w, h.h) + 20)) overhead.push({kind:'hut', y:h.y, obj:h});
  });
  ENTITIES.forEach(e => {
    if (e.type === 'tractor' || e.type === 'truck') {
      if (isVisible(e.x, e.y, 60)) overhead.push({kind:'vehicle', y:e.y, obj:e});
    }
  });
  overhead.sort((a, b) => a.y - b.y);
  overhead.forEach(item => {
    if (item.kind === 'tree') drawOneTree(item.obj);
    else if (item.kind === 'hut') drawOneHut(item.obj);
    else if (item.kind === 'vehicle') {
      if (item.obj.type === 'tractor') drawTractor(item.obj);
      else drawTruck(item.obj);
    }
  });

  // 7. 牧場主 (建物より上)
  drawFarmer();

  // 8. 吠え+オーバーレイ
  drawBarks();
  drawOffscreenMarkers();
}

// 個別描画関数 (drawTrees/drawHuts から呼ぶ)
function drawOneTree(t) {
  const sc = wScale();
  const [sx, sy] = w2s(t.x, t.y);
  const r = t.r * sc;
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(sx+3, sy+5, r, r*0.42, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#7a5230';
  ctx.fillRect(sx - 2*sc, sy - 2*sc, 4*sc, t.r*sc + 4*sc);
  if (t.variant === 'tall') {
    const lg = ctx.createRadialGradient(sx-3, sy-6, 0, sx, sy, r);
    lg.addColorStop(0, '#a0d860'); lg.addColorStop(0.5, '#58a028'); lg.addColorStop(1, '#306018');
    ctx.fillStyle = lg;
    ctx.beginPath(); ctx.ellipse(sx, sy - r*0.15, r*0.75, r, 0, 0, Math.PI*2); ctx.fill();
  } else {
    const lg = ctx.createRadialGradient(sx-3, sy-3, 0, sx, sy, r);
    lg.addColorStop(0, '#70c242'); lg.addColorStop(0.6, '#4a9028'); lg.addColorStop(1, '#2e5818');
    ctx.fillStyle = lg;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
  }
}

function drawOneHut(h) {
  const sc = wScale();
  const [hx, hy] = w2s(h.x - h.w/2, h.y - h.h/2);
  const hw = h.w * sc, hh = h.h * sc;
  const hcsx = hx + hw/2, hcsy = hy + hh/2;
  const isHouse = h.style === 'house';
  const dirs = ['N', 'E', 'S', 'W'];
  const dir = dirs[Math.round((h.rot || 0) / (Math.PI/2)) % 4];
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(hx+5, hy+5, hw, hh);
  if (dir === 'N' || dir === 'S') {
    ctx.fillStyle = isHouse ? '#b04040' : '#c8a870';
    ctx.fillRect(hx, hy, hw/2, hh);
    ctx.fillStyle = isHouse ? '#902828' : '#b89060';
    ctx.fillRect(hx + hw/2, hy, hw/2, hh);
  } else {
    ctx.fillStyle = isHouse ? '#b04040' : '#c8a870';
    ctx.fillRect(hx, hy, hw, hh/2);
    ctx.fillStyle = isHouse ? '#902828' : '#b89060';
    ctx.fillRect(hx, hy + hh/2, hw, hh/2);
  }
  ctx.strokeStyle = isHouse ? '#501818' : '#6a4010';
  ctx.lineWidth = 2;
  ctx.strokeRect(hx, hy, hw, hh);
  ctx.strokeStyle = isHouse ? '#401010' : '#5a3008';
  ctx.lineWidth = 3; ctx.lineCap = 'round';
  if (dir === 'N' || dir === 'S') {
    ctx.beginPath(); ctx.moveTo(hcsx, hy+3); ctx.lineTo(hcsx, hy+hh-3); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(hx+3, hcsy); ctx.lineTo(hx+hw-3, hcsy); ctx.stroke();
  }
  ctx.fillStyle = isHouse ? '#3a2010' : '#4a2808';
  const dw = Math.min(hw, hh) * 0.28, dh = Math.min(hw, hh) * 0.2;
  if (dir === 'S') ctx.fillRect(hcsx - dw/2, hy + hh - dh, dw, dh);
  else if (dir === 'N') ctx.fillRect(hcsx - dw/2, hy, dw, dh);
  else if (dir === 'E') ctx.fillRect(hx + hw - dh, hcsy - dw/2, dh, dw);
  else ctx.fillRect(hx, hcsy - dw/2, dh, dw);
  if (isHouse) {
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(hcsx - 3*sc, hcsy - 3*sc, 6*sc, 6*sc);
  }
}

// ============================================================
// INPUT
// ============================================================
function getInputVector() {
  let ix = 0, iy = 0;
  if (joyActive) {
    ix = joyX; iy = joyY;
  } else {
    if (keys['w'] || keys['arrowup']) iy -= 1;
    if (keys['s'] || keys['arrowdown']) iy += 1;
    if (keys['a'] || keys['arrowleft']) ix -= 1;
    if (keys['d'] || keys['arrowright']) ix += 1;
    const m = Math.hypot(ix, iy);
    if (m > 1) { ix /= m; iy /= m; }
  }
  return [ix, iy];
}

function setupInput() {
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    keys[k] = true;
    if ((k === ' ' || k === 'b') && currentScene === 'game') {
      doBark();
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
  });

  // ジョイスティック (固定位置)
  const zone = document.getElementById('joystick');
  const knob = document.getElementById('joystick-knob');
  const maxD = 40;
  let touchId = null;
  let centerX = 0, centerY = 0;

  function resetKnob() {
    knob.style.transform = '';
    joyX = joyY = 0;
    joyActive = false;
    zone.classList.remove('active');
    touchId = null;
  }

  function handleStart(e, clientX, clientY) {
    const r = zone.getBoundingClientRect();
    centerX = r.left + r.width/2;
    centerY = r.top + r.height/2;
    joyActive = true;
    zone.classList.add('active');
    updateKnob(clientX, clientY);
  }

  function updateKnob(clientX, clientY) {
    const dx = clientX - centerX;
    const dy = clientY - centerY;
    const d = Math.hypot(dx, dy);
    const a = Math.atan2(dy, dx);
    const clamped = Math.min(d, maxD);
    const kx = Math.cos(a) * clamped, ky = Math.sin(a) * clamped;
    knob.style.transform = `translate(${kx}px, ${ky}px)`;
    joyX = Math.cos(a) * (clamped / maxD);
    joyY = Math.sin(a) * (clamped / maxD);
  }

  zone.addEventListener('touchstart', e => {
    const t = e.changedTouches[0];
    touchId = t.identifier;
    handleStart(e, t.clientX, t.clientY);
    e.preventDefault();
  }, { passive: false });
  zone.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === touchId) {
        updateKnob(t.clientX, t.clientY);
        break;
      }
    }
    e.preventDefault();
  }, { passive: false });
  zone.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === touchId) { resetKnob(); break; }
    }
  });
  zone.addEventListener('touchcancel', resetKnob);
  // マウスでもジョイスティック操作できるように (デバッグ用)
  zone.addEventListener('mousedown', e => {
    handleStart(e, e.clientX, e.clientY);
    const mv = ev => updateKnob(ev.clientX, ev.clientY);
    const up = () => {
      resetKnob();
      window.removeEventListener('mousemove', mv);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', mv);
    window.addEventListener('mouseup', up);
    e.preventDefault();
  });

  // 吠えボタン
  const barkBtn = document.getElementById('bark-btn');
  const bark = (e) => { e.preventDefault(); doBark(); };
  barkBtn.addEventListener('click', bark);
  barkBtn.addEventListener('touchstart', bark, { passive: false });
}

// ============================================================
// MAIN LOOP
// ============================================================
function loop(ts) {
  if (!lastTs) lastTs = ts;
  let dt = (ts - lastTs) / 1000;
  if (dt > 0.1) dt = 0.1;
  lastTs = ts;
  totalT += dt;

  // 吠え関係の更新
  if (barkCooldown > 0) barkCooldown = Math.max(0, barkCooldown - dt);
  barkEffect = Math.min(1.0, barkEffect + dt * 0.2);
  barks.forEach(b => { b.life -= dt * 1.6; b.r += dt * 380; });
  barks = barks.filter(b => b.life > 0);

  if (currentScene === 'game' && dog) {
    const [ix, iy] = getInputVector();
    updateDog(dt, ix, iy);
    ENTITIES = ENTITIES.filter(e => !e._remove);
    for (const e of ENTITIES) {
      if (e.type === 'dog') continue;
      updateEntity(e, dt);
    }
    // 狼スポーン
    if (LEVEL_SPEC && totalT >= GAME.nextWolfSpawn) {
      const active = ENTITIES.filter(e => e.type === 'wolf').length;
      if (active < LEVEL_SPEC.wolfMaxConcurrent) spawnWolf();
      GAME.nextWolfSpawn = totalT + LEVEL_SPEC.wolfInterval * (0.7 + Math.random()*0.6);
    }
    updateHUD();
    drawAll();
  }

  // 待機画面: プレビュー更新
  if (currentScene === 'waiting') {
    drawDogPreview();
  }

  requestAnimationFrame(loop);
}

function updateWaitingUI() {

}

// プレビュー描画 (DOM canvas に drawDog と同じロジックで)
function drawDogPreview() {
  const cvs = document.getElementById('dog-preview-canvas');
  const pctx = cvs.getContext('2d');
  pctx.imageSmoothingEnabled = false;
  // 背景
  pctx.fillStyle = '#2a4a28';
  pctx.fillRect(0, 0, cvs.width, cvs.height);
  // 芝テクスチャ
  pctx.fillStyle = '#3a5a38';
  for (let y = 0; y < cvs.height; y += 8) {
    for (let x = 0; x < cvs.width; x += 8) {
      if (((x/8 + y/8) & 1) === 0) pctx.fillRect(x, y, 8, 8);
    }
  }

  // 犬を描画 (カスタムを反映)
  const custom = DOG_CUSTOM;
  const sc = (custom.size === 's' ? 0.75 : custom.size === 'l' ? 1.3 : 1.0);
  const pal = {
    B: custom.color, S: shadeColor(custom.color, 0.65),
    K: '#1a0a0a', W: '#f8f4e8', t: '#f8a0a0',
  };
  const sprite = makeDogSprite(custom);
  const h = sprite.length, w = sprite[0].length;
  const pxSize = 8 * sc;  // プレビューでの1ピクセルサイズ
  const cx = cvs.width / 2 - w/2 * pxSize;
  const cy = cvs.height / 2 - h/2 * pxSize;
  // 影
  pctx.fillStyle = 'rgba(0,0,0,0.3)';
  pctx.beginPath();
  pctx.ellipse(cvs.width/2, cvs.height/2 + h/2*pxSize + 4, w/2*pxSize*0.7, 5, 0, 0, Math.PI*2);
  pctx.fill();
  // スプライト
  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      const ch = sprite[r][c];
      if (ch === '.' || !pal[ch]) continue;
      pctx.fillStyle = pal[ch];
      pctx.fillRect(Math.floor(cx + c*pxSize), Math.floor(cy + r*pxSize),
                    Math.ceil(pxSize), Math.ceil(pxSize));
    }
  }
}

// ============================================================
// SCENE SETUP: DEBUG
// ============================================================
const DBG_LABELS = {
  white_sheep:'白羊', black_sheep:'黒羊', bh_sheep:'頭黒羊',
  goose:'ガチョウ', chicken:'鶏', cow:'牛', pig:'豚',
  wolf:'狼', dog:'犬', tractor:'トラクター', truck:'トラック',
  farmer:'牧場主', sheep:'羊群',
};
let currentDbgTab = 'white_sheep';

function openDebug() {
  renderDbgTabs();
  renderDbgBody(currentDbgTab);
  showScene('debug');
}

function renderDbgTabs() {
  const tabs = document.getElementById('debug-tabs');
  tabs.innerHTML = '';
  Object.keys(PARAMS).forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'dbg-tab' + (k === currentDbgTab ? ' active' : '');
    btn.textContent = DBG_LABELS[k] || k;
    btn.addEventListener('click', () => {
      currentDbgTab = k;
      renderDbgTabs();
      renderDbgBody(k);
    });
    tabs.appendChild(btn);
  });
}

function renderDbgBody(t) {
  const p = PARAMS[t];
  const body = document.getElementById('debug-body');
  body.innerHTML = '';

  // 基本パラメータ
  const basic = document.createElement('div');
  basic.className = 'dbg-section';
  basic.innerHTML = `<h3>${DBG_LABELS[t]} — 基本パラメータ</h3>`;
  const btbl = mkTable(['項目','min','max']);
  ['maxSpeed','maxForce','inertia','size','turnRate','wander','wanderTurn','goalAttract','goalR','waterSlow','baseSpeed'].forEach(k => {
    if (p[k] === undefined) return;
    const row = btbl.insertRow();
    row.insertCell().textContent = k;
    if (Array.isArray(p[k])) {
      addInput(row, p[k], 0, v => p[k][0] = v);
      addInput(row, p[k], 1, v => p[k][1] = v);
    } else {
      addInput(row, [p[k]], 0, v => p[k] = v);
      row.insertCell().textContent = '-';
    }
  });
  basic.appendChild(btbl);
  body.appendChild(basic);

  // 他移動体への反応
  if (p.react) {
    const rs = document.createElement('div');
    rs.className = 'dbg-section';
    rs.innerHTML = `<h3>他の移動体への反応</h3>
      <div class="dbg-note">
        apS/apR: 相対速度 (接近) への反応 [強度, 範囲]<br>
        prS/prR: 距離への反応 [強度, 範囲] (負=引力)<br>
        flock/flockR: 群れ引力 | sep/sepR: 個体分離
      </div>`;
    Object.entries(p.react).forEach(([grp, rc]) => {
      const sub = document.createElement('div');
      sub.className = 'dbg-react-group';
      sub.innerHTML = `<h4>→ ${DBG_LABELS[grp] || grp}</h4>`;
      const tbl = mkTable(['項目','min','max']);
      ['apS','apR','prS','prR','flock','flockR','sep','sepR'].forEach(k => {
        if (rc[k] === undefined) return;
        const row = tbl.insertRow();
        row.insertCell().textContent = k;
        if (Array.isArray(rc[k])) {
          addInput(row, rc[k], 0, v => rc[k][0] = v);
          addInput(row, rc[k], 1, v => rc[k][1] = v);
        } else {
          addInput(row, [rc[k]], 0, v => rc[k] = v);
          row.insertCell().textContent = '-';
        }
      });
      sub.appendChild(tbl);
      rs.appendChild(sub);
    });
    body.appendChild(rs);
  }

  // 環境への反応
  const env = document.createElement('div');
  env.className = 'dbg-section';
  env.innerHTML = `<h3>環境への反応</h3>`;
  const etbl = mkTable(['項目','min','max']);
  ['tree','hut','fence','pond','forest'].forEach(k => {
    if (!p[k]) return;
    ['str','range'].forEach(key => {
      const v = p[k][key];
      if (!v) return;
      const row = etbl.insertRow();
      row.insertCell().textContent = `${k}.${key}`;
      if (Array.isArray(v)) {
        addInput(row, v, 0, x => v[0] = x);
        addInput(row, v, 1, x => v[1] = x);
      }
    });
  });
  env.appendChild(etbl);
  body.appendChild(env);
}

function mkTable(headers) {
  const t = document.createElement('table');
  t.className = 'dbg-table';
  const hr = t.insertRow();
  headers.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    hr.appendChild(th);
  });
  return t;
}

function addInput(row, arr, idx, onChange) {
  const td = row.insertCell();
  const inp = document.createElement('input');
  inp.type = 'number';
  inp.step = '0.01';
  inp.value = arr[idx];
  inp.addEventListener('change', () => {
    const v = parseFloat(inp.value);
    if (!isNaN(v)) onChange(v);
  });
  td.appendChild(inp);
}

function setupDebug() {
  document.getElementById('dbg-close').addEventListener('click', () => {
    showScene(GAME._returnScene || 'menu');
  });
  document.getElementById('dbg-load-default').addEventListener('click', () => {
    if (!confirm('初期値に戻しますか？')) return;
    Object.keys(PARAMS).forEach(k => delete PARAMS[k]);
    Object.assign(PARAMS, JSON.parse(JSON.stringify(DEFAULT_PARAMS)));
    resolveParams(PARAMS);
    renderDbgBody(currentDbgTab);
  });
  document.getElementById('dbg-save-json').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(PARAMS, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'dogdoggo_params.json';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 500);
  });
  document.getElementById('dbg-load-json').addEventListener('click', () => {
    document.getElementById('dbg-load-file').click();
  });
  document.getElementById('dbg-load-file').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        Object.keys(PARAMS).forEach(k => delete PARAMS[k]);
        Object.assign(PARAMS, obj);
        resolveParams(PARAMS);
        renderDbgBody(currentDbgTab);
        alert('読込完了');
      } catch (err) {
        alert('JSONの解析に失敗: ' + err.message);
      }
    };
    reader.readAsText(f);
    e.target.value = '';
  });
}

  resize();

  setupWaiting();
  setupResult();
  setupDebug();
  setupInput();
