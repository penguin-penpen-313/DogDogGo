<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>DogDogGo - 牧羊犬ゲーム</title>
<style>
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --bg: #0a1a0f;
  --bg2: #152515;
  --card: #18281a;
  --card2: #1f331e;
  --border: #3a5528;
  --border-bright: #5a7838;
  --text: #d8e8c0;
  --text-dim: #8aa078;
  --text-faint: #5a7048;
  --green: #a8d868;
  --green-bright: #c8e880;
  --yellow: #ffd060;
  --red: #d86048;
  --blue: #6aa8d8;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.mono { font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace; }

.scene {
  position: fixed; inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  padding: calc(var(--safe-top) + 16px) calc(var(--safe-right) + 16px)
           calc(var(--safe-bottom) + 16px) calc(var(--safe-left) + 16px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.scene.active { display: flex; }

h1 {
  margin: 8px 0 4px;
  font-size: clamp(28px, 8vw, 42px);
  font-weight: 800;
  letter-spacing: 0.02em;
  color: var(--green-bright);
  text-shadow: 0 0 20px rgba(168, 216, 104, 0.3);
}
h2 { margin: 16px 0 8px; font-size: 18px; color: var(--green); }
h3 { margin: 12px 0 6px; font-size: 14px; color: var(--green); }
.sub { color: var(--text-dim); font-size: 13px; margin: 0 0 8px; text-align: center; line-height: 1.5; }

.card {
  width: 100%;
  max-width: 420px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 8px 0;
}
.card-title {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 10px;
  text-align: center;
}

/* ==== Buttons ==== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 24px;
  border: 2px solid var(--green);
  background: var(--green);
  color: #0a1a0f;
  font-weight: 700;
  font-size: 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.08s, box-shadow 0.08s;
  min-height: 44px;
}
.btn:active { transform: translateY(2px); }
.btn.primary {
  background: var(--green);
  box-shadow: 0 0 20px rgba(168, 216, 104, 0.4);
  color: #0a1a0f;
}
.btn.secondary {
  background: transparent;
  color: var(--green);
}
.btn.ghost {
  background: transparent;
  border: 1px solid var(--border-bright);
  color: var(--text-dim);
  font-size: 12px;
  padding: 8px 14px;
  min-height: 36px;
}
.btn.small {
  padding: 8px 14px;
  font-size: 12px;
  min-height: 36px;
}

.btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin: 12px 0;
  flex-wrap: wrap;
}

/* ==== Difficulty buttons ==== */
.diff-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.diff-btn {
  padding: 14px 6px;
  background: var(--bg2);
  border: 2px solid var(--border);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
}
.diff-btn.active {
  border-color: var(--green);
  background: rgba(168, 216, 104, 0.15);
  color: var(--green-bright);
  box-shadow: 0 0 12px rgba(168, 216, 104, 0.3);
}

/* ==== Room key ==== */
.room-key-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 12px;
  background: #0a1a0a;
  border: 1px dashed var(--border-bright);
  border-radius: 6px;
  margin: 6px 0;
}
.room-key-label {
  font-size: 12px;
  color: var(--text-dim);
  flex-shrink: 0;
}
.room-key {
  font-family: ui-monospace, Menlo, monospace;
  font-size: clamp(14px, 4.2vw, 20px);
  letter-spacing: clamp(2px, 1vw, 6px);
  color: var(--yellow);
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  flex: 1;
  text-align: center;
}
.room-join-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  gap: 8px;
}
.room-join-row label { font-size: 12px; color: var(--text-dim); }
.room-join-row input {
  background: #0a1a0a;
  border: 1px solid var(--border);
  color: var(--yellow);
  padding: 8px 10px;
  border-radius: 4px;
  font-family: ui-monospace, Menlo, monospace;
  font-size: 14px;
  width: 110px;
  letter-spacing: 4px;
  text-align: center;
}
.note {
  font-size: 10px;
  color: var(--text-faint);
  text-align: center;
  margin: 6px 0 0;
}

/* ==== Dog preview & customization ==== */
.dog-preview {
  width: 180px;
  height: 180px;
  background: #2a4a28;
  border: 3px solid var(--border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 10px auto;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  overflow: hidden;
}
.dog-preview canvas { display: block; image-rendering: pixelated; }

.custom-row {
  margin: 10px 0;
}
.custom-label {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-align: center;
}
.color-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.color-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  padding: 0;
  transition: transform 0.1s;
}
.color-dot.active {
  border-color: var(--green-bright);
  transform: scale(1.1);
  box-shadow: 0 0 10px rgba(200, 232, 128, 0.6);
}
.opt-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}
.opt-btn {
  padding: 8px 14px;
  background: var(--bg2);
  border: 2px solid var(--border);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  border-radius: 6px;
  cursor: pointer;
  min-width: 52px;
}
.opt-btn.active {
  border-color: var(--green);
  color: var(--green-bright);
  background: rgba(168, 216, 104, 0.1);
}

/* ==== Game HUD ==== */
#scene-game { padding: 0; background: #1a2a18; }
#game-canvas {
  position: absolute; inset: 0;
  width: 100vw; height: 100vh;
  display: block;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
}
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  padding: calc(var(--safe-top) + 8px) 12px 8px;
  background: linear-gradient(to bottom, rgba(10,26,15,0.85), rgba(10,26,15,0));
  pointer-events: none;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.hud-chip {
  background: rgba(10, 26, 15, 0.7);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 11px;
  pointer-events: auto;
}
.hud-chip-label { color: var(--text-faint); font-size: 9px; letter-spacing: 0.1em; }
.hud-chip-value { color: var(--green-bright); font-weight: 700; font-size: 15px; font-family: ui-monospace, monospace; }
#hud-targets {
  display: flex; flex-direction: column; gap: 2px;
  font-size: 12px;
  max-width: 180px;
}
.target-row {
  display: flex; align-items: center; gap: 6px;
  background: rgba(10,26,15,0.6);
  padding: 3px 8px;
  border-radius: 4px;
}
.target-emoji { font-size: 14px; }
.target-count { font-family: ui-monospace, monospace; font-size: 12px; color: var(--green-bright); }
.target-count.full { color: var(--yellow); }

/* ==== Joystick (fixed, always visible on touch devices) ==== */
#joystick {
  position: fixed;
  left: calc(var(--safe-left) + 20px);
  bottom: calc(var(--safe-bottom) + 20px);
  width: 120px; height: 120px;
  display: none;
  z-index: 20;
  touch-action: none;
}
#joystick.visible { display: block; }
#joystick-base {
  position: absolute; inset: 0;
  background: radial-gradient(circle, rgba(168,216,104,0.12), rgba(168,216,104,0.04));
  border: 2px solid rgba(168, 216, 104, 0.4);
  border-radius: 50%;
}
#joystick-knob {
  position: absolute;
  left: 50%; top: 50%;
  width: 50px; height: 50px;
  margin: -25px 0 0 -25px;
  background: rgba(200, 232, 128, 0.7);
  border: 2px solid var(--green-bright);
  border-radius: 50%;
  pointer-events: none;
  transition: background 0.15s;
}
#joystick.active #joystick-knob {
  background: rgba(200, 232, 128, 0.95);
}

/* ==== Bark button ==== */
#bark-btn {
  position: fixed;
  right: calc(var(--safe-right) + 20px);
  bottom: calc(var(--safe-bottom) + 20px);
  width: 90px; height: 90px;
  border-radius: 50%;
  background: var(--yellow);
  border: 3px solid #d8a848;
  color: #4a2a08;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  z-index: 20;
  box-shadow: 0 4px 0 #a07830, 0 6px 16px rgba(0,0,0,0.4);
  display: none;
  line-height: 1.2;
}
#bark-btn.visible { display: block; }
#bark-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #a07830, 0 3px 10px rgba(0,0,0,0.4); }
#bark-btn.cooldown { background: #6a6a50; border-color: #4a4a30; color: #2a2a20; }

#bark-meter {
  position: fixed;
  right: calc(var(--safe-right) + 20px);
  bottom: calc(var(--safe-bottom) + 118px);
  font-size: 10px;
  color: var(--text-dim);
  background: rgba(10,26,15,0.7);
  padding: 3px 8px;
  border-radius: 4px;
  z-index: 20;
  display: none;
}
#bark-meter.visible { display: block; }

#key-hint {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 12px);
  left: 50%;
  transform: translateX(-50%);
  color: var(--text-faint);
  font-size: 11px;
  z-index: 15;
  pointer-events: none;
  background: rgba(10,26,15,0.5);
  padding: 4px 10px;
  border-radius: 4px;
}

#farmer-alert {
  position: fixed;
  top: calc(var(--safe-top) + 80px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(216, 96, 72, 0.9);
  border: 2px solid #ffa090;
  color: white;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  z-index: 15;
  display: none;
  text-align: center;
  box-shadow: 0 0 20px rgba(216, 96, 72, 0.5);
}
#farmer-alert.visible { display: block; animation: pulseAlert 0.8s ease-in-out infinite; }
@keyframes pulseAlert {
  0%, 100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.04); }
}

/* ==== Result scene ==== */
.result-verdict {
  font-size: 48px;
  font-weight: 800;
  margin: 20px 0;
  letter-spacing: 0.05em;
}
.result-verdict.success { color: var(--green-bright); text-shadow: 0 0 20px rgba(168, 216, 104, 0.5); }
.result-verdict.fail { color: var(--red); text-shadow: 0 0 20px rgba(216, 96, 72, 0.5); }

.result-table {
  width: 100%;
  max-width: 360px;
  border-collapse: collapse;
  margin: 10px 0;
}
.result-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.result-table td:first-child { color: var(--text-dim); }
.result-table td:last-child { text-align: right; font-family: ui-monospace, monospace; color: var(--green-bright); }

/* ==== Debug scene ==== */
#scene-debug { padding: 0; }
.debug-top {
  width: 100%;
  padding: calc(var(--safe-top) + 12px) 12px 8px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.debug-top h2 { margin: 0; font-size: 16px; }
.debug-controls { display: flex; gap: 6px; flex-wrap: wrap; }
.debug-tabs {
  display: flex;
  gap: 4px;
  padding: 10px 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.dbg-tab {
  flex-shrink: 0;
  padding: 6px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
}
.dbg-tab.active { background: var(--green); color: #0a1a0f; border-color: var(--green); }
.debug-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 12px calc(var(--safe-bottom) + 20px);
  width: 100%;
}
.dbg-section { margin-bottom: 18px; }
.dbg-section h3 { margin: 8px 0 6px; font-size: 13px; color: var(--green); }
.dbg-note { font-size: 10px; color: var(--text-faint); margin-bottom: 6px; line-height: 1.4; }
.dbg-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  background: var(--bg2);
  border-radius: 4px;
  overflow: hidden;
}
.dbg-table th {
  background: var(--bg);
  color: var(--text-dim);
  padding: 4px 6px;
  text-align: left;
  font-weight: 600;
  font-size: 10px;
}
.dbg-table td { padding: 3px 6px; border-top: 1px solid var(--border); }
.dbg-table td:first-child { color: var(--text); font-family: ui-monospace, monospace; }
.dbg-table input[type="number"] {
  width: 70px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--yellow);
  padding: 3px 5px;
  border-radius: 3px;
  font-family: ui-monospace, monospace;
  font-size: 11px;
}
.dbg-react-group {
  border-left: 2px solid var(--border-bright);
  margin: 8px 0;
  padding-left: 10px;
}
.dbg-react-group h4 {
  margin: 4px 0;
  font-size: 11px;
  color: var(--green);
}

#version-tag {
  color: var(--text-faint);
  font-size: 10px;
  margin-top: 12px;
  font-family: ui-monospace, monospace;
}
</style>
</head>
<body>

<!-- ====================== MENU SCENE ====================== -->
<div class="scene active" id="scene-menu">
  <h1>🐕 DogDogGo</h1>
  <p class="sub">牧羊犬になって、動物を正しい柵へ誘導しよう！<br>全動物を目標数柵に入れてクリア</p>

  <div class="card">
    <div class="card-title">🎯 難易度</div>
    <div class="diff-row">
      <button class="diff-btn active" data-diff="easy">易しい</button>
      <button class="diff-btn" data-diff="mid">ふつう</button>
      <button class="diff-btn" data-diff="hard">難しい</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🔑 マルチプレイ (試験中)</div>
    <div class="room-key-row">
      <span class="room-key-label">KEY:</span>
      <span class="room-key" id="room-key-mine">--------</span>
    </div>
    <div class="room-join-row">
      <label>参加:</label>
      <input type="text" id="room-key-join" maxlength="8" placeholder="8桁">
    </div>
    <div class="note">※友達と一緒に遊べます (実装予定)</div>
  </div>

  <div class="btn-row">
    <button class="btn primary" id="start-btn">はじめる</button>
  </div>
  <button class="btn ghost" id="to-debug-1">⚙ デバッグ画面</button>
  <div id="version-tag">v0.12 "DogDogGo"</div>
</div>

<!-- ====================== WAITING SCENE ====================== -->
<div class="scene" id="scene-waiting">
  <h2 id="wait-level" style="font-size: 24px; color: var(--yellow); margin-top: 8px;">LEVEL 1</h2>
  <p class="sub" id="wait-desc">犬のすがたを選んで、フィールドへ出発！</p>

  <div class="dog-preview">
    <canvas id="dog-preview-canvas" width="160" height="160"></canvas>
  </div>

  <div class="card">
    <div class="custom-row">
      <div class="custom-label">🎨 からだの色</div>
      <div class="color-dots" id="dog-colors"></div>
    </div>
    <div class="custom-row">
      <div class="custom-label">👂 耳のかたち</div>
      <div class="opt-row" id="dog-ears">
        <button class="opt-btn active" data-ear="floppy">たれ耳</button>
        <button class="opt-btn" data-ear="pointy">立ち耳</button>
        <button class="opt-btn" data-ear="round">まる耳</button>
      </div>
    </div>
    <div class="custom-row">
      <div class="custom-label">🏷 もよう</div>
      <div class="opt-row" id="dog-patterns">
        <button class="opt-btn active" data-pat="solid">むじ</button>
        <button class="opt-btn" data-pat="spot">ぶち</button>
        <button class="opt-btn" data-pat="belt">おび</button>
        <button class="opt-btn" data-pat="stripe">しま</button>
      </div>
    </div>
    <div class="custom-row">
      <div class="custom-label">📏 サイズ</div>
      <div class="opt-row" id="dog-sizes">
        <button class="opt-btn" data-sz="s">小</button>
        <button class="opt-btn active" data-sz="m">中</button>
        <button class="opt-btn" data-sz="l">大</button>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn secondary" id="back-to-menu-btn">← 戻る</button>
    <button class="btn primary" id="go-field-btn">GO FIELD →</button>
  </div>
  <button class="btn ghost" id="to-debug-2">⚙ デバッグ画面</button>
</div>

<!-- ====================== GAME SCENE ====================== -->
<div class="scene" id="scene-game">
  <canvas id="game-canvas"></canvas>
  <div class="hud">
    <div class="hud-chip">
      <div class="hud-chip-label">LEVEL</div>
      <div class="hud-chip-value" id="hud-level">1</div>
    </div>
    <div id="hud-targets"></div>
    <div class="hud-chip">
      <div class="hud-chip-label">BARK</div>
      <div class="hud-chip-value" id="hud-bark">100%</div>
    </div>
  </div>
  <div id="joystick">
    <div id="joystick-base"></div>
    <div id="joystick-knob"></div>
  </div>
  <button id="bark-btn">🐾<br>吠える</button>
  <div id="bark-meter">効果 <span id="bark-pct">100%</span></div>
  <div id="key-hint">WASD/矢印=移動 ・ Space=吠える</div>
  <div id="farmer-alert">牧場主に近づいている！ あと<span id="farmer-bark-count">3</span>回吠えたらゲーム終了</div>
</div>

<!-- ====================== RESULT SCENE ====================== -->
<div class="scene" id="scene-result">
  <div class="result-verdict" id="result-verdict">判定中</div>
  <p class="sub" id="result-sub"></p>
  <div class="card">
    <div class="card-title">柵の状況</div>
    <table class="result-table" id="result-table"></table>
  </div>
  <div class="btn-row">
    <button class="btn secondary" id="result-menu-btn">メニュー</button>
    <button class="btn primary" id="result-next-btn">次のレベル →</button>
  </div>
</div>

<!-- ====================== DEBUG SCENE ====================== -->
<div class="scene" id="scene-debug">
  <div class="debug-top">
    <h2>⚙ デバッグ: 社会力パラメータ</h2>
    <div class="debug-controls">
      <button class="btn ghost small" id="dbg-load-default">初期値</button>
      <button class="btn ghost small" id="dbg-save-json">保存(JSON)</button>
      <input type="file" id="dbg-load-file" accept=".json" style="display:none">
      <button class="btn ghost small" id="dbg-load-json">読込</button>
      <button class="btn small" id="dbg-close">← 戻る</button>
    </div>
  </div>
  <div class="debug-tabs" id="debug-tabs"></div>
  <div class="debug-body" id="debug-body"></div>
</div>

<script>
'use strict';

// ============================================================
// CONSTANTS & PALETTE
// ============================================================
const VIEW_W = 720;  // 仮想ワールド単位の表示幅
const PIXEL = 4;     // ドット絵の1ピクセル = 4ワールド単位
const TICK = 1/60;

function resolveParams(P) {
  for (const k in P) {
    if (typeof P[k].react === 'string' && P[k].react.startsWith('INHERIT:')) {
      const src = P[k].react.split(':')[1];
      P[k].react = JSON.parse(JSON.stringify(P[src].react));
    }
  }
  return P;
}

// ============================================================
// UTILITIES
// ============================================================
function rnd(a, b) { return a + Math.random() * (b - a); }
function rndRange(arr) { return rnd(arr[0], arr[1]); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b-a)*t; }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function genRoomKey() {
  let s = '';
  for (let i = 0; i < 8; i++) s += Math.floor(Math.random()*10);
  return s;
}
function w2s(wx, wy) {
  const sc = CW / VIEW_W;
  return [(wx - camX) * sc + CW/2, (wy - camY) * sc + CH/2];
}
function wScale() { return CW / VIEW_W; }
function isVisible(wx, wy, m=80) {
  const [sx, sy] = w2s(wx, wy);
  return sx > -m && sx < CW+m && sy > -m && sy < CH+m;
}

function resize() {
  CW = window.innerWidth;
  CH = window.innerHeight;
  canvas.width = CW;
  canvas.height = CH;
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);

function showScene(name) {
  currentScene = name;
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('scene-' + name);
  if (el) el.classList.add('active');
  const isGame = name === 'game';
  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  document.getElementById('joystick').classList.toggle('visible', isGame && isMobile);
  document.getElementById('bark-btn').classList.toggle('visible', isGame);
  document.getElementById('bark-meter').classList.toggle('visible', isGame);
  document.getElementById('key-hint').style.display = (isGame && !isMobile) ? 'block' : 'none';
  if (isGame) resize();
}

// ============================================================
// LEVEL SPEC (難易度・レベルから具体的な設定を導出)
// ============================================================
function computeLevelSpec() {
  const lv = GAME.level;
  const diff = GAME.difficulty;

  // 難易度の基本パラメータ
  const startOffset = diff==='easy' ? 0 : (diff==='hard' ? 2 : 1);
  const progressMul = diff==='easy' ? 0.55 : (diff==='hard' ? 1.55 : 1.0);
  const baseMul     = diff==='easy' ? 0.75 : (diff==='hard' ? 1.35 : 1.0);
  const effLv = startOffset + (lv - 1) * progressMul;

  // 前回実績による自動調整
  const perfAdj = clamp(1.0 + (GAME.prevAchievement - 0.85) * 0.4, 0.8, 1.25);
  const qty = baseMul * perfAdj;

  const fieldSize = Math.round(2200 + effLv * 180);

  // 出現する動物: 白羊 + ランダムプール
  const types = ['white_sheep'];
  const pool = ['black_sheep', 'bh_sheep', 'goose', 'chicken', 'cow', 'pig'];
  let addN = Math.round(clamp(effLv * 0.6, 0, pool.length));
  if (diff === 'hard' && lv >= 1 && addN < 1) addN = 1;
  const shuffled = shuffle(pool);
  for (let i = 0; i < addN; i++) types.push(shuffled[i]);

  // 各種の数
  const counts = {};
  types.forEach(t => {
    let base = 0;
    if (t === 'white_sheep') base = 8 + effLv * 2.5;
    else if (t === 'black_sheep') base = 4 + effLv * 1.8;
    else if (t === 'bh_sheep')    base = 4 + effLv * 1.8;
    else if (t === 'goose')       base = 5 + effLv * 2.0;
    else if (t === 'chicken')     base = 6 + effLv * 2.2;
    else if (t === 'cow')         base = 3 + effLv * 1.3;
    else if (t === 'pig')         base = 2 + effLv * 1.1;
    counts[t] = Math.max(1, Math.round(base * qty));
  });

  let successRate = diff==='easy'?0.70 : (diff==='mid'?0.78 : 0.85);
  successRate = clamp(successRate + (GAME.prevAchievement - 0.85)*0.1, 0.55, 0.95);

  const wolfInterval = Math.max(6, 28 - effLv * 2.2);
  const wolfMaxConcurrent = 1 + Math.floor(effLv * 0.4);

  let nTractor = Math.min(3, Math.floor(effLv * 0.45));
  let nTruck = Math.min(3, Math.floor(Math.max(0, effLv - 0.8) * 0.45));
  if (diff === 'hard' && lv >= 1) nTractor = Math.max(nTractor, 1);

  const huts  = Math.round(4 + effLv * 1.2);
  const trees = Math.round(16 + effLv * 3.5);
  const ponds = Math.max(2, Math.round(2 + effLv * 0.4));

  return {
    fieldSize, types, counts, successRate,
    wolfInterval, wolfMaxConcurrent,
    nTractor, nTruck, huts, trees, ponds,
    effLv,
  };
}

// ============================================================
// FOREST (外周の森)
// ============================================================
function buildForest() {
  FOREST_R = [];
  const baseR = FIELD_SIZE/2 - 120;
  for (let i = 0; i < FOREST_POINTS; i++) {
    const a = i / FOREST_POINTS * Math.PI * 2;
    let n = 0;
    n += Math.sin(a*3 + 1.2) * 0.10;
    n += Math.sin(a*5 + 2.4) * 0.06;
    n += Math.sin(a*7 + 0.8) * 0.04;
    n += Math.sin(a*11 + 3.1) * 0.025;
    FOREST_R.push(baseR * (1 + n));
  }
}
function forestRAt(angle) {
  const a = ((angle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const idx = Math.floor(a / (Math.PI*2) * FOREST_POINTS) % FOREST_POINTS;
  return FOREST_R[idx];
}
function inForest(x, y) {
  const d = Math.hypot(x, y);
  const a = Math.atan2(y, x);
  return d > forestRAt(a);
}
function distToForestEdge(x, y) {
  const d = Math.hypot(x, y);
  const a = Math.atan2(y, x);
  return forestRAt(a) - d;  // positive = inside field
}
function forestRepulse(x, y, avoidDist) {
  const d = distToForestEdge(x, y);
  if (d > avoidDist) return [0, 0];
  const a = Math.atan2(y, x);
  // 中心方向へのベクトル
  const strength = (1 - d/avoidDist);
  return [-Math.cos(a) * strength, -Math.sin(a) * strength];
}

// ============================================================
// FIELD BUILD (柵, 小屋, 池, 木, 牧場主)
// ============================================================
function buildField() {
  const spec = LEVEL_SPEC;
  FIELD_SIZE = spec.fieldSize;
  buildForest();

  PENS = [];
  HUTS = [];
  TREES = [];
  PONDS = [];

  const inner = 120;
  const usableR = FIELD_SIZE/2 - 180;

  function randPos(margin = 160, tries = 100) {
    for (let t = 0; t < tries; t++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.random() * (usableR - margin) + margin*0.5;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      if (distToForestEdge(x, y) < margin*0.6) continue;
      let ok = true;
      for (const p of PENS) {
        if (Math.hypot(p.cx - x, p.cy - y) < p.size + 180) { ok = false; break; }
      }
      if (!ok) continue;
      for (const h of HUTS) {
        if (Math.hypot(h.x - x, h.y - y) < h.size + 100) { ok = false; break; }
      }
      if (!ok) continue;
      for (const p of PONDS) {
        if (Math.hypot(p.x - x, p.y - y) < p.r + 80) { ok = false; break; }
      }
      if (ok) return [x, y];
    }
    return null;
  }

  // 1. 柵 (動物種ごと)
  const penTypes = Array.from(new Set(spec.types.map(t => PARAMS[t].pen).filter(p => p)));
  penTypes.forEach(penType => {
    const pos = randPos(220);
    if (!pos) return;
    const [x, y] = pos;
    const size = 180;
    const gateDir = Math.floor(Math.random() * 4); // 0=N 1=E 2=S 3=W
    PENS.push({
      cx: x, cy: y, size, penType, gateDir,
      gateWidth: 80,
    });
  });

  // 2. 池
  for (let i = 0; i < spec.ponds; i++) {
    const pos = randPos(150);
    if (!pos) continue;
    PONDS.push({ x: pos[0], y: pos[1], r: 60 + Math.random()*50 });
  }

  // 3. 小屋
  for (let i = 0; i < spec.huts; i++) {
    const pos = randPos(120);
    if (!pos) continue;
    HUTS.push({
      x: pos[0], y: pos[1],
      w: 70 + Math.random()*40,
      h: 70 + Math.random()*40,
      size: 50,
      style: Math.random() < 0.5 ? 'hut' : 'house',
      rot: Math.floor(Math.random()*4) * Math.PI/2,
    });
  }

  // 4. 木
  for (let i = 0; i < spec.trees; i++) {
    const pos = randPos(60);
    if (!pos) continue;
    TREES.push({
      x: pos[0], y: pos[1],
      r: 18 + Math.random()*12,
      variant: Math.random() < 0.3 ? 'tall' : 'round',
    });
  }

  // 5. 牧場主 (中央寄りのランダム位置)
  const fa = Math.random() * Math.PI * 2;
  const fr = Math.random() * usableR * 0.4;
  FARMER = { x: Math.cos(fa) * fr, y: Math.sin(fa) * fr };
}

// ============================================================
// PEN HELPERS
// ============================================================
function penWalls(pen) {
  // 4辺: {x1,y1,x2,y2, gate: bool}
  const h = pen.size;
  const walls = [];
  const gw = pen.gateWidth;
  const c = [pen.cx, pen.cy];
  // N (top), E (right), S (bottom), W (left)
  const sides = [
    {x1: c[0]-h, y1: c[1]-h, x2: c[0]+h, y2: c[1]-h, dir: 0},
    {x1: c[0]+h, y1: c[1]-h, x2: c[0]+h, y2: c[1]+h, dir: 1},
    {x1: c[0]-h, y1: c[1]+h, x2: c[0]+h, y2: c[1]+h, dir: 2},
    {x1: c[0]-h, y1: c[1]-h, x2: c[0]-h, y2: c[1]+h, dir: 3},
  ];
  sides.forEach(s => {
    if (s.dir === pen.gateDir) {
      // ゲート (中央を開けて両側に残す)
      if (s.dir === 0 || s.dir === 2) {
        walls.push({x1: s.x1, y1: s.y1, x2: c[0]-gw, y2: s.y1});
        walls.push({x1: c[0]+gw, y1: s.y1, x2: s.x2, y2: s.y1});
      } else {
        walls.push({x1: s.x1, y1: s.y1, x2: s.x1, y2: c[1]-gw});
        walls.push({x1: s.x1, y1: c[1]+gw, x2: s.x1, y2: s.y2});
      }
    } else {
      walls.push({x1: s.x1, y1: s.y1, x2: s.x2, y2: s.y2});
    }
  });
  return walls;
}

function inPen(pen, x, y) {
  const h = pen.size;
  return x > pen.cx-h && x < pen.cx+h && y > pen.cy-h && y < pen.cy+h;
}

function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2-x1, dy = y2-y1;
  const len2 = dx*dx + dy*dy;
  if (len2 < 0.001) return { d: Math.hypot(px-x1, py-y1), cx: x1, cy: y1 };
  let t = ((px-x1)*dx + (py-y1)*dy) / len2;
  t = clamp(t, 0, 1);
  const cx = x1 + dx*t, cy = y1 + dy*t;
  return { d: Math.hypot(px-cx, py-cy), cx, cy };
}

function penWallForce(pen, x, y, isVehicle) {
  const walls = penWalls(pen);
  let fx = 0, fy = 0;
  const avoid = isVehicle ? 40 : 30;
  walls.forEach(w => {
    const r = distToSegment(x, y, w.x1, w.y1, w.x2, w.y2);
    if (r.d < avoid && r.d > 0.1) {
      const s = (1 - r.d/avoid) / r.d;
      fx += (x - r.cx) * s;
      fy += (y - r.cy) * s;
    }
  });
  // 車両はゲートも通さない
  if (isVehicle) {
    // 4辺全てを壁として扱う (ゲートも)
    const hh = pen.size;
    const fullSides = [
      [pen.cx-hh, pen.cy-hh, pen.cx+hh, pen.cy-hh],
      [pen.cx+hh, pen.cy-hh, pen.cx+hh, pen.cy+hh],
      [pen.cx-hh, pen.cy+hh, pen.cx+hh, pen.cy+hh],
      [pen.cx-hh, pen.cy-hh, pen.cx-hh, pen.cy+hh],
    ];
    fullSides.forEach(s => {
      const r = distToSegment(x, y, s[0], s[1], s[2], s[3]);
      if (r.d < avoid && r.d > 0.1) {
        const sc = (1 - r.d/avoid) / r.d;
        fx += (x - r.cx) * sc;
        fy += (y - r.cy) * sc;
      }
    });
  }
  return [fx, fy];
}

function penHardClamp(e) {
  const R = e.size;
  const isVehicle = e.type === 'tractor' || e.type === 'truck';
  for (const pen of PENS) {
    const walls = isVehicle
      ? [
          [pen.cx-pen.size, pen.cy-pen.size, pen.cx+pen.size, pen.cy-pen.size],
          [pen.cx+pen.size, pen.cy-pen.size, pen.cx+pen.size, pen.cy+pen.size],
          [pen.cx-pen.size, pen.cy+pen.size, pen.cx+pen.size, pen.cy+pen.size],
          [pen.cx-pen.size, pen.cy-pen.size, pen.cx-pen.size, pen.cy+pen.size],
        ]
      : penWalls(pen).map(w => [w.x1,w.y1,w.x2,w.y2]);
    for (const s of walls) {
      const r = distToSegment(e.x, e.y, s[0], s[1], s[2], s[3]);
      if (r.d < R) {
        const nx = (e.x - r.cx) / (r.d + 0.001);
        const ny = (e.y - r.cy) / (r.d + 0.001);
        e.x = r.cx + nx * R;
        e.y = r.cy + ny * R;
        const vd = e.vx * nx + e.vy * ny;
        if (vd < 0) { e.vx -= vd*nx; e.vy -= vd*ny; }
      }
    }
  }
}

// ============================================================
// ENTITY CREATION & FORCES
// ============================================================
function makeEntity(typeKey, x, y) {
  const P = PARAMS[typeKey];
  const e = {
    type: typeKey,
    x, y, vx: 0, vy: 0,
    maxSpeed: rndRange(P.maxSpeed),
    inertia: rndRange(P.inertia),
    size: Array.isArray(P.size) ? rndRange(P.size) : P.size,
    maxForce: Array.isArray(P.maxForce) ? rndRange(P.maxForce) : (P.maxForce || 0),
    wanderStr: rndRange(P.wander), wanderTurn: rndRange(P.wanderTurn),
    wanderAngle: Math.random()*Math.PI*2,
    goalStr: rndRange(P.goalAttract), goalR: rndRange(P.goalR),
    goal: { x: x + rnd(-200,200), y: y + rnd(-200,200), updateAt: 0 },
    pondStr: rndRange(P.pond.str), pondRange: rndRange(P.pond.range),
    treeStr: rndRange(P.tree.str), treeRange: rndRange(P.tree.range),
    hutStr: rndRange(P.hut.str), hutRange: rndRange(P.hut.range),
    fenceStr: rndRange(P.fence.str), fenceRange: rndRange(P.fence.range),
    forestStr: rndRange(P.forest.str), forestRange: rndRange(P.forest.range),
    reactCoef: {},
    baseSpeed: P.baseSpeed ? rndRange(P.baseSpeed) : 0,
    heading: Math.random() * Math.PI*2,
    stopUntil: 0,
    everLeftForest: false, inForestTimer: 0,
    variant: Math.floor(Math.random()*3),
    phase: Math.random() * Math.PI*2,
  };
  // reactの個体値固定
  for (const g in P.react) {
    const r = P.react[g];
    const coef = {};
    for (const k in r) {
      coef[k] = Array.isArray(r[k]) ? rndRange(r[k]) : r[k];
    }
    e.reactCoef[g] = coef;
  }
  return e;
}

function reactKey(e) { return PARAMS[e.type].group; }

function pickRandomGoal(e) {
  const a = Math.random() * Math.PI * 2;
  const r = Math.random() * (FIELD_SIZE*0.4) + 100;
  return { x: Math.cos(a)*r, y: Math.sin(a)*r, updateAt: totalT + rnd(10, 120) };
}

function updateGoal(e) {
  if (totalT >= e.goal.updateAt) e.goal = pickRandomGoal(e);
}

function computeForces(e, dt) {
  const P = PARAMS[e.type];
  let fx = 0, fy = 0;

  // 他エンティティとの相互作用
  for (const o of ENTITIES) {
    if (o === e) continue;
    const ok = reactKey(o);
    const coef = e.reactCoef[ok];
    if (!coef) continue;
    const dx = o.x - e.x, dy = o.y - e.y;
    const d = Math.hypot(dx, dy);
    if (d < 0.5 || d > 600) continue;
    const nx = dx / d, ny = dy / d;
    // 距離反発/引力 (prS=強度 prR=範囲)
    if (coef.prS !== undefined && coef.prR > 0) {
      if (d < coef.prR) {
        // 線形falloffのみ (逆距離除算なし) — これが強い斥力を生む
        const s = coef.prS * (1 - d/coef.prR);
        fx -= nx * s; fy -= ny * s;
      }
    }
    // 相対速度の接近成分
    if (coef.apS !== undefined && coef.apR > 0 && d < coef.apR) {
      const rvx = o.vx - e.vx, rvy = o.vy - e.vy;
      const app = rvx * (-nx) + rvy * (-ny);  // 接近速度 (>0で近づいてくる)
      if (app > 0) {
        const s = coef.apS * app * (1 - d/coef.apR) * 0.008;
        fx -= nx * s; fy -= ny * s;
      }
    }
    // 群れ引力 (flock)
    if (coef.flock !== undefined && coef.flockR > 0 && d < coef.flockR) {
      const s = coef.flock * (1 - d/coef.flockR);
      fx -= nx * s; fy -= ny * s;  // flockが負なら引力 (fx+=nx*|s|)
    }
    // 個体分離 (sep) — 近接は強い、距離反比例は残す
    if (coef.sep !== undefined && coef.sepR > 0 && d < coef.sepR) {
      const s = coef.sep * (1 - d/coef.sepR) / (d + 1) * 10;
      fx -= nx * s; fy -= ny * s;
    }
  }

  // 牧場主
  if (FARMER) {
    const coef = e.reactCoef.farmer;
    if (coef) {
      const dx = FARMER.x - e.x, dy = FARMER.y - e.y;
      const d = Math.hypot(dx, dy);
      if (coef.prR > 0 && d < coef.prR && d > 0.5) {
        const s = coef.prS * (1 - d/coef.prR) / (d+1);
        fx -= dx/d * s; fy -= dy/d * s;
      }
    }
  }

  // 静止物の斥力
  // 木
  for (const t of TREES) {
    const dx = t.x - e.x, dy = t.y - e.y;
    const mx = e.treeRange + t.r + e.size;
    if (Math.abs(dx) > mx || Math.abs(dy) > mx) continue;
    const d = Math.hypot(dx, dy);
    if (d > 0.1 && d < mx) {
      const s = e.treeStr * (1 - d/mx) / (d + 1);
      fx -= dx/d * s; fy -= dy/d * s;
    }
  }
  // 小屋
  for (const h of HUTS) {
    const dx = h.x - e.x, dy = h.y - e.y;
    const mx = e.hutRange + Math.max(h.w, h.h)/2 + e.size;
    if (Math.abs(dx) > mx || Math.abs(dy) > mx) continue;
    const d = Math.hypot(dx, dy);
    if (d > 0.1 && d < mx) {
      const s = e.hutStr * (1 - d/mx) / (d + 1);
      fx -= dx/d * s; fy -= dy/d * s;
    }
  }
  // 柵
  const isVehicle = e.type === 'tractor' || e.type === 'truck';
  for (const pen of PENS) {
    const dx = pen.cx - e.x, dy = pen.cy - e.y;
    if (Math.abs(dx) > pen.size + 120 || Math.abs(dy) > pen.size + 120) continue;
    const [wfx, wfy] = penWallForce(pen, e.x, e.y, isVehicle);
    fx += wfx * e.fenceStr; fy += wfy * e.fenceStr;
  }
  // 池
  for (const p of PONDS) {
    const dx = p.x - e.x, dy = p.y - e.y;
    const mx = e.pondRange + p.r + e.size;
    if (Math.abs(dx) > mx || Math.abs(dy) > mx) continue;
    const d = Math.hypot(dx, dy);
    if (d > 0.1 && d < mx) {
      const s = e.pondStr * (1 - d/mx) / (d + 1);
      fx -= dx/d * s; fy -= dy/d * s;
    }
  }
  // 森
  if (P.avoidForest) {
    const [rfx, rfy] = forestRepulse(e.x, e.y, e.forestRange);
    fx += rfx * e.forestStr;
    fy += rfy * e.forestStr;
  }

  // ランダム目標への引力
  if (e.goalStr > 0) {
    const dx = e.goal.x - e.x, dy = e.goal.y - e.y;
    const d = Math.hypot(dx, dy);
    if (d > 10 && d < e.goalR) {
      const s = e.goalStr * (1 - d/e.goalR);
      fx += dx/d * s; fy += dy/d * s;
    }
  }

  // ランダムウォーク
  if (e.wanderStr > 0) {
    e.wanderAngle += (Math.random() - 0.5) * e.wanderTurn * dt;
    fx += Math.cos(e.wanderAngle) * e.wanderStr;
    fy += Math.sin(e.wanderAngle) * e.wanderStr;
  }

  // 狼の自走 (ゴールの代わりに定速で進む)
  if (e.baseSpeed > 0) {
    const cs = Math.hypot(e.vx, e.vy);
    const desired = e.baseSpeed;
    if (cs < desired) {
      const ang = cs > 0.1 ? Math.atan2(e.vy, e.vx) : e.wanderAngle;
      fx += Math.cos(ang) * (desired - cs) * 8;
      fy += Math.sin(ang) * (desired - cs) * 8;
    }
  }

  // 吠えの斥力 (dogからの)
  if (barkEffect > 0 && dog && e.type !== 'dog' && e.type !== 'tractor' && e.type !== 'truck') {
    for (const b of barks) {
      if (b.life <= 0) continue;
      const dx = e.x - b.x, dy = e.y - b.y;
      const d = Math.hypot(dx, dy);
      if (d > 0.5 && d < BARK_RANGE) {
        const s = 1600 * b.life * (1 - d/BARK_RANGE) / (d + 1);
        fx += dx/d * s; fy += dy/d * s;
      }
    }
  }

  // 力の上限 (個体値)
  if (e.maxForce > 0) {
    const fm = Math.hypot(fx, fy);
    if (fm > e.maxForce) {
      fx = fx/fm * e.maxForce;
      fy = fy/fm * e.maxForce;
    }
  }

  return [fx, fy];
}

function updateEntity(e, dt) {
  const P = PARAMS[e.type];
  updateGoal(e);

  // 狼: 森に戻って2秒で消える
  if (e.type === 'wolf') {
    const inF = inForest(e.x, e.y);
    if (!inF) e.everLeftForest = true;
    if (inF && e.everLeftForest) {
      e.inForestTimer += dt;
      if (e.inForestTimer > 2.0) e._remove = true;
    } else {
      e.inForestTimer = 0;
    }
  }

  // トラック: 小屋/柵の前で停止
  if (P.stopNearHut) {
    if (totalT < e.stopUntil) {
      e.vx *= 0.85; e.vy *= 0.85;
      return;
    }
    // 前方の障害物チェック
    const speed = Math.hypot(e.vx, e.vy);
    if (speed > 20) {
      const ang = Math.atan2(e.vy, e.vx);
      const fx2 = e.x + Math.cos(ang) * 90, fy2 = e.y + Math.sin(ang) * 90;
      for (const h of HUTS) {
        if (Math.hypot(h.x - fx2, h.y - fy2) < 80) {
          e.stopUntil = totalT + rnd(1.5, 4);
          break;
        }
      }
      if (!e.stopUntil || e.stopUntil <= totalT) {
        for (const pen of PENS) {
          if (Math.hypot(pen.cx - fx2, pen.cy - fy2) < pen.size + 50) {
            e.stopUntil = totalT + rnd(1.5, 4);
            break;
          }
        }
      }
    }
  }

  const [fx, fy] = computeForces(e, dt);

  // 加速度 = 力 (質量=1)
  e.vx += fx * dt;
  e.vy += fy * dt;

  // 慣性減衰
  const damp = Math.pow(1 - e.inertia, dt*60);
  e.vx *= Math.pow(e.inertia, dt*60);
  e.vy *= Math.pow(e.inertia, dt*60);

  // 速度上限
  const speed = Math.hypot(e.vx, e.vy);
  let maxS = e.maxSpeed;
  // 池で減速
  for (const p of PONDS) {
    const d = Math.hypot(p.x - e.x, p.y - e.y);
    if (d < p.r) { maxS *= P.waterSlow; break; }
  }
  if (speed > maxS) {
    e.vx = e.vx/speed * maxS;
    e.vy = e.vy/speed * maxS;
  }

  // 車両の旋回制限
  if (P.turnRate && speed > 5) {
    const targetAng = Math.atan2(e.vy, e.vx);
    let diff = targetAng - e.heading;
    while (diff > Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;
    const maxTurn = P.turnRate * dt;
    if (Math.abs(diff) > maxTurn) {
      e.heading += Math.sign(diff) * maxTurn;
      // 速度も旋回に合わせる
      e.vx = Math.cos(e.heading) * speed;
      e.vy = Math.sin(e.heading) * speed;
    } else {
      e.heading = targetAng;
    }
  } else if (speed > 1) {
    e.heading = Math.atan2(e.vy, e.vx);
  }

  e.x += e.vx * dt;
  e.y += e.vy * dt;

  // フィールド外に出ないようクランプ (森の内側まで)
  const d = Math.hypot(e.x, e.y);
  const a = Math.atan2(e.y, e.x);
  const rMax = forestRAt(a);
  if (P.avoidForest && d > rMax - 20) {
    const t = (rMax - 20) / d;
    e.x *= t; e.y *= t;
    e.vx *= 0.5; e.vy *= 0.5;
  }

  // 硬い当たり判定
  // 木
  for (const t of TREES) {
    const dx = e.x - t.x, dy = e.y - t.y;
    const d = Math.hypot(dx, dy);
    const r = t.r + e.size*0.5;
    if (d < r && d > 0.1) {
      const push = (r - d) / d;
      e.x += dx * push; e.y += dy * push;
      const vd = e.vx * dx/d + e.vy * dy/d;
      if (vd < 0) { e.vx -= vd * dx/d; e.vy -= vd * dy/d; }
    }
  }
  // 小屋 (AABB)
  for (const h of HUTS) {
    const hw = h.w/2 + e.size*0.5, hh = h.h/2 + e.size*0.5;
    const dx = e.x - h.x, dy = e.y - h.y;
    if (Math.abs(dx) < hw && Math.abs(dy) < hh) {
      // 押し出し
      const overX = hw - Math.abs(dx);
      const overY = hh - Math.abs(dy);
      if (overX < overY) {
        e.x += Math.sign(dx) * overX;
        e.vx *= -0.3;
      } else {
        e.y += Math.sign(dy) * overY;
        e.vy *= -0.3;
      }
    }
  }
  penHardClamp(e);
}

function updateDog(dt, ix, iy) {
  if (!dog) return;
  // 入力駆動: 直接速度を設定に近い追従 (牧羊犬らしく機敏)
  const target = dog.maxSpeed;
  const targetVx = ix * target;
  const targetVy = iy * target;
  // 追従係数を大幅に上げて機敏化。入力あり=即追従、入力なし=素早く停止
  const hasInput = Math.abs(ix) + Math.abs(iy) > 0.05;
  const followRate = hasInput ? 28 : 18;
  const t = Math.min(1, followRate * dt);
  dog.vx = dog.vx + (targetVx - dog.vx) * t;
  dog.vy = dog.vy + (targetVy - dog.vy) * t;

  // 池で減速
  for (const p of PONDS) {
    if (Math.hypot(p.x - dog.x, p.y - dog.y) < p.r) {
      dog.vx *= 0.6; dog.vy *= 0.6;
      break;
    }
  }

  const sp = Math.hypot(dog.vx, dog.vy);
  if (sp > target) {
    dog.vx = dog.vx/sp * target;
    dog.vy = dog.vy/sp * target;
  }

  dog.x += dog.vx * dt;
  dog.y += dog.vy * dt;

  if (sp > 5) dog.heading = Math.atan2(dog.vy, dog.vx);

  // フィールドクランプ
  const d = Math.hypot(dog.x, dog.y);
  const a = Math.atan2(dog.y, dog.x);
  const rMax = forestRAt(a);
  if (d > rMax - 20) {
    const t = (rMax - 20) / d;
    dog.x *= t; dog.y *= t;
    dog.vx *= 0.3; dog.vy *= 0.3;
  }

  // 硬い当たり判定 (動物と同じロジック)
  for (const t of TREES) {
    const dx = dog.x - t.x, dy = dog.y - t.y;
    const dd = Math.hypot(dx, dy);
    const r = t.r + dog.size*0.5;
    if (dd < r && dd > 0.1) {
      const push = (r - dd) / dd;
      dog.x += dx * push; dog.y += dy * push;
    }
  }
  for (const h of HUTS) {
    const hw = h.w/2 + dog.size*0.5, hh = h.h/2 + dog.size*0.5;
    const dx = dog.x - h.x, dy = dog.y - h.y;
    if (Math.abs(dx) < hw && Math.abs(dy) < hh) {
      const overX = hw - Math.abs(dx), overY = hh - Math.abs(dy);
      if (overX < overY) dog.x += Math.sign(dx) * overX;
      else dog.y += Math.sign(dy) * overY;
    }
  }
  penHardClamp(dog);
}

// ============================================================
// LEVEL START
// ============================================================
function startLevel() {
  LEVEL_SPEC = computeLevelSpec();
  buildField();
  ENTITIES = [];
  barks = [];
  farmerNearBarks = 0;
  barkEffect = 1.0;
  barkCooldown = 0;
  GAME.nextWolfSpawn = totalT + LEVEL_SPEC.wolfInterval * 0.5;

  // 犬: フィールド中心近く
  dog = makeEntity('dog', 0, 0);
  ENTITIES.push(dog);

  // 動物をスポーン: 全障害物(柵・小屋・木・池・牧場主)を避ける
  const spec = LEVEL_SPEC;
  function findSafeSpawn(margin) {
    for (let tries = 0; tries < 200; tries++) {
      const a = Math.random() * Math.PI*2;
      const maxR = FIELD_SIZE*0.45;
      const r = Math.random() * (maxR - 100) + 150;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      if (distToForestEdge(x, y) < 60) continue;
      let ok = true;
      // 柵内・柵そのものと重ならない
      for (const pen of PENS) {
        const extraPad = pen.size + 30;
        if (Math.abs(x - pen.cx) < extraPad && Math.abs(y - pen.cy) < extraPad) { ok=false; break; }
      }
      if (!ok) continue;
      // 小屋
      for (const h of HUTS) {
        if (Math.abs(x-h.x) < h.w/2 + margin && Math.abs(y-h.y) < h.h/2 + margin) { ok=false; break; }
      }
      if (!ok) continue;
      // 木
      for (const t of TREES) {
        if (Math.hypot(x-t.x, y-t.y) < t.r + margin) { ok=false; break; }
      }
      if (!ok) continue;
      // 池
      for (const p of PONDS) {
        if (Math.hypot(x-p.x, y-p.y) < p.r + margin*0.5) { ok=false; break; }
      }
      if (!ok) continue;
      // 牧場主から離す
      if (FARMER && Math.hypot(x-FARMER.x, y-FARMER.y) < 120) continue;
      // 犬から離す
      if (Math.hypot(x, y) < 80) continue;
      return [x, y];
    }
    return null;
  }
  spec.types.forEach(t => {
    const n = spec.counts[t];
    for (let i = 0; i < n; i++) {
      const pos = findSafeSpawn(30);
      if (!pos) continue;
      ENTITIES.push(makeEntity(t, pos[0], pos[1]));
    }
  });

  // 車両: 同様に障害物を避けて配置
  for (let i = 0; i < spec.nTractor; i++) {
    const pos = findSafeSpawn(50);
    if (!pos) continue;
    ENTITIES.push(makeEntity('tractor', pos[0], pos[1]));
  }
  for (let i = 0; i < spec.nTruck; i++) {
    const pos = findSafeSpawn(50);
    if (!pos) continue;
    ENTITIES.push(makeEntity('truck', pos[0], pos[1]));
  }

  camX = dog.x; camY = dog.y;
  levelStartT = totalT;
}

function spawnWolf() {
  // 画面外 & 森の端付近に出現。犬の位置から画面半分+余白の距離以上離す
  const screenHalfW = (VIEW_W / 2) + 100;
  const screenHalfH = (CH / wScale()) / 2 + 100;
  const offScreenDist = Math.max(screenHalfW, screenHalfH);
  let x, y, a, rEdge;
  for (let tries = 0; tries < 30; tries++) {
    a = Math.random() * Math.PI*2;
    rEdge = forestRAt(a);
    const r = rEdge - 20;
    x = Math.cos(a) * r; y = Math.sin(a) * r;
    // 犬の位置 (camX/camY) から画面外か確認
    if (dog && Math.hypot(x - camX, y - camY) > offScreenDist) break;
  }
  // フォールバック: 森の端なら最低限の距離
  if (Math.hypot(x - camX, y - camY) < offScreenDist * 0.7) {
    // 犬と反対側の森端に配置
    const ca = Math.atan2(camY, camX);
    a = ca + Math.PI + (Math.random()-0.5) * 0.6;
    rEdge = forestRAt(a);
    x = Math.cos(a) * (rEdge - 20);
    y = Math.sin(a) * (rEdge - 20);
  }
  const w = makeEntity('wolf', x, y);
  w.wanderAngle = Math.atan2(-y, -x);  // 中心向き
  ENTITIES.push(w);
}

// ============================================================
// BARK & ENDGAME
// ============================================================
function doBark() {
  if (!dog || barkCooldown > 0 || currentScene !== 'game') return;
  if (barkEffect < 0.15) return;
  barks.push({ x: dog.x, y: dog.y, life: 1.0, r: 20 });
  barkCooldown = 0.25;
  barkEffect = Math.max(0.15, barkEffect - 0.3);

  // 牧場主の近くで吠えた?
  if (FARMER) {
    const d = Math.hypot(FARMER.x - dog.x, FARMER.y - dog.y);
    if (d < FARMER_BARK_RANGE) {
      farmerNearBarks++;
      if (farmerNearBarks >= 3) {
        endGame();
      }
    }
  }
}

function endGame() {
  // 判定
  const spec = LEVEL_SPEC;
  const totalBy = {};
  const insideBy = {};
  spec.types.forEach(t => {
    const p = PARAMS[t].pen;
    totalBy[p] = (totalBy[p]||0) + spec.counts[t];
  });
  ENTITIES.forEach(e => {
    const p = PARAMS[e.type].pen;
    if (!p) return;
    insideBy[p] = insideBy[p] || 0;
    for (const pen of PENS) {
      if (pen.penType === p && inPen(pen, e.x, e.y)) {
        insideBy[p]++;
        break;
      }
    }
  });
  // ratio平均
  let sum = 0, n = 0;
  for (const p in totalBy) {
    sum += (insideBy[p]||0) / totalBy[p];
    n++;
  }
  const ach = n > 0 ? sum/n : 0;
  const success = ach >= spec.successRate;

  // 結果表示
  const clearT = totalT - levelStartT;
  GAME.prevAchievement = ach;
  GAME.prevTime = clearT;
  GAME._lastSuccess = success;

  document.getElementById('result-verdict').textContent = success ? 'せいこう！' : 'しっぱい…';
  document.getElementById('result-verdict').className = 'result-verdict ' + (success ? 'success' : 'fail');
  document.getElementById('result-sub').textContent =
    `達成率 ${Math.round(ach*100)}% / 目標 ${Math.round(spec.successRate*100)}%  ・ タイム ${clearT.toFixed(1)}秒`;

  const tbl = document.getElementById('result-table');
  tbl.innerHTML = '';
  for (const p in totalBy) {
    const tr = document.createElement('tr');
    const emoji = p==='sheep'?'🐑':p==='goose'?'🪿':p==='chicken'?'🐔':p==='cow'?'🐄':p==='pig'?'🐖':'?';
    tr.innerHTML = `<td>${emoji} ${p}</td><td>${insideBy[p]||0} / ${totalBy[p]}</td>`;
    tbl.appendChild(tr);
  }

  document.getElementById('result-next-btn').style.display = success ? '' : 'none';
  showScene('result');
}

function updateHUD() {
  if (currentScene !== 'game' || !LEVEL_SPEC) return;
  document.getElementById('hud-level').textContent = GAME.level;
  document.getElementById('hud-bark').textContent = Math.round(barkEffect*100) + '%';

  // ターゲット
  const totalBy = {}, insideBy = {};
  LEVEL_SPEC.types.forEach(t => {
    const p = PARAMS[t].pen;
    totalBy[p] = (totalBy[p]||0) + LEVEL_SPEC.counts[t];
  });
  ENTITIES.forEach(e => {
    const p = PARAMS[e.type].pen;
    if (!p) return;
    for (const pen of PENS) {
      if (pen.penType === p && inPen(pen, e.x, e.y)) {
        insideBy[p] = (insideBy[p]||0) + 1;
        break;
      }
    }
  });
  const t = document.getElementById('hud-targets');
  t.innerHTML = '';
  for (const p in totalBy) {
    const got = insideBy[p] || 0, need = totalBy[p];
    const emoji = p==='sheep'?'🐑':p==='goose'?'🪿':p==='chicken'?'🐔':p==='cow'?'🐄':p==='pig'?'🐖':'?';
    const full = got >= need;
    const row = document.createElement('div');
    row.className = 'target-row';
    row.innerHTML = `<span class="target-emoji">${emoji}</span>
      <span class="target-count ${full?'full':''}">${got}/${need}</span>`;
    t.appendChild(row);
  }

  // Farmer alert & カウンターリセット
  const alert = document.getElementById('farmer-alert');
  if (FARMER && dog) {
    const d = Math.hypot(FARMER.x - dog.x, FARMER.y - dog.y);
    // 聞こえる範囲の1.5倍の距離で外に出たらリセット
    if (d > FARMER_BARK_RANGE * 1.5) {
      farmerNearBarks = 0;
    }
    if (d < FARMER_BARK_RANGE * 1.4) {
      alert.classList.add('visible');
      document.getElementById('farmer-bark-count').textContent = Math.max(0, 3 - farmerNearBarks);
    } else {
      alert.classList.remove('visible');
    }
  } else {
    alert.classList.remove('visible');
  }
}

// ============================================================
// RENDERING (図形ベース - 俯瞰視点)
// ============================================================

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r); ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r); ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r); ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r); ctx.closePath();
}

function shadeColor(hex, f) {
  const m = hex.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  if (!m) return hex;
  const r=parseInt(m[1],16), g=parseInt(m[2],16), b=parseInt(m[3],16);
  const nr=clamp(Math.round(r*f),0,255);
  const ng=clamp(Math.round(g*f),0,255);
  const nb=clamp(Math.round(b*f),0,255);
  return '#'+nr.toString(16).padStart(2,'0')+ng.toString(16).padStart(2,'0')+nb.toString(16).padStart(2,'0');
}

// 色定義 (動物別)
const ANIMAL_STYLE = {
  white_sheep: {wool:'#f0ebdc', face:'#d4c49a', faceBlack:false, shade:'#b89a70'},
  black_sheep: {wool:'#2a241c', face:'#1a1410', faceBlack:true, shade:'#3a342a'},
  bh_sheep:    {wool:'#f0ebdc', face:'#1a1410', faceBlack:true, shade:'#b89a70'},
  goose:       {body:'#f0ede0', dark:'#9ab0c0'},
  chicken:     {body:'#f0dc88', dark:'#a07828', comb:'#c83030', beak:'#e0a020'},
  cow:         {body:'#f0ebdc', patch:'#2a2420', nose:'#e8b0a0', horn:'#e8d8b0'},
  pig:         {body:'#f0b0b8', dark:'#c88890', nose:'#e08088'},
  wolf:        {body:'#6a6458', dark:'#4a4438', head:'#5a5448', nose:'#1a1210', eye:'#d0b000'},
};

// ==== 動物描画 ====
function drawAnimal(a) {
  if (!isVisible(a.x, a.y, 60)) return;
  const sc = wScale();
  const s = w2s(a.x, a.y);
  const R = a.size;
  const g = PARAMS[a.type].group;
  ctx.save();
  ctx.translate(s.x, s.y);
  const r = R * sc;
  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(2*sc, 4*sc, r*0.88, r*0.38, 0, 0, Math.PI*2); ctx.fill();

  // 向き: heading (動いてない時もキープ)
  const ang = a.heading;

  if (g === 'sheep') drawSheepShape(a, r, sc, ang);
  else if (g === 'goose') drawGooseShape(a, r, sc, ang);
  else if (g === 'chicken') drawChickenShape(a, r, sc, ang);
  else if (g === 'cow') drawCowShape(a, r, sc, ang);
  else if (g === 'pig') drawPigShape(a, r, sc, ang);
  else if (g === 'wolf') drawWolfShape(a, r, sc, ang);
  ctx.restore();
}

function drawSheepShape(a, r, sc, ang) {
  const st = ANIMAL_STYLE[a.type];
  // もふもふの揺れ
  const wb = Math.sin((totalT*3) + a.phase) * 0.35;
  ctx.fillStyle = st.wool;
  ctx.beginPath(); ctx.ellipse(0, 0, r+wb*sc, r*0.8, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(140,120,100,0.25)'; ctx.lineWidth = 0.7*sc; ctx.stroke();
  // もふもふ
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  for (let i = 0; i < 5; i++) {
    const pa = (i/5) * Math.PI*2 + totalT*0.5 + a.phase;
    ctx.beginPath();
    ctx.arc(Math.cos(pa)*(r-2*sc)*0.52, Math.sin(pa)*(r-2*sc)*0.52, r*0.26, 0, Math.PI*2);
    ctx.fill();
  }
  // 顔
  const fX = Math.cos(ang)*r*0.6, fY = Math.sin(ang)*r*0.6;
  ctx.fillStyle = st.face;
  ctx.beginPath(); ctx.ellipse(fX, fY, r*0.46, r*0.4, ang, 0, Math.PI*2); ctx.fill();
  // 目
  const perp = ang + Math.PI/2;
  [-1, 1].forEach(side => {
    const ex = fX + Math.cos(ang)*r*0.1 + Math.cos(perp)*side*r*0.22;
    const ey = fY + Math.sin(ang)*r*0.1 + Math.sin(perp)*side*r*0.22;
    ctx.fillStyle = st.faceBlack ? '#f0d0a0' : '#1a0a06';
    ctx.beginPath(); ctx.arc(ex, ey, r*0.12, 0, Math.PI*2); ctx.fill();
  });
  // 耳
  [-1, 1].forEach(side => {
    const ex = fX + Math.cos(perp)*side*r*0.38;
    const ey = fY + Math.sin(perp)*side*r*0.38;
    ctx.fillStyle = st.face;
    ctx.beginPath();
    ctx.ellipse(ex, ey, r*0.14, r*0.08, perp*side, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawGooseShape(a, r, sc, ang) {
  const st = ANIMAL_STYLE.goose;
  // 歩行アニメーション: 上下ボビング
  const spd = Math.hypot(a.vx, a.vy);
  const bob = spd > 20 ? Math.abs(Math.sin(totalT*12 + a.phase)) * 1.8 * sc : 0;
  ctx.save();
  ctx.translate(0, -bob);
  // 体
  ctx.fillStyle = st.body;
  ctx.beginPath(); ctx.ellipse(0, 0, r, r*0.72, ang, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(150,180,200,0.35)'; ctx.lineWidth = 0.8*sc; ctx.stroke();
  // 羽 (羽ばたき: 左右に翼のシルエット)
  const wingOpen = spd > 20 ? 0.3 + Math.sin(totalT*14 + a.phase)*0.15 : 0.18;
  const perp = ang + Math.PI/2;
  [-1, 1].forEach(side => {
    const wx = Math.cos(perp)*side*r*0.4;
    const wy = Math.sin(perp)*side*r*0.4;
    ctx.fillStyle = st.dark;
    ctx.save();
    ctx.translate(wx, wy);
    ctx.rotate(ang + side * wingOpen);
    ctx.beginPath();
    ctx.ellipse(0, 0, r*0.7, r*0.3, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  // 首・頭
  const nkLen = r * 1.15;
  const nkX = Math.cos(ang)*nkLen, nkY = Math.sin(ang)*nkLen;
  ctx.strokeStyle = st.body; ctx.lineWidth = r*0.55; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(nkX, nkY); ctx.stroke();
  // 頭
  ctx.fillStyle = st.body;
  ctx.beginPath(); ctx.arc(nkX, nkY, r*0.4, 0, Math.PI*2); ctx.fill();
  // くちばし
  ctx.fillStyle = '#e0a020';
  ctx.beginPath();
  ctx.moveTo(nkX + Math.cos(ang)*r*0.4, nkY + Math.sin(ang)*r*0.4);
  ctx.lineTo(nkX + Math.cos(ang+0.3)*r*0.72, nkY + Math.sin(ang+0.3)*r*0.72);
  ctx.lineTo(nkX + Math.cos(ang-0.3)*r*0.72, nkY + Math.sin(ang-0.3)*r*0.72);
  ctx.closePath(); ctx.fill();
  // 目
  [-1, 1].forEach(side => {
    const ex = nkX + Math.cos(perp)*side*r*0.18;
    const ey = nkY + Math.sin(perp)*side*r*0.18;
    ctx.fillStyle = '#1a0a06';
    ctx.beginPath(); ctx.arc(ex, ey, r*0.08, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawChickenShape(a, r, sc, ang) {
  const st = ANIMAL_STYLE.chicken;
  const spd = Math.hypot(a.vx, a.vy);
  const bob = spd > 20 ? Math.abs(Math.sin(totalT*16 + a.phase)) * 2*sc : 0;
  ctx.save();
  ctx.translate(0, -bob);
  // 体
  ctx.fillStyle = st.body;
  ctx.beginPath(); ctx.ellipse(0, 0, r, r*0.75, ang, 0, Math.PI*2); ctx.fill();
  // 羽 (羽ばたき激しめ)
  const wingFlap = spd > 20 ? Math.sin(totalT*22 + a.phase) * 0.4 : 0.15;
  const perp = ang + Math.PI/2;
  [-1, 1].forEach(side => {
    const wx = Math.cos(perp)*side*r*0.35;
    const wy = Math.sin(perp)*side*r*0.35;
    ctx.fillStyle = st.dark;
    ctx.save();
    ctx.translate(wx, wy);
    ctx.rotate(ang + side * (0.3 + wingFlap));
    ctx.beginPath();
    ctx.ellipse(0, 0, r*0.55, r*0.25, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  // 尻尾の羽
  const tailA = ang + Math.PI;
  ctx.fillStyle = st.dark;
  ctx.beginPath();
  ctx.ellipse(Math.cos(tailA)*r*0.85, Math.sin(tailA)*r*0.85, r*0.35, r*0.25, tailA, 0, Math.PI*2);
  ctx.fill();
  // 頭
  const hx = Math.cos(ang)*r*0.7, hy = Math.sin(ang)*r*0.7;
  ctx.fillStyle = st.body;
  ctx.beginPath(); ctx.arc(hx, hy, r*0.44, 0, Math.PI*2); ctx.fill();
  // とさか
  ctx.fillStyle = st.comb;
  ctx.beginPath();
  ctx.arc(hx + Math.cos(ang-Math.PI/2)*r*0.3, hy + Math.sin(ang-Math.PI/2)*r*0.3, r*0.2, 0, Math.PI*2);
  ctx.fill();
  // くちばし
  ctx.fillStyle = st.beak;
  ctx.beginPath();
  ctx.moveTo(hx + Math.cos(ang)*r*0.44, hy + Math.sin(ang)*r*0.44);
  ctx.lineTo(hx + Math.cos(ang+0.35)*r*0.7, hy + Math.sin(ang+0.35)*r*0.7);
  ctx.lineTo(hx + Math.cos(ang-0.35)*r*0.7, hy + Math.sin(ang-0.35)*r*0.7);
  ctx.closePath(); ctx.fill();
  // 目
  [-1, 1].forEach(side => {
    const ex = hx + Math.cos(perp)*side*r*0.22 + Math.cos(ang)*r*0.15;
    const ey = hy + Math.sin(perp)*side*r*0.22 + Math.sin(ang)*r*0.15;
    ctx.fillStyle = '#1a0808';
    ctx.beginPath(); ctx.arc(ex, ey, r*0.1, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawCowShape(a, r, sc, ang) {
  const st = ANIMAL_STYLE.cow;
  // 体
  ctx.fillStyle = st.body;
  ctx.beginPath(); ctx.ellipse(0, 0, r*1.05, r*0.78, ang, 0, Math.PI*2); ctx.fill();
  // 黒ぶち (4箇所、変数で出し分け)
  ctx.fillStyle = st.patch;
  const patches = [[0.3,0.25,0.32],[-0.28,-0.25,0.28],[-0.35,0.3,0.22],[0.25,-0.3,0.25]];
  patches.forEach((p, i) => {
    if ((i + a.variant) % 2 === 0) return;
    const px = Math.cos(ang)*p[0]*r - Math.sin(ang)*p[1]*r;
    const py = Math.sin(ang)*p[0]*r + Math.cos(ang)*p[1]*r;
    ctx.beginPath(); ctx.ellipse(px, py, r*p[2], r*p[2]*0.8, ang, 0, Math.PI*2); ctx.fill();
  });
  // 頭
  const hx = Math.cos(ang)*r*0.92, hy = Math.sin(ang)*r*0.92;
  ctx.fillStyle = st.body;
  ctx.beginPath(); ctx.arc(hx, hy, r*0.52, 0, Math.PI*2); ctx.fill();
  // 鼻口
  ctx.fillStyle = st.nose;
  ctx.beginPath();
  ctx.ellipse(hx + Math.cos(ang)*r*0.3, hy + Math.sin(ang)*r*0.3, r*0.3, r*0.22, ang, 0, Math.PI*2);
  ctx.fill();
  const perp = ang + Math.PI/2;
  // 鼻の穴
  ctx.fillStyle = '#4a2828';
  [-1, 1].forEach(side => {
    const nx = hx + Math.cos(ang)*r*0.38 + Math.cos(perp)*side*r*0.1;
    const ny = hy + Math.sin(ang)*r*0.38 + Math.sin(perp)*side*r*0.1;
    ctx.beginPath(); ctx.arc(nx, ny, r*0.06, 0, Math.PI*2); ctx.fill();
  });
  // 耳
  [-1, 1].forEach(side => {
    const ex = hx + Math.cos(perp)*side*r*0.45;
    const ey = hy + Math.sin(perp)*side*r*0.45;
    ctx.fillStyle = st.body;
    ctx.beginPath();
    ctx.ellipse(ex, ey, r*0.2, r*0.12, perp*side, 0, Math.PI*2);
    ctx.fill();
  });
  // 角
  ctx.strokeStyle = st.horn; ctx.lineWidth = r*0.1; ctx.lineCap = 'round';
  [-1, 1].forEach(side => {
    const hnx = hx + Math.cos(perp)*side*r*0.32 - Math.cos(ang)*r*0.2;
    const hny = hy + Math.sin(perp)*side*r*0.32 - Math.sin(ang)*r*0.2;
    ctx.beginPath();
    ctx.moveTo(hnx, hny);
    ctx.lineTo(hnx + Math.cos(perp)*side*r*0.2 - Math.cos(ang)*r*0.1, hny + Math.sin(perp)*side*r*0.2 - Math.sin(ang)*r*0.1);
    ctx.stroke();
  });
  // 目
  [-1, 1].forEach(side => {
    const ex = hx + Math.cos(perp)*side*r*0.22 + Math.cos(ang)*r*0.08;
    const ey = hy + Math.sin(perp)*side*r*0.22 + Math.sin(ang)*r*0.08;
    ctx.fillStyle = '#1a0a06';
    ctx.beginPath(); ctx.arc(ex, ey, r*0.08, 0, Math.PI*2); ctx.fill();
  });
  // 尻尾 (ゆらゆら)
  const ta = ang + Math.PI + Math.sin(totalT*3 + a.phase)*0.4;
  ctx.strokeStyle = st.patch; ctx.lineWidth = 3*sc; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-Math.cos(ang)*r*0.9, -Math.sin(ang)*r*0.9);
  ctx.lineTo(Math.cos(ta)*r*1.3, Math.sin(ta)*r*1.3);
  ctx.stroke();
}

function drawPigShape(a, r, sc, ang) {
  const st = ANIMAL_STYLE.pig;
  // 体
  ctx.fillStyle = st.body;
  ctx.beginPath(); ctx.ellipse(0, 0, r, r*0.82, ang, 0, Math.PI*2); ctx.fill();
  // お腹
  ctx.fillStyle = shadeColor(st.body, 1.08);
  ctx.beginPath(); ctx.ellipse(0, r*0.3, r*0.7, r*0.3, ang, 0, Math.PI*2); ctx.fill();
  // 頭
  const hx = Math.cos(ang)*r*0.82, hy = Math.sin(ang)*r*0.82;
  ctx.fillStyle = st.body;
  ctx.beginPath(); ctx.arc(hx, hy, r*0.5, 0, Math.PI*2); ctx.fill();
  // 鼻 (大きい円)
  ctx.fillStyle = st.nose;
  ctx.beginPath();
  ctx.ellipse(hx + Math.cos(ang)*r*0.35, hy + Math.sin(ang)*r*0.35, r*0.3, r*0.26, ang, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#b05060'; ctx.lineWidth = 1.2*sc; ctx.stroke();
  // 鼻の穴
  ctx.fillStyle = '#3a1818';
  const perp = ang + Math.PI/2;
  [-1, 1].forEach(side => {
    const nx = hx + Math.cos(ang)*r*0.44 + Math.cos(perp)*side*r*0.1;
    const ny = hy + Math.sin(ang)*r*0.44 + Math.sin(perp)*side*r*0.1;
    ctx.beginPath(); ctx.arc(nx, ny, r*0.06, 0, Math.PI*2); ctx.fill();
  });
  // 耳 (三角・ピコピコ)
  const earWig = Math.sin(totalT*5 + a.phase) * 0.1;
  [-1, 1].forEach(side => {
    const ex = hx + Math.cos(perp)*side*r*0.4 - Math.cos(ang)*r*0.1;
    const ey = hy + Math.sin(perp)*side*r*0.4 - Math.sin(ang)*r*0.1;
    ctx.fillStyle = st.dark;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex + Math.cos(perp)*side*r*0.22, ey + Math.sin(perp)*side*r*0.22);
    ctx.lineTo(ex + Math.cos(ang + earWig*side)*r*0.2, ey + Math.sin(ang + earWig*side)*r*0.2);
    ctx.closePath(); ctx.fill();
  });
  // 目
  [-1, 1].forEach(side => {
    const ex = hx + Math.cos(perp)*side*r*0.2 + Math.cos(ang)*r*0.05;
    const ey = hy + Math.sin(perp)*side*r*0.2 + Math.sin(ang)*r*0.05;
    ctx.fillStyle = '#1a0a06';
    ctx.beginPath(); ctx.arc(ex, ey, r*0.08, 0, Math.PI*2); ctx.fill();
  });
  // くるりんしっぽ (回転)
  const tailSpin = totalT*2 + a.phase;
  const ta = ang + Math.PI;
  ctx.strokeStyle = st.dark; ctx.lineWidth = 2*sc; ctx.lineCap = 'round';
  const txo = Math.cos(ta)*r*0.9, tyo = Math.sin(ta)*r*0.9;
  ctx.beginPath();
  ctx.arc(txo, tyo, r*0.18, tailSpin, tailSpin + Math.PI*1.7);
  ctx.stroke();
}

function drawWolfShape(w, r, sc, ang) {
  const st = ANIMAL_STYLE.wolf;
  // 体
  ctx.fillStyle = st.body;
  ctx.beginPath(); ctx.ellipse(0, 0, r*0.9, r*0.68, ang, 0, Math.PI*2); ctx.fill();
  // 頭
  const hx = Math.cos(ang)*r*0.92, hy = Math.sin(ang)*r*0.92;
  ctx.fillStyle = st.head;
  ctx.beginPath(); ctx.arc(hx, hy, r*0.6, 0, Math.PI*2); ctx.fill();
  // 耳 (三角、ピクッ)
  const earWig = Math.sin(totalT*6 + w.phase) * 0.08;
  const perp = ang + Math.PI/2;
  [-1, 1].forEach(side => {
    const ex = hx + Math.cos(perp)*side*r*0.45, ey = hy + Math.sin(perp)*side*r*0.45;
    ctx.fillStyle = st.dark;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex + Math.cos(ang + earWig*side)*r*0.4 + Math.cos(perp)*side*r*0.15,
               ey + Math.sin(ang + earWig*side)*r*0.4 + Math.sin(perp)*side*r*0.15);
    ctx.lineTo(ex + Math.cos(perp)*side*r*0.1, ey + Math.sin(perp)*side*r*0.1);
    ctx.closePath(); ctx.fill();
  });
  // 鼻
  ctx.fillStyle = st.nose;
  ctx.beginPath();
  ctx.arc(hx + Math.cos(ang)*r*0.5, hy + Math.sin(ang)*r*0.5, r*0.18, 0, Math.PI*2);
  ctx.fill();
  // 目 (黄色、光る)
  [-1, 1].forEach(side => {
    const ex = hx + Math.cos(perp)*side*r*0.28 + Math.cos(ang)*r*0.18;
    const ey = hy + Math.sin(perp)*side*r*0.28 + Math.sin(ang)*r*0.18;
    ctx.fillStyle = st.eye;
    ctx.beginPath(); ctx.arc(ex, ey, r*0.15, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0a0800';
    ctx.beginPath(); ctx.arc(ex, ey, r*0.08, 0, Math.PI*2); ctx.fill();
  });
  // しっぽ (大きく振る)
  const ta = ang + Math.PI + Math.sin(totalT*5 + w.phase) * 0.5;
  ctx.strokeStyle = st.head; ctx.lineWidth = 3*sc; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-Math.cos(ang)*r*0.7, -Math.sin(ang)*r*0.7);
  ctx.quadraticCurveTo(Math.cos(ta)*r*1.1, Math.sin(ta)*r*1.1, Math.cos(ta)*r*1.8, Math.sin(ta)*r*1.8);
  ctx.stroke();
}

// ==== 車両 ====
function drawTractor(v) {
  if (!isVisible(v.x, v.y, 60)) return;
  const sc = wScale();
  const s = w2s(v.x, v.y);
  const r = v.size * sc;
  const fa = v.heading;
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(fa);
  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(-r*1.1+3*sc, -r*0.7+5*sc, r*2.2, r*1.4);
  // 後輪 (大)
  ctx.fillStyle = '#1a1a15';
  ctx.fillRect(-r*0.95, -r*0.95, r*0.6, r*0.3);
  ctx.fillRect(-r*0.95, r*0.65, r*0.6, r*0.3);
  // 前輪 (小)
  ctx.fillStyle = '#1a1a15';
  ctx.fillRect(r*0.55, -r*0.75, r*0.45, r*0.22);
  ctx.fillRect(r*0.55, r*0.53, r*0.45, r*0.22);
  // ボディ (緑)
  ctx.fillStyle = '#6aa040';
  ctx.fillRect(-r*0.9, -r*0.55, r*1.9, r*1.1);
  ctx.strokeStyle = '#3a5020'; ctx.lineWidth = 2;
  ctx.strokeRect(-r*0.9, -r*0.55, r*1.9, r*1.1);
  // エンジン (前)
  ctx.fillStyle = '#3a5020';
  ctx.fillRect(r*0.3, -r*0.45, r*0.7, r*0.9);
  // キャビン (ガラス)
  ctx.fillStyle = '#c0dff0';
  ctx.fillRect(-r*0.5, -r*0.4, r*0.7, r*0.8);
  ctx.strokeStyle = '#4a5060'; ctx.lineWidth = 1.5;
  ctx.strokeRect(-r*0.5, -r*0.4, r*0.7, r*0.8);
  // 排気筒
  ctx.fillStyle = '#4a3020';
  ctx.fillRect(r*0.36, -r*0.4, r*0.12, r*0.25);
  ctx.restore();
}
