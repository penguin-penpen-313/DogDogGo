<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>DogDogGo - 牧羊犬ゲーム</title>
<style>
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --bg: #0a1a0f;
  --bg2: #152515;
  --card: #18281a;
  --card2: #1f331e;
  --border: #3a5528;
  --border-bright: #5a7838;
  --text: #d8e8c0;
  --text-dim: #8aa078;
  --text-faint: #5a7048;
  --green: #a8d868;
  --green-bright: #c8e880;
  --yellow: #ffd060;
  --red: #d86048;
  --blue: #6aa8d8;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.mono { font-family: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace; }

.scene {
  position: fixed; inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  padding: calc(var(--safe-top) + 16px) calc(var(--safe-right) + 16px)
           calc(var(--safe-bottom) + 16px) calc(var(--safe-left) + 16px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.scene.active { display: flex; }

h1 {
  margin: 8px 0 4px;
  font-size: clamp(28px, 8vw, 42px);
  font-weight: 800;
  letter-spacing: 0.02em;
  color: var(--green-bright);
  text-shadow: 0 0 20px rgba(168, 216, 104, 0.3);
}
h2 { margin: 16px 0 8px; font-size: 18px; color: var(--green); }
h3 { margin: 12px 0 6px; font-size: 14px; color: var(--green); }
.sub { color: var(--text-dim); font-size: 13px; margin: 0 0 8px; text-align: center; line-height: 1.5; }

.card {
  width: 100%;
  max-width: 420px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 8px 0;
}
.card-title {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 10px;
  text-align: center;
}

/* ==== Buttons ==== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 24px;
  border: 2px solid var(--green);
  background: var(--green);
  color: #0a1a0f;
  font-weight: 700;
  font-size: 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.08s, box-shadow 0.08s;
  min-height: 44px;
}
.btn:active { transform: translateY(2px); }
.btn.primary {
  background: var(--green);
  box-shadow: 0 0 20px rgba(168, 216, 104, 0.4);
  color: #0a1a0f;
}
.btn.secondary {
  background: transparent;
  color: var(--green);
}
.btn.ghost {
  background: transparent;
  border: 1px solid var(--border-bright);
  color: var(--text-dim);
  font-size: 12px;
  padding: 8px 14px;
  min-height: 36px;
}
.btn.small {
  padding: 8px 14px;
  font-size: 12px;
  min-height: 36px;
}

.btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin: 12px 0;
  flex-wrap: wrap;
}

/* ==== Difficulty buttons ==== */
.diff-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.diff-btn {
  padding: 14px 6px;
  background: var(--bg2);
  border: 2px solid var(--border);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  border-radius: 6px;
  cursor: pointer;
}
.diff-btn.active {
  border-color: var(--green);
  background: rgba(168, 216, 104, 0.15);
  color: var(--green-bright);
  box-shadow: 0 0 12px rgba(168, 216, 104, 0.3);
}

/* ==== Room key ==== */
.room-key-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 12px;
  background: #0a1a0a;
  border: 1px dashed var(--border-bright);
  border-radius: 6px;
  margin: 6px 0;
}
.room-key-label {
  font-size: 12px;
  color: var(--text-dim);
  flex-shrink: 0;
}
.room-key {
  font-family: ui-monospace, Menlo, monospace;
  font-size: clamp(14px, 4.2vw, 20px);
  letter-spacing: clamp(2px, 1vw, 6px);
  color: var(--yellow);
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  flex: 1;
  text-align: center;
}
.room-join-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  gap: 8px;
}
.room-join-row label { font-size: 12px; color: var(--text-dim); }
.room-join-row input {
  background: #0a1a0a;
  border: 1px solid var(--border);
  color: var(--yellow);
  padding: 8px 10px;
  border-radius: 4px;
  font-family: ui-monospace, Menlo, monospace;
  font-size: 14px;
  width: 110px;
  letter-spacing: 4px;
  text-align: center;
}
.note {
  font-size: 10px;
  color: var(--text-faint);
  text-align: center;
  margin: 6px 0 0;
}

/* ==== Dog preview & customization ==== */
.dog-preview {
  width: 180px;
  height: 180px;
  background: #2a4a28;
  border: 3px solid var(--border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 10px auto;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  overflow: hidden;
}
.dog-preview canvas { display: block; image-rendering: pixelated; }

.custom-row {
  margin: 10px 0;
}
.custom-label {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 6px;
  text-align: center;
}
.color-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.color-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  padding: 0;
  transition: transform 0.1s;
}
.color-dot.active {
  border-color: var(--green-bright);
  transform: scale(1.1);
  box-shadow: 0 0 10px rgba(200, 232, 128, 0.6);
}
.opt-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}
.opt-btn {
  padding: 8px 14px;
  background: var(--bg2);
  border: 2px solid var(--border);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  border-radius: 6px;
  cursor: pointer;
  min-width: 52px;
}
.opt-btn.active {
  border-color: var(--green);
  color: var(--green-bright);
  background: rgba(168, 216, 104, 0.1);
}

/* ==== Game HUD ==== */
#scene-game { padding: 0; background: #1a2a18; }
#game-canvas {
  position: absolute; inset: 0;
  width: 100vw; height: 100vh;
  display: block;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
}
.hud {
  position: fixed; top: 0; left: 0; right: 0;
  padding: calc(var(--safe-top) + 8px) 12px 8px;
  background: linear-gradient(to bottom, rgba(10,26,15,0.85), rgba(10,26,15,0));
  pointer-events: none;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.hud-chip {
  background: rgba(10, 26, 15, 0.7);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 11px;
  pointer-events: auto;
}
.hud-chip-label { color: var(--text-faint); font-size: 9px; letter-spacing: 0.1em; }
.hud-chip-value { color: var(--green-bright); font-weight: 700; font-size: 15px; font-family: ui-monospace, monospace; }
#hud-targets {
  display: flex; flex-direction: column; gap: 2px;
  font-size: 12px;
  max-width: 180px;
}
.target-row {
  display: flex; align-items: center; gap: 6px;
  background: rgba(10,26,15,0.6);
  padding: 3px 8px;
  border-radius: 4px;
}
.target-emoji { font-size: 14px; }
.target-count { font-family: ui-monospace, monospace; font-size: 12px; color: var(--green-bright); }
.target-count.full { color: var(--yellow); }

/* ==== Joystick (fixed, always visible on touch devices) ==== */
#joystick {
  position: fixed;
  left: calc(var(--safe-left) + 20px);
  bottom: calc(var(--safe-bottom) + 20px);
  width: 120px; height: 120px;
  display: none;
  z-index: 20;
  touch-action: none;
}
#joystick.visible { display: block; }
#joystick-base {
  position: absolute; inset: 0;
  background: radial-gradient(circle, rgba(168,216,104,0.12), rgba(168,216,104,0.04));
  border: 2px solid rgba(168, 216, 104, 0.4);
  border-radius: 50%;
}
#joystick-knob {
  position: absolute;
  left: 50%; top: 50%;
  width: 50px; height: 50px;
  margin: -25px 0 0 -25px;
  background: rgba(200, 232, 128, 0.7);
  border: 2px solid var(--green-bright);
  border-radius: 50%;
  pointer-events: none;
  transition: background 0.15s;
}
#joystick.active #joystick-knob {
  background: rgba(200, 232, 128, 0.95);
}

/* ==== Bark button ==== */
#bark-btn {
  position: fixed;
  right: calc(var(--safe-right) + 20px);
  bottom: calc(var(--safe-bottom) + 20px);
  width: 90px; height: 90px;
  border-radius: 50%;
  background: var(--yellow);
  border: 3px solid #d8a848;
  color: #4a2a08;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  z-index: 20;
  box-shadow: 0 4px 0 #a07830, 0 6px 16px rgba(0,0,0,0.4);
  display: none;
  line-height: 1.2;
}
#bark-btn.visible { display: block; }
#bark-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #a07830, 0 3px 10px rgba(0,0,0,0.4); }
#bark-btn.cooldown { background: #6a6a50; border-color: #4a4a30; color: #2a2a20; }

#bark-meter {
  position: fixed;
  right: calc(var(--safe-right) + 20px);
  bottom: calc(var(--safe-bottom) + 118px);
  font-size: 10px;
  color: var(--text-dim);
  background: rgba(10,26,15,0.7);
  padding: 3px 8px;
  border-radius: 4px;
  z-index: 20;
  display: none;
}
#bark-meter.visible { display: block; }

#key-hint {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 12px);
  left: 50%;
  transform: translateX(-50%);
  color: var(--text-faint);
  font-size: 11px;
  z-index: 15;
  pointer-events: none;
  background: rgba(10,26,15,0.5);
  padding: 4px 10px;
  border-radius: 4px;
}

#farmer-alert {
  position: fixed;
  top: calc(var(--safe-top) + 80px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(216, 96, 72, 0.9);
  border: 2px solid #ffa090;
  color: white;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  z-index: 15;
  display: none;
  text-align: center;
  box-shadow: 0 0 20px rgba(216, 96, 72, 0.5);
}
#farmer-alert.visible { display: block; animation: pulseAlert 0.8s ease-in-out infinite; }
@keyframes pulseAlert {
  0%, 100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.04); }
}

/* ==== Result scene ==== */
.result-verdict {
  font-size: 48px;
  font-weight: 800;
  margin: 20px 0;
  letter-spacing: 0.05em;
}
.result-verdict.success { color: var(--green-bright); text-shadow: 0 0 20px rgba(168, 216, 104, 0.5); }
.result-verdict.fail { color: var(--red); text-shadow: 0 0 20px rgba(216, 96, 72, 0.5); }

.result-table {
  width: 100%;
  max-width: 360px;
  border-collapse: collapse;
  margin: 10px 0;
}
.result-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.result-table td:first-child { color: var(--text-dim); }
.result-table td:last-child { text-align: right; font-family: ui-monospace, monospace; color: var(--green-bright); }

/* ==== Debug scene ==== */
#scene-debug { padding: 0; }
.debug-top {
  width: 100%;
  padding: calc(var(--safe-top) + 12px) 12px 8px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.debug-top h2 { margin: 0; font-size: 16px; }
.debug-controls { display: flex; gap: 6px; flex-wrap: wrap; }
.debug-tabs {
  display: flex;
  gap: 4px;
  padding: 10px 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.dbg-tab {
  flex-shrink: 0;
  padding: 6px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
}
.dbg-tab.active { background: var(--green); color: #0a1a0f; border-color: var(--green); }
.debug-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 12px calc(var(--safe-bottom) + 20px);
  width: 100%;
}
.dbg-section { margin-bottom: 18px; }
.dbg-section h3 { margin: 8px 0 6px; font-size: 13px; color: var(--green); }
.dbg-note { font-size: 10px; color: var(--text-faint); margin-bottom: 6px; line-height: 1.4; }
.dbg-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  background: var(--bg2);
  border-radius: 4px;
  overflow: hidden;
}
.dbg-table th {
  background: var(--bg);
  color: var(--text-dim);
  padding: 4px 6px;
  text-align: left;
  font-weight: 600;
  font-size: 10px;
}
.dbg-table td { padding: 3px 6px; border-top: 1px solid var(--border); }
.dbg-table td:first-child { color: var(--text); font-family: ui-monospace, monospace; }
.dbg-table input[type="number"] {
  width: 70px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--yellow);
  padding: 3px 5px;
  border-radius: 3px;
  font-family: ui-monospace, monospace;
  font-size: 11px;
}
.dbg-react-group {
  border-left: 2px solid var(--border-bright);
  margin: 8px 0;
  padding-left: 10px;
}
.dbg-react-group h4 {
  margin: 4px 0;
  font-size: 11px;
  color: var(--green);
}

#version-tag {
  color: var(--text-faint);
  font-size: 10px;
  margin-top: 12px;
  font-family: ui-monospace, monospace;
}
</style>
</head>
<body>

<!-- ====================== MENU SCENE ====================== -->
<div class="scene active" id="scene-menu">
  <h1>🐕 DogDogGo</h1>
  <p class="sub">牧羊犬になって、動物を正しい柵へ誘導しよう！<br>全動物を目標数柵に入れてクリア</p>

  <div class="card">
    <div class="card-title">🎯 難易度</div>
    <div class="diff-row">
      <button class="diff-btn active" data-diff="easy">易しい</button>
      <button class="diff-btn" data-diff="mid">ふつう</button>
      <button class="diff-btn" data-diff="hard">難しい</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🔑 マルチプレイ (試験中)</div>
    <div class="room-key-row">
      <span class="room-key-label">KEY:</span>
      <span class="room-key" id="room-key-mine">--------</span>
    </div>
    <div class="room-join-row">
      <label>参加:</label>
      <input type="text" id="room-key-join" maxlength="8" placeholder="8桁">
    </div>
    <div class="note">※友達と一緒に遊べます (実装予定)</div>
  </div>

  <div class="btn-row">
    <button class="btn primary" id="start-btn">はじめる</button>
  </div>
  <button class="btn ghost" id="to-debug-1">⚙ デバッグ画面</button>
  <div id="version-tag">v0.10 "DogDogGo"</div>
</div>

<!-- ====================== WAITING SCENE ====================== -->
<div class="scene" id="scene-waiting">
  <h2 id="wait-level" style="font-size: 24px; color: var(--yellow); margin-top: 8px;">LEVEL 1</h2>
  <p class="sub" id="wait-desc">犬のすがたを選んで、フィールドへ出発！</p>

  <div class="dog-preview">
    <canvas id="dog-preview-canvas" width="160" height="160"></canvas>
  </div>

  <div class="card">
    <div class="custom-row">
      <div class="custom-label">🎨 からだの色</div>
      <div class="color-dots" id="dog-colors"></div>
    </div>
    <div class="custom-row">
      <div class="custom-label">👂 耳のかたち</div>
      <div class="opt-row" id="dog-ears">
        <button class="opt-btn active" data-ear="floppy">たれ耳</button>
        <button class="opt-btn" data-ear="pointy">立ち耳</button>
        <button class="opt-btn" data-ear="round">まる耳</button>
      </div>
    </div>
    <div class="custom-row">
      <div class="custom-label">🏷 もよう</div>
      <div class="opt-row" id="dog-patterns">
        <button class="opt-btn active" data-pat="solid">むじ</button>
        <button class="opt-btn" data-pat="spot">ぶち</button>
        <button class="opt-btn" data-pat="belt">おび</button>
        <button class="opt-btn" data-pat="stripe">しま</button>
      </div>
    </div>
    <div class="custom-row">
      <div class="custom-label">📏 サイズ</div>
      <div class="opt-row" id="dog-sizes">
        <button class="opt-btn" data-sz="s">小</button>
        <button class="opt-btn active" data-sz="m">中</button>
        <button class="opt-btn" data-sz="l">大</button>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn secondary" id="back-to-menu-btn">← 戻る</button>
    <button class="btn primary" id="go-field-btn">GO FIELD →</button>
  </div>
  <button class="btn ghost" id="to-debug-2">⚙ デバッグ画面</button>
</div>

<!-- ====================== GAME SCENE ====================== -->
<div class="scene" id="scene-game">
  <canvas id="game-canvas"></canvas>
  <div class="hud">
    <div class="hud-chip">
      <div class="hud-chip-label">LEVEL</div>
      <div class="hud-chip-value" id="hud-level">1</div>
    </div>
    <div id="hud-targets"></div>
    <div class="hud-chip">
      <div class="hud-chip-label">BARK</div>
      <div class="hud-chip-value" id="hud-bark">100%</div>
    </div>
  </div>
  <div id="joystick">
    <div id="joystick-base"></div>
    <div id="joystick-knob"></div>
  </div>
  <button id="bark-btn">🐾<br>吠える</button>
  <div id="bark-meter">効果 <span id="bark-pct">100%</span></div>
  <div id="key-hint">WASD/矢印=移動 ・ Space=吠える</div>
  <div id="farmer-alert">牧場主に近づいている！ あと<span id="farmer-bark-count">3</span>回吠えたらゲーム終了</div>
</div>

<!-- ====================== RESULT SCENE ====================== -->
<div class="scene" id="scene-result">
  <div class="result-verdict" id="result-verdict">判定中</div>
  <p class="sub" id="result-sub"></p>
  <div class="card">
    <div class="card-title">柵の状況</div>
    <table class="result-table" id="result-table"></table>
  </div>
  <div class="btn-row">
    <button class="btn secondary" id="result-menu-btn">メニュー</button>
    <button class="btn primary" id="result-next-btn">次のレベル →</button>
  </div>
</div>

<!-- ====================== DEBUG SCENE ====================== -->
<div class="scene" id="scene-debug">
  <div class="debug-top">
    <h2>⚙ デバッグ: 社会力パラメータ</h2>
    <div class="debug-controls">
      <button class="btn ghost small" id="dbg-load-default">初期値</button>
      <button class="btn ghost small" id="dbg-save-json">保存(JSON)</button>
      <input type="file" id="dbg-load-file" accept=".json" style="display:none">
      <button class="btn ghost small" id="dbg-load-json">読込</button>
      <button class="btn small" id="dbg-close">← 戻る</button>
    </div>
  </div>
  <div class="debug-tabs" id="debug-tabs"></div>
  <div class="debug-body" id="debug-body"></div>
</div>

<script>
'use strict';

// ============================================================
// CONSTANTS & PALETTE
// ============================================================
const VIEW_W = 720;  // 仮想ワールド単位の表示幅
const PIXEL = 4;     // ドット絵の1ピクセル = 4ワールド単位
const TICK = 1/60;

function resolveParams(P) {
  for (const k in P) {
    if (typeof P[k].react === 'string' && P[k].react.startsWith('INHERIT:')) {
      const src = P[k].react.split(':')[1];
      P[k].react = JSON.parse(JSON.stringify(P[src].react));
    }
  }
  return P;
}

let PARAMS = JSON.parse(JSON.stringify(DEFAULT_PARAMS));

// ============================================================
// UTILITIES
// ============================================================
function rnd(a, b) { return a + Math.random() * (b - a); }
function rndRange(arr) { return rnd(arr[0], arr[1]); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b-a)*t; }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function genRoomKey() {
  let s = '';
  for (let i = 0; i < 8; i++) s += Math.floor(Math.random()*10);
  return s;
}
function w2s(wx, wy) {
  const sc = CW / VIEW_W;
  return [(wx - camX) * sc + CW/2, (wy - camY) * sc + CH/2];
}
function wScale() { return CW / VIEW_W; }
function isVisible(wx, wy, m=80) {
  const [sx, sy] = w2s(wx, wy);
  return sx > -m && sx < CW+m && sy > -m && sy < CH+m;
}

function resize() {
  CW = window.innerWidth;
  CH = window.innerHeight;
  canvas.width = CW;
  canvas.height = CH;
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);

function showScene(name) {
  currentScene = name;
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('scene-' + name);
  if (el) el.classList.add('active');
  const isGame = name === 'game';
  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  document.getElementById('joystick').classList.toggle('visible', isGame && isMobile);
  document.getElementById('bark-btn').classList.toggle('visible', isGame);
  document.getElementById('bark-meter').classList.toggle('visible', isGame);
  document.getElementById('key-hint').style.display = (isGame && !isMobile) ? 'block' : 'none';
  if (isGame) resize();
}

// ============================================================
// LEVEL SPEC (難易度・レベルから具体的な設定を導出)
// ============================================================
function computeLevelSpec() {
  const lv = GAME.level;
  const diff = GAME.difficulty;

  // 難易度の基本パラメータ
  const startOffset = diff==='easy' ? 0 : (diff==='hard' ? 2 : 1);
  const progressMul = diff==='easy' ? 0.55 : (diff==='hard' ? 1.55 : 1.0);
  const baseMul     = diff==='easy' ? 0.75 : (diff==='hard' ? 1.35 : 1.0);
  const effLv = startOffset + (lv - 1) * progressMul;

  // 前回実績による自動調整
  const perfAdj = clamp(1.0 + (GAME.prevAchievement - 0.85) * 0.4, 0.8, 1.25);
  const qty = baseMul * perfAdj;

  const fieldSize = Math.round(1400 + effLv * 110);

  // 出現する動物: 白羊 + ランダムプール
  const types = ['white_sheep'];
  const pool = ['black_sheep', 'bh_sheep', 'goose', 'chicken', 'cow', 'pig'];
  let addN = Math.round(clamp(effLv * 0.6, 0, pool.length));
  if (diff === 'hard' && lv >= 1 && addN < 1) addN = 1;
  const shuffled = shuffle(pool);
  for (let i = 0; i < addN; i++) types.push(shuffled[i]);

  // 各種の数
  const counts = {};
  types.forEach(t => {
    let base = 0;
    if (t === 'white_sheep') base = 8 + effLv * 2.5;
    else if (t === 'black_sheep') base = 4 + effLv * 1.8;
    else if (t === 'bh_sheep')    base = 4 + effLv * 1.8;
    else if (t === 'goose')       base = 5 + effLv * 2.0;
    else if (t === 'chicken')     base = 6 + effLv * 2.2;
    else if (t === 'cow')         base = 3 + effLv * 1.3;
    else if (t === 'pig')         base = 2 + effLv * 1.1;
    counts[t] = Math.max(1, Math.round(base * qty));
  });

  let successRate = diff==='easy'?0.70 : (diff==='mid'?0.78 : 0.85);
  successRate = clamp(successRate + (GAME.prevAchievement - 0.85)*0.1, 0.55, 0.95);

  const wolfInterval = Math.max(6, 28 - effLv * 2.2);
  const wolfMaxConcurrent = 1 + Math.floor(effLv * 0.4);

  let nTractor = Math.min(3, Math.floor(effLv * 0.45));
  let nTruck = Math.min(3, Math.floor(Math.max(0, effLv - 0.8) * 0.45));
  if (diff === 'hard' && lv >= 1) nTractor = Math.max(nTractor, 1);

  const huts  = Math.round(4 + effLv * 1.2);
  const trees = Math.round(16 + effLv * 3.5);
  const ponds = Math.max(2, Math.round(2 + effLv * 0.4));

  return {
    fieldSize, types, counts, successRate,
    wolfInterval, wolfMaxConcurrent,
    nTractor, nTruck, huts, trees, ponds,
    effLv,
  };
}

// ============================================================
// FOREST (外周の森)
// ============================================================
function buildForest() {
  FOREST_R = [];
  const baseR = FIELD_SIZE/2 - 120;
  for (let i = 0; i < FOREST_POINTS; i++) {
    const a = i / FOREST_POINTS * Math.PI * 2;
    let n = 0;
    n += Math.sin(a*3 + 1.2) * 0.10;
    n += Math.sin(a*5 + 2.4) * 0.06;
    n += Math.sin(a*7 + 0.8) * 0.04;
    n += Math.sin(a*11 + 3.1) * 0.025;
    FOREST_R.push(baseR * (1 + n));
  }
}
function forestRAt(angle) {
  const a = ((angle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const idx = Math.floor(a / (Math.PI*2) * FOREST_POINTS) % FOREST_POINTS;
  return FOREST_R[idx];
}
function inForest(x, y) {
  const d = Math.hypot(x, y);
  const a = Math.atan2(y, x);
  return d > forestRAt(a);
}
function distToForestEdge(x, y) {
  const d = Math.hypot(x, y);
  const a = Math.atan2(y, x);
  return forestRAt(a) - d;  // positive = inside field
}
function forestRepulse(x, y, avoidDist) {
  const d = distToForestEdge(x, y);
  if (d > avoidDist) return [0, 0];
  const a = Math.atan2(y, x);
  // 中心方向へのベクトル
  const strength = (1 - d/avoidDist);
  return [-Math.cos(a) * strength, -Math.sin(a) * strength];
}

// ============================================================
// FIELD BUILD (柵, 小屋, 池, 木, 牧場主)
// ============================================================
function buildField() {
  const spec = LEVEL_SPEC;
  FIELD_SIZE = spec.fieldSize;
  buildForest();

  PENS = [];
  HUTS = [];
  TREES = [];
  PONDS = [];

  const inner = 120;
  const usableR = FIELD_SIZE/2 - 180;

  function randPos(margin = 160, tries = 100) {
    for (let t = 0; t < tries; t++) {
      const a = Math.random() * Math.PI * 2;
      const r = Math.random() * (usableR - margin) + margin*0.5;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      if (distToForestEdge(x, y) < margin*0.6) continue;
      let ok = true;
      for (const p of PENS) {
        if (Math.hypot(p.cx - x, p.cy - y) < p.size + 180) { ok = false; break; }
      }
      if (!ok) continue;
      for (const h of HUTS) {
        if (Math.hypot(h.x - x, h.y - y) < h.size + 100) { ok = false; break; }
      }
      if (!ok) continue;
      for (const p of PONDS) {
        if (Math.hypot(p.x - x, p.y - y) < p.r + 80) { ok = false; break; }
      }
      if (ok) return [x, y];
    }
    return null;
  }

  // 1. 柵 (動物種ごと)
  const penTypes = Array.from(new Set(spec.types.map(t => PARAMS[t].pen).filter(p => p)));
  penTypes.forEach(penType => {
    const pos = randPos(220);
    if (!pos) return;
    const [x, y] = pos;
    const size = 180;
    const gateDir = Math.floor(Math.random() * 4); // 0=N 1=E 2=S 3=W
    PENS.push({
      cx: x, cy: y, size, penType, gateDir,
      gateWidth: 80,
    });
  });

  // 2. 池
  for (let i = 0; i < spec.ponds; i++) {
    const pos = randPos(150);
    if (!pos) continue;
    PONDS.push({ x: pos[0], y: pos[1], r: 60 + Math.random()*50 });
  }

  // 3. 小屋
  for (let i = 0; i < spec.huts; i++) {
    const pos = randPos(120);
    if (!pos) continue;
    HUTS.push({
      x: pos[0], y: pos[1],
      w: 70 + Math.random()*40,
      h: 70 + Math.random()*40,
      size: 50,
      style: Math.random() < 0.5 ? 'hut' : 'house',
      rot: Math.floor(Math.random()*4) * Math.PI/2,
    });
  }

  // 4. 木
  for (let i = 0; i < spec.trees; i++) {
    const pos = randPos(60);
    if (!pos) continue;
    TREES.push({
      x: pos[0], y: pos[1],
      r: 18 + Math.random()*12,
      variant: Math.random() < 0.3 ? 'tall' : 'round',
    });
  }

  // 5. 牧場主 (中央寄りのランダム位置)
  const fa = Math.random() * Math.PI * 2;
  const fr = Math.random() * usableR * 0.4;
  FARMER = { x: Math.cos(fa) * fr, y: Math.sin(fa) * fr };
}

// ============================================================
// PEN HELPERS
// ============================================================
function penWalls(pen) {
  // 4辺: {x1,y1,x2,y2, gate: bool}
  const h = pen.size;
  const walls = [];
  const gw = pen.gateWidth;
  const c = [pen.cx, pen.cy];
  // N (top), E (right), S (bottom), W (left)
  const sides = [
    {x1: c[0]-h, y1: c[1]-h, x2: c[0]+h, y2: c[1]-h, dir: 0},
    {x1: c[0]+h, y1: c[1]-h, x2: c[0]+h, y2: c[1]+h, dir: 1},
    {x1: c[0]-h, y1: c[1]+h, x2: c[0]+h, y2: c[1]+h, dir: 2},
    {x1: c[0]-h, y1: c[1]-h, x2: c[0]-h, y2: c[1]+h, dir: 3},
  ];
  sides.forEach(s => {
    if (s.dir === pen.gateDir) {
      // ゲート (中央を開けて両側に残す)
      if (s.dir === 0 || s.dir === 2) {
        walls.push({x1: s.x1, y1: s.y1, x2: c[0]-gw, y2: s.y1});
        walls.push({x1: c[0]+gw, y1: s.y1, x2: s.x2, y2: s.y1});
      } else {
        walls.push({x1: s.x1, y1: s.y1, x2: s.x1, y2: c[1]-gw});
        walls.push({x1: s.x1, y1: c[1]+gw, x2: s.x1, y2: s.y2});
      }
    } else {
      walls.push({x1: s.x1, y1: s.y1, x2: s.x2, y2: s.y2});
    }
  });
  return walls;
}

function inPen(pen, x, y) {
  const h = pen.size;
  return x > pen.cx-h && x < pen.cx+h && y > pen.cy-h && y < pen.cy+h;
}

function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2-x1, dy = y2-y1;
  const len2 = dx*dx + dy*dy;
  if (len2 < 0.001) return { d: Math.hypot(px-x1, py-y1), cx: x1, cy: y1 };
  let t = ((px-x1)*dx + (py-y1)*dy) / len2;
  t = clamp(t, 0, 1);
  const cx = x1 + dx*t, cy = y1 + dy*t;
  return { d: Math.hypot(px-cx, py-cy), cx, cy };
}

function penWallForce(pen, x, y, isVehicle) {
  const walls = penWalls(pen);
  let fx = 0, fy = 0;
  const avoid = isVehicle ? 40 : 30;
  walls.forEach(w => {
    const r = distToSegment(x, y, w.x1, w.y1, w.x2, w.y2);
    if (r.d < avoid && r.d > 0.1) {
      const s = (1 - r.d/avoid) / r.d;
      fx += (x - r.cx) * s;
      fy += (y - r.cy) * s;
    }
  });
  // 車両はゲートも通さない
  if (isVehicle) {
    // 4辺全てを壁として扱う (ゲートも)
    const hh = pen.size;
    const fullSides = [
      [pen.cx-hh, pen.cy-hh, pen.cx+hh, pen.cy-hh],
      [pen.cx+hh, pen.cy-hh, pen.cx+hh, pen.cy+hh],
      [pen.cx-hh, pen.cy+hh, pen.cx+hh, pen.cy+hh],
      [pen.cx-hh, pen.cy-hh, pen.cx-hh, pen.cy+hh],
    ];
    fullSides.forEach(s => {
      const r = distToSegment(x, y, s[0], s[1], s[2], s[3]);
      if (r.d < avoid && r.d > 0.1) {
        const sc = (1 - r.d/avoid) / r.d;
        fx += (x - r.cx) * sc;
        fy += (y - r.cy) * sc;
      }
    });
  }
  return [fx, fy];
}

function penHardClamp(e) {
  const R = e.size;
  const isVehicle = e.type === 'tractor' || e.type === 'truck';
  for (const pen of PENS) {
    const walls = isVehicle
      ? [
          [pen.cx-pen.size, pen.cy-pen.size, pen.cx+pen.size, pen.cy-pen.size],
          [pen.cx+pen.size, pen.cy-pen.size, pen.cx+pen.size, pen.cy+pen.size],
          [pen.cx-pen.size, pen.cy+pen.size, pen.cx+pen.size, pen.cy+pen.size],
          [pen.cx-pen.size, pen.cy-pen.size, pen.cx-pen.size, pen.cy+pen.size],
        ]
      : penWalls(pen).map(w => [w.x1,w.y1,w.x2,w.y2]);
    for (const s of walls) {
      const r = distToSegment(e.x, e.y, s[0], s[1], s[2], s[3]);
      if (r.d < R) {
        const nx = (e.x - r.cx) / (r.d + 0.001);
        const ny = (e.y - r.cy) / (r.d + 0.001);
        e.x = r.cx + nx * R;
        e.y = r.cy + ny * R;
        const vd = e.vx * nx + e.vy * ny;
        if (vd < 0) { e.vx -= vd*nx; e.vy -= vd*ny; }
      }
    }
  }
}

// ============================================================
// ENTITY CREATION & FORCES
// ============================================================
function makeEntity(typeKey, x, y) {
  const P = PARAMS[typeKey];
  const e = {
    type: typeKey,
    x, y, vx: 0, vy: 0,
    maxSpeed: rndRange(P.maxSpeed),
    inertia: rndRange(P.inertia),
    size: Array.isArray(P.size) ? rndRange(P.size) : P.size,
    maxForce: Array.isArray(P.maxForce) ? rndRange(P.maxForce) : (P.maxForce || 0),
    wanderStr: rndRange(P.wander), wanderTurn: rndRange(P.wanderTurn),
    wanderAngle: Math.random()*Math.PI*2,
    goalStr: rndRange(P.goalAttract), goalR: rndRange(P.goalR),
    goal: { x: x + rnd(-200,200), y: y + rnd(-200,200), updateAt: 0 },
    pondStr: rndRange(P.pond.str), pondRange: rndRange(P.pond.range),
    treeStr: rndRange(P.tree.str), treeRange: rndRange(P.tree.range),
    hutStr: rndRange(P.hut.str), hutRange: rndRange(P.hut.range),
    fenceStr: rndRange(P.fence.str), fenceRange: rndRange(P.fence.range),
    forestStr: rndRange(P.forest.str), forestRange: rndRange(P.forest.range),
    reactCoef: {},
    baseSpeed: P.baseSpeed ? rndRange(P.baseSpeed) : 0,
    heading: Math.random() * Math.PI*2,
    stopUntil: 0,
    everLeftForest: false, inForestTimer: 0,
    variant: Math.floor(Math.random()*3),
    phase: Math.random() * Math.PI*2,
  };
  // reactの個体値固定
  for (const g in P.react) {
    const r = P.react[g];
    const coef = {};
    for (const k in r) {
      coef[k] = Array.isArray(r[k]) ? rndRange(r[k]) : r[k];
    }
    e.reactCoef[g] = coef;
  }
  return e;
}

function reactKey(e) { return PARAMS[e.type].group; }

function pickRandomGoal(e) {
  const a = Math.random() * Math.PI * 2;
  const r = Math.random() * (FIELD_SIZE*0.4) + 100;
  return { x: Math.cos(a)*r, y: Math.sin(a)*r, updateAt: totalT + rnd(10, 120) };
}

function updateGoal(e) {
  if (totalT >= e.goal.updateAt) e.goal = pickRandomGoal(e);
}

function computeForces(e, dt) {
  const P = PARAMS[e.type];
  let fx = 0, fy = 0;

  // 他エンティティとの相互作用
  for (const o of ENTITIES) {
    if (o === e) continue;
    const ok = reactKey(o);
    const coef = e.reactCoef[ok];
    if (!coef) continue;
    const dx = o.x - e.x, dy = o.y - e.y;
    const d = Math.hypot(dx, dy);
    if (d < 0.5 || d > 600) continue;
    const nx = dx / d, ny = dy / d;
    // 距離反発/引力 (prS=強度 prR=範囲)
    if (coef.prS !== undefined && coef.prR > 0) {
      if (d < coef.prR) {
        const s = coef.prS * (1 - d/coef.prR) / (d + 1);
        fx -= nx * s; fy -= ny * s;
      }
    }
    // 相対速度の接近成分
    if (coef.apS !== undefined && coef.apR > 0 && d < coef.apR) {
      const rvx = o.vx - e.vx, rvy = o.vy - e.vy;
      const app = rvx * (-nx) + rvy * (-ny);  // 接近速度 (>0で近づいてくる)
      if (app > 0) {
        const s = coef.apS * app * (1 - d/coef.apR) / (d + 10) * 0.02;
        fx -= nx * s; fy -= ny * s;
      }
    }
    // 群れ引力 (flock)
    if (coef.flock !== undefined && coef.flockR > 0 && d < coef.flockR) {
      const s = coef.flock * (1 - d/coef.flockR);
      fx -= nx * s; fy -= ny * s;  // flockが負なら引力 (fx+=nx*|s|)
    }
    // 個体分離 (sep)
    if (coef.sep !== undefined && coef.sepR > 0 && d < coef.sepR) {
      const s = coef.sep * (1 - d/coef.sepR) / (d + 1);
      fx -= nx * s; fy -= ny * s;
    }
  }

  // 牧場主
  if (FARMER) {
    const coef = e.reactCoef.farmer;
    if (coef) {
      const dx = FARMER.x - e.x, dy = FARMER.y - e.y;
      const d = Math.hypot(dx, dy);
      if (coef.prR > 0 && d < coef.prR && d > 0.5) {
        const s = coef.prS * (1 - d/coef.prR) / (d+1);
        fx -= dx/d * s; fy -= dy/d * s;
      }
    }
  }

  // 静止物の斥力
  // 木
  for (const t of TREES) {
    const dx = t.x - e.x, dy = t.y - e.y;
    const mx = e.treeRange + t.r + e.size;
    if (Math.abs(dx) > mx || Math.abs(dy) > mx) continue;
    const d = Math.hypot(dx, dy);
    if (d > 0.1 && d < mx) {
      const s = e.treeStr * (1 - d/mx) / (d + 1);
      fx -= dx/d * s; fy -= dy/d * s;
    }
  }
  // 小屋
  for (const h of HUTS) {
    const dx = h.x - e.x, dy = h.y - e.y;
    const mx = e.hutRange + Math.max(h.w, h.h)/2 + e.size;
    if (Math.abs(dx) > mx || Math.abs(dy) > mx) continue;
    const d = Math.hypot(dx, dy);
    if (d > 0.1 && d < mx) {
      const s = e.hutStr * (1 - d/mx) / (d + 1);
      fx -= dx/d * s; fy -= dy/d * s;
    }
  }
  // 柵
  const isVehicle = e.type === 'tractor' || e.type === 'truck';
  for (const pen of PENS) {
    const dx = pen.cx - e.x, dy = pen.cy - e.y;
    if (Math.abs(dx) > pen.size + 120 || Math.abs(dy) > pen.size + 120) continue;
    const [wfx, wfy] = penWallForce(pen, e.x, e.y, isVehicle);
    fx += wfx * e.fenceStr; fy += wfy * e.fenceStr;
  }
  // 池
  for (const p of PONDS) {
    const dx = p.x - e.x, dy = p.y - e.y;
    const mx = e.pondRange + p.r + e.size;
    if (Math.abs(dx) > mx || Math.abs(dy) > mx) continue;
    const d = Math.hypot(dx, dy);
    if (d > 0.1 && d < mx) {
      const s = e.pondStr * (1 - d/mx) / (d + 1);
      fx -= dx/d * s; fy -= dy/d * s;
    }
  }
  // 森
  if (P.avoidForest) {
    const [rfx, rfy] = forestRepulse(e.x, e.y, e.forestRange);
    fx += rfx * e.forestStr;
    fy += rfy * e.forestStr;
  }

  // ランダム目標への引力
  if (e.goalStr > 0) {
    const dx = e.goal.x - e.x, dy = e.goal.y - e.y;
    const d = Math.hypot(dx, dy);
    if (d > 10 && d < e.goalR) {
      const s = e.goalStr * (1 - d/e.goalR);
      fx += dx/d * s; fy += dy/d * s;
    }
  }

  // ランダムウォーク
  if (e.wanderStr > 0) {
    e.wanderAngle += (Math.random() - 0.5) * e.wanderTurn * dt;
    fx += Math.cos(e.wanderAngle) * e.wanderStr;
    fy += Math.sin(e.wanderAngle) * e.wanderStr;
  }

  // 狼の自走 (ゴールの代わりに定速で進む)
  if (e.baseSpeed > 0) {
    const cs = Math.hypot(e.vx, e.vy);
    const desired = e.baseSpeed;
    if (cs < desired) {
      const ang = cs > 0.1 ? Math.atan2(e.vy, e.vx) : e.wanderAngle;
      fx += Math.cos(ang) * (desired - cs) * 8;
      fy += Math.sin(ang) * (desired - cs) * 8;
    }
  }

  // 吠えの斥力 (dogからの)
  if (barkEffect > 0 && dog && e.type !== 'dog' && e.type !== 'tractor' && e.type !== 'truck') {
    for (const b of barks) {
      if (b.life <= 0) continue;
      const dx = e.x - b.x, dy = e.y - b.y;
      const d = Math.hypot(dx, dy);
      if (d > 0.5 && d < BARK_RANGE) {
        const s = 1600 * b.life * (1 - d/BARK_RANGE) / (d + 1);
        fx += dx/d * s; fy += dy/d * s;
      }
    }
  }

  // 力の上限 (個体値)
  if (e.maxForce > 0) {
    const fm = Math.hypot(fx, fy);
    if (fm > e.maxForce) {
      fx = fx/fm * e.maxForce;
      fy = fy/fm * e.maxForce;
    }
  }

  return [fx, fy];
}

function updateEntity(e, dt) {
  const P = PARAMS[e.type];
  updateGoal(e);

  // 狼: 森に戻って2秒で消える
  if (e.type === 'wolf') {
    const inF = inForest(e.x, e.y);
    if (!inF) e.everLeftForest = true;
    if (inF && e.everLeftForest) {
      e.inForestTimer += dt;
      if (e.inForestTimer > 2.0) e._remove = true;
    } else {
      e.inForestTimer = 0;
    }
  }

  // トラック: 小屋/柵の前で停止
  if (P.stopNearHut) {
    if (totalT < e.stopUntil) {
      e.vx *= 0.85; e.vy *= 0.85;
      return;
    }
    // 前方の障害物チェック
    const speed = Math.hypot(e.vx, e.vy);
    if (speed > 20) {
      const ang = Math.atan2(e.vy, e.vx);
      const fx2 = e.x + Math.cos(ang) * 90, fy2 = e.y + Math.sin(ang) * 90;
      for (const h of HUTS) {
        if (Math.hypot(h.x - fx2, h.y - fy2) < 80) {
          e.stopUntil = totalT + rnd(1.5, 4);
          break;
        }
      }
      if (!e.stopUntil || e.stopUntil <= totalT) {
        for (const pen of PENS) {
          if (Math.hypot(pen.cx - fx2, pen.cy - fy2) < pen.size + 50) {
            e.stopUntil = totalT + rnd(1.5, 4);
            break;
          }
        }
      }
    }
  }

  const [fx, fy] = computeForces(e, dt);

  // 加速度 = 力 (質量=1)
  e.vx += fx * dt;
  e.vy += fy * dt;

  // 慣性減衰
  const damp = Math.pow(1 - e.inertia, dt*60);
  e.vx *= Math.pow(e.inertia, dt*60);
  e.vy *= Math.pow(e.inertia, dt*60);

  // 速度上限
  const speed = Math.hypot(e.vx, e.vy);
  let maxS = e.maxSpeed;
  // 池で減速
  for (const p of PONDS) {
    const d = Math.hypot(p.x - e.x, p.y - e.y);
    if (d < p.r) { maxS *= P.waterSlow; break; }
  }
  if (speed > maxS) {
    e.vx = e.vx/speed * maxS;
    e.vy = e.vy/speed * maxS;
  }

  // 車両の旋回制限
  if (P.turnRate && speed > 5) {
    const targetAng = Math.atan2(e.vy, e.vx);
    let diff = targetAng - e.heading;
    while (diff > Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;
    const maxTurn = P.turnRate * dt;
    if (Math.abs(diff) > maxTurn) {
      e.heading += Math.sign(diff) * maxTurn;
      // 速度も旋回に合わせる
      e.vx = Math.cos(e.heading) * speed;
      e.vy = Math.sin(e.heading) * speed;
    } else {
      e.heading = targetAng;
    }
  } else if (speed > 1) {
    e.heading = Math.atan2(e.vy, e.vx);
  }

  e.x += e.vx * dt;
  e.y += e.vy * dt;

  // フィールド外に出ないようクランプ (森の内側まで)
  const d = Math.hypot(e.x, e.y);
  const a = Math.atan2(e.y, e.x);
  const rMax = forestRAt(a);
  if (P.avoidForest && d > rMax - 20) {
    const t = (rMax - 20) / d;
    e.x *= t; e.y *= t;
    e.vx *= 0.5; e.vy *= 0.5;
  }

  // 硬い当たり判定
  // 木
  for (const t of TREES) {
    const dx = e.x - t.x, dy = e.y - t.y;
    const d = Math.hypot(dx, dy);
    const r = t.r + e.size*0.5;
    if (d < r && d > 0.1) {
      const push = (r - d) / d;
      e.x += dx * push; e.y += dy * push;
      const vd = e.vx * dx/d + e.vy * dy/d;
      if (vd < 0) { e.vx -= vd * dx/d; e.vy -= vd * dy/d; }
    }
  }
  // 小屋 (AABB)
  for (const h of HUTS) {
    const hw = h.w/2 + e.size*0.5, hh = h.h/2 + e.size*0.5;
    const dx = e.x - h.x, dy = e.y - h.y;
    if (Math.abs(dx) < hw && Math.abs(dy) < hh) {
      // 押し出し
      const overX = hw - Math.abs(dx);
      const overY = hh - Math.abs(dy);
      if (overX < overY) {
        e.x += Math.sign(dx) * overX;
        e.vx *= -0.3;
      } else {
        e.y += Math.sign(dy) * overY;
        e.vy *= -0.3;
      }
    }
  }
  penHardClamp(e);
}

function updateDog(dt, ix, iy) {
  if (!dog) return;
  // 入力駆動
  const target = dog.maxSpeed;
  const targetVx = ix * target;
  const targetVy = iy * target;
  const followRate = 8;  // 追従速度
  dog.vx += (targetVx - dog.vx) * Math.min(1, followRate * dt);
  dog.vy += (targetVy - dog.vy) * Math.min(1, followRate * dt);

  // 社会力の影響 (牛/豚の接近のみ、半分の強度)
  const [fx, fy] = computeForces(dog, dt);
  dog.vx += fx * dt * 0.3;
  dog.vy += fy * dt * 0.3;

  // 池で減速
  for (const p of PONDS) {
    if (Math.hypot(p.x - dog.x, p.y - dog.y) < p.r) {
      dog.vx *= 0.6; dog.vy *= 0.6;
      break;
    }
  }

  const sp = Math.hypot(dog.vx, dog.vy);
  if (sp > target) {
    dog.vx = dog.vx/sp * target;
    dog.vy = dog.vy/sp * target;
  }

  dog.x += dog.vx * dt;
  dog.y += dog.vy * dt;

  if (sp > 5) dog.heading = Math.atan2(dog.vy, dog.vx);

  // フィールドクランプ
  const d = Math.hypot(dog.x, dog.y);
  const a = Math.atan2(dog.y, dog.x);
  const rMax = forestRAt(a);
  if (d > rMax - 20) {
    const t = (rMax - 20) / d;
    dog.x *= t; dog.y *= t;
    dog.vx *= 0.3; dog.vy *= 0.3;
  }

  // 硬い当たり判定 (動物と同じロジック)
  for (const t of TREES) {
    const dx = dog.x - t.x, dy = dog.y - t.y;
    const dd = Math.hypot(dx, dy);
    const r = t.r + dog.size*0.5;
    if (dd < r && dd > 0.1) {
      const push = (r - dd) / dd;
      dog.x += dx * push; dog.y += dy * push;
    }
  }
  for (const h of HUTS) {
    const hw = h.w/2 + dog.size*0.5, hh = h.h/2 + dog.size*0.5;
    const dx = dog.x - h.x, dy = dog.y - h.y;
    if (Math.abs(dx) < hw && Math.abs(dy) < hh) {
      const overX = hw - Math.abs(dx), overY = hh - Math.abs(dy);
      if (overX < overY) dog.x += Math.sign(dx) * overX;
      else dog.y += Math.sign(dy) * overY;
    }
  }
  penHardClamp(dog);
}

// ============================================================
// LEVEL START
// ============================================================
function startLevel() {
  LEVEL_SPEC = computeLevelSpec();
  buildField();
  ENTITIES = [];
  barks = [];
  farmerNearBarks = 0;
  barkEffect = 1.0;
  barkCooldown = 0;
  GAME.nextWolfSpawn = totalT + LEVEL_SPEC.wolfInterval * 0.5;

  // 犬: フィールド中心近く
  dog = makeEntity('dog', 0, 0);
  ENTITIES.push(dog);

  // 動物をスポーン
  const spec = LEVEL_SPEC;
  spec.types.forEach(t => {
    const n = spec.counts[t];
    for (let i = 0; i < n; i++) {
      let x, y;
      for (let tries = 0; tries < 50; tries++) {
        const a = Math.random() * Math.PI*2;
        const r = Math.random() * (FIELD_SIZE*0.4 - 100) + 150;
        x = Math.cos(a) * r; y = Math.sin(a) * r;
        if (distToForestEdge(x, y) < 40) continue;
        let ok = true;
        for (const pen of PENS) {
          if (inPen(pen, x, y)) { ok = false; break; }
        }
        if (!ok) continue;
        for (const h of HUTS) {
          if (Math.abs(x-h.x) < h.w/2+20 && Math.abs(y-h.y) < h.h/2+20) { ok=false; break; }
        }
        if (ok) break;
      }
      ENTITIES.push(makeEntity(t, x, y));
    }
  });

  // 車両
  for (let i = 0; i < spec.nTractor; i++) {
    const a = Math.random() * Math.PI*2;
    const r = FIELD_SIZE * 0.3;
    ENTITIES.push(makeEntity('tractor', Math.cos(a)*r, Math.sin(a)*r));
  }
  for (let i = 0; i < spec.nTruck; i++) {
    const a = Math.random() * Math.PI*2;
    const r = FIELD_SIZE * 0.3;
    ENTITIES.push(makeEntity('truck', Math.cos(a)*r, Math.sin(a)*r));
  }

  camX = dog.x; camY = dog.y;
  levelStartT = totalT;
}

function spawnWolf() {
  const a = Math.random() * Math.PI*2;
  const rEdge = forestRAt(a);
  const r = rEdge - 20;
  const x = Math.cos(a) * r, y = Math.sin(a) * r;
  const w = makeEntity('wolf', x, y);
  w.wanderAngle = Math.atan2(-y, -x);  // 中心向き
  ENTITIES.push(w);
}

// ============================================================
// BARK & ENDGAME
// ============================================================
function doBark() {
  if (!dog || barkCooldown > 0 || currentScene !== 'game') return;
  if (barkEffect < 0.15) return;
  barks.push({ x: dog.x, y: dog.y, life: 1.0, r: 20 });
  barkCooldown = 0.25;
  barkEffect = Math.max(0.1, barkEffect - 0.3);

  // 牧場主の近くで吠えた?
  if (FARMER) {
    const d = Math.hypot(FARMER.x - dog.x, FARMER.y - dog.y);
    if (d < FARMER_BARK_RANGE) {
      farmerNearBarks++;
      if (farmerNearBarks >= 3) {
        endGame();
      }
    }
  }
}

function endGame() {
  // 判定
  const spec = LEVEL_SPEC;
  const totalBy = {};
  const insideBy = {};
  spec.types.forEach(t => {
    const p = PARAMS[t].pen;
    totalBy[p] = (totalBy[p]||0) + spec.counts[t];
  });
  ENTITIES.forEach(e => {
    const p = PARAMS[e.type].pen;
    if (!p) return;
    insideBy[p] = insideBy[p] || 0;
    for (const pen of PENS) {
      if (pen.penType === p && inPen(pen, e.x, e.y)) {
        insideBy[p]++;
        break;
      }
    }
  });
  // ratio平均
  let sum = 0, n = 0;
  for (const p in totalBy) {
    sum += (insideBy[p]||0) / totalBy[p];
    n++;
  }
  const ach = n > 0 ? sum/n : 0;
  const success = ach >= spec.successRate;

  // 結果表示
  const clearT = totalT - levelStartT;
  GAME.prevAchievement = ach;
  GAME.prevTime = clearT;
  GAME._lastSuccess = success;

  document.getElementById('result-verdict').textContent = success ? 'せいこう！' : 'しっぱい…';
  document.getElementById('result-verdict').className = 'result-verdict ' + (success ? 'success' : 'fail');
  document.getElementById('result-sub').textContent =
    `達成率 ${Math.round(ach*100)}% / 目標 ${Math.round(spec.successRate*100)}%  ・ タイム ${clearT.toFixed(1)}秒`;

  const tbl = document.getElementById('result-table');
  tbl.innerHTML = '';
  for (const p in totalBy) {
    const tr = document.createElement('tr');
    const emoji = p==='sheep'?'🐑':p==='goose'?'🪿':p==='chicken'?'🐔':p==='cow'?'🐄':p==='pig'?'🐖':'?';
    tr.innerHTML = `<td>${emoji} ${p}</td><td>${insideBy[p]||0} / ${totalBy[p]}</td>`;
    tbl.appendChild(tr);
  }

  document.getElementById('result-next-btn').style.display = success ? '' : 'none';
  showScene('result');
}

function updateHUD() {
  if (currentScene !== 'game' || !LEVEL_SPEC) return;
  document.getElementById('hud-level').textContent = GAME.level;
  document.getElementById('hud-bark').textContent = Math.round(barkEffect*100) + '%';

  // ターゲット
  const totalBy = {}, insideBy = {};
  LEVEL_SPEC.types.forEach(t => {
    const p = PARAMS[t].pen;
    totalBy[p] = (totalBy[p]||0) + LEVEL_SPEC.counts[t];
  });
  ENTITIES.forEach(e => {
    const p = PARAMS[e.type].pen;
    if (!p) return;
    for (const pen of PENS) {
      if (pen.penType === p && inPen(pen, e.x, e.y)) {
        insideBy[p] = (insideBy[p]||0) + 1;
        break;
      }
    }
  });
  const t = document.getElementById('hud-targets');
  t.innerHTML = '';
  for (const p in totalBy) {
    const got = insideBy[p] || 0, need = totalBy[p];
    const emoji = p==='sheep'?'🐑':p==='goose'?'🪿':p==='chicken'?'🐔':p==='cow'?'🐄':p==='pig'?'🐖':'?';
    const full = got >= need;
    const row = document.createElement('div');
    row.className = 'target-row';
    row.innerHTML = `<span class="target-emoji">${emoji}</span>
      <span class="target-count ${full?'full':''}">${got}/${need}</span>`;
    t.appendChild(row);
  }

  // Farmer alert
  const alert = document.getElementById('farmer-alert');
  if (FARMER && dog) {
    const d = Math.hypot(FARMER.x - dog.x, FARMER.y - dog.y);
    if (d < FARMER_BARK_RANGE * 1.4) {
      alert.classList.add('visible');
      document.getElementById('farmer-bark-count').textContent = 3 - farmerNearBarks;
    } else {
      alert.classList.remove('visible');
    }
  } else {
    alert.classList.remove('visible');
  }
}

// RENDERING (ドット絵調)
// ============================================================
// スプライト: 2D文字列配列。各文字=パレット色キー or '.'=透明
// 1スプライトピクセル = PIXEL ワールド単位

function drawSprite(sprite, palette, cx, cy, angle, sc, flipX) {
  // スプライトをワールド座標 (cx,cy) に angle 回転で描画
  const [sx, sy] = w2s(cx, cy);
  const pxW = PIXEL * sc * wScale();
  const h = sprite.length, w = sprite[0].length;
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(angle);
  const ox = -w/2 * pxW, oy = -h/2 * pxW;
  for (let r = 0; r < h; r++) {
    const row = sprite[r];
    for (let c = 0; c < w; c++) {
      const ch = flipX ? row[w-1-c] : row[c];
      if (ch === '.' || ch === ' ') continue;
      const col = palette[ch];
      if (!col) continue;
      ctx.fillStyle = col;
      // 1px overlap で隙間防止
      ctx.fillRect(ox + c*pxW, oy + r*pxW, pxW + 1, pxW + 1);
    }
  }
  ctx.restore();
}

// ==== 動物描画 ====
function drawAnimal(e) {
  const ang = e.heading + Math.PI/2;  // top-down: heading→下向きなのでπ/2加算
  const sp = Math.hypot(e.vx, e.vy);
  const sc = e.size / 14;  // 基準サイズ=14
  const pal = {};
  let sprite = null;

  if (e.type === 'white_sheep') { sprite = SPRITE_SHEEP; Object.assign(pal, paletteForSheep('white')); }
  else if (e.type === 'black_sheep') { sprite = SPRITE_SHEEP; Object.assign(pal, paletteForSheep('black_sheep')); }
  else if (e.type === 'bh_sheep') { sprite = SPRITE_BH_SHEEP; Object.assign(pal, paletteForSheep('bh_sheep')); }
  else if (e.type === 'goose') {
    sprite = SPRITE_GOOSE;
    Object.assign(pal, { W: PALETTE.gooseBody, b: PALETTE.gooseDark, B: PALETTE.gooseBeak, y: PALETTE.gooseBeak, h: PALETTE.chickBeak });
  }
  else if (e.type === 'chicken') {
    sprite = SPRITE_CHICKEN;
    Object.assign(pal, { Y: PALETTE.chickBody, B: PALETTE.chickDark, R: PALETTE.chickComb, D: PALETTE.chickDark });
  }
  else if (e.type === 'cow') {
    sprite = SPRITE_COW;
    Object.assign(pal, { W: PALETTE.cowWhite, K: PALETTE.cowBlack, H: PALETTE.cowHorn, h: PALETTE.cowMuzzle });
  }
  else if (e.type === 'pig') {
    sprite = SPRITE_PIG;
    Object.assign(pal, { P: PALETTE.pink, p: PALETTE.pinkDark, K: PALETTE.pigEar });
  }
  else if (e.type === 'wolf') {
    sprite = SPRITE_WOLF;
    Object.assign(pal, { W: PALETTE.wolfBody, D: PALETTE.wolfDark, e: PALETTE.wolfDark, y: PALETTE.wolfEye, h: PALETTE.wolfDark, E: PALETTE.wolfDark });

  // 影
  const [sx, sy] = w2s(e.x, e.y);
  const shR = 10 * sc * wScale();
  ctx.fillStyle = 'rgba(0,0,0,0.25)';

  const sc = (custom.size === 's' ? 0.75 : custom.size === 'l' ? 1.3 : 1.0) * (e.size / 14);

// 犬スプライトを模様・耳から生成
function makeDogSprite(custom) {
  // 10x12 サイズで定義
  // 基本: 体=B, 影=S, 耳=S(立ち)/S(たれ)/S(まる), 目=K, 鼻=K
  let s = [
    '..EEEE....',  // 耳スロット
    '.EBBBBBE..',
    'EEBBBBBBEE',  // 頭
    'EBBKBBKBBE',  // 目
    'EBBBKKBBBE',  // 鼻
    '.BBBBBBBB.',
    'BBBBBBBBBB',  // 胴
    'BBBBBBBBBB',
    'BBBBBBBBBB',
    '.BSSSSSSB.',  // 胴後
    '..BBBBBB..',
    '...BttB...',  // しっぽ
  ];

  // 耳: E 文字を置換
  if (custom.ear === 'floppy') {
    // 頭の横に垂れる
    s = [...s];
    s[0] = '.SS....SS.';
    s[1] = '.SBBBBBBS.';
    s[2] = 'SSBBBBBBSS';
  } else if (custom.ear === 'pointy') {
    // 頭の上に尖って立つ
    s = [...s];
    s[0] = 'S........S';
    s[1] = 'SS.BBBB.SS';
    s[2] = 'SSBBBBBBSS';
  } else {  // round
    s = [...s];
    s[0] = '.SS....SS.';
    s[1] = 'SSSBBBBSSS';
    s[2] = 'SSBBBBBBSS';
  }

  // 模様: 胴 (行6-8) を置換
  if (custom.pattern === 'spot') {
    s[6] = 'BBSBBBBSBB';
    s[7] = 'BBSSBBSSBB';
    s[8] = 'BBBSBBSBBB';
  } else if (custom.pattern === 'belt') {
    s[7] = 'SSSSSSSSSS';
  } else if (custom.pattern === 'stripe') {
    s[6] = 'BBSBBSBSBB';
    s[7] = 'BSBSBBSBSB';
    s[8] = 'BBSBBSBSBB';
  }

  return s;
}

function shadeColor(hex, f) {
  const m = hex.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  if (!m) return hex;
  const r = parseInt(m[1], 16), g = parseInt(m[2], 16), b = parseInt(m[3], 16);
  const nr = clamp(Math.round(r*f), 0, 255);
  const ng = clamp(Math.round(g*f), 0, 255);
  const nb = clamp(Math.round(b*f), 0, 255);
  return '#' + nr.toString(16).padStart(2,'0') + ng.toString(16).padStart(2,'0') + nb.toString(16).padStart(2,'0');
}

// ==== 背景・地形 ====
function drawGround() {
  // 草地タイル
  const pxW = PIXEL * wScale();
  const tileW = 48 * wScale();
  const startX = Math.floor((camX - VIEW_W/2) / 48) * 48;
  const endX = camX + VIEW_W/2 + 48;
  const startY = Math.floor((camY - CH/(CW/VIEW_W)/2) / 48) * 48;
  const endY = camY + CH/(CW/VIEW_W)/2 + 48;
  for (let wy = startY; wy < endY; wy += 48) {
    for (let wx = startX; wx < endX; wx += 48) {
      // チェッカー風に2色
      const checker = ((Math.floor(wx/48) + Math.floor(wy/48)) & 1);
      ctx.fillStyle = checker ? PALETTE.grass1 : PALETTE.grass2;
      const [sx, sy] = w2s(wx, wy);
      ctx.fillRect(Math.floor(sx), Math.floor(sy), Math.ceil(tileW)+1, Math.ceil(tileW)+1);
    }
  }
}

function drawForest() {
  // 森: 外周を埋める (ポリゴン)
  ctx.fillStyle = PALETTE.forest1;
  ctx.beginPath();
  const [s0x, s0y] = w2s(-CW, -CH);
  const [s1x, s1y] = w2s(CW*2, CH*2);
  // 画面全体を塗ってから内側をくり抜く
  ctx.save();
  ctx.fillStyle = PALETTE.forest1;
  ctx.fillRect(0, 0, CW, CH);
  // 内側 (フィールド) を切り抜き
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  for (let i = 0; i <= FOREST_POINTS; i++) {
    const a = (i % FOREST_POINTS) / FOREST_POINTS * Math.PI * 2;
    const r = FOREST_R[i % FOREST_POINTS];
    const [sx, sy] = w2s(Math.cos(a)*r, Math.sin(a)*r);
    if (i === 0) ctx.moveTo(sx, sy);
    else ctx.lineTo(sx, sy);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // 森の内側輪郭に木のシルエット
  ctx.save();
  ctx.fillStyle = PALETTE.forest2;
  for (let i = 0; i < FOREST_POINTS; i += 2) {
    const a = i / FOREST_POINTS * Math.PI * 2;
    const r = FOREST_R[i] - 8;
    const x = Math.cos(a) * r, y = Math.sin(a) * r;
    if (!isVisible(x, y, 40)) continue;
    const [sx, sy] = w2s(x, y);
    const rr = 10 * wScale();
    ctx.beginPath();
    ctx.arc(sx, sy, rr, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawPonds() {
  PONDS.forEach(p => {
    if (!isVisible(p.x, p.y, p.r + 20)) return;
    const [sx, sy] = w2s(p.x, p.y);
    const r = p.r * wScale();
    ctx.fillStyle = PALETTE.pondDeep;
    ctx.beginPath(); ctx.ellipse(sx, sy, r, r*0.7, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = PALETTE.pond;
    ctx.beginPath(); ctx.ellipse(sx, sy, r*0.85, r*0.58, 0, 0, Math.PI*2); ctx.fill();
    // 波紋
    ctx.strokeStyle = PALETTE.pondLight;
    ctx.lineWidth = 1.5;
    const wv = (Math.sin(totalT*1.5) + 1) * 0.15;
    ctx.beginPath();
    ctx.ellipse(sx, sy, r*(0.45 + wv), r*(0.3 + wv), 0, 0, Math.PI*2);
    ctx.stroke();
  });
}

function drawTrees() {
  TREES.forEach(t => {
    if (!isVisible(t.x, t.y, t.r + 20)) return;
    const pal = { L: PALETTE.treeLeaf, M: PALETTE.treeLeafHi, T: PALETTE.treeTrunk };
    const sprite = t.variant === 'tall' ? SPRITE_TREE_TALL : SPRITE_TREE;
    // 影
    const [sx, sy] = w2s(t.x, t.y);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(sx, sy + t.r*wScale()*0.3, t.r*wScale()*0.9, t.r*wScale()*0.35, 0, 0, Math.PI*2);
    ctx.fill();
    drawSprite(sprite, pal, t.x, t.y, 0, t.r/14, false);
  });
}

function drawHuts() {
  HUTS.forEach(h => {
    if (!isVisible(h.x, h.y, Math.max(h.w, h.h) + 20)) return;
    const pal = { R: PALETTE.hutRoof, W: PALETTE.hutWall, d: PALETTE.hutDoor };
    const sprite = h.style === 'house' ? SPRITE_HOUSE : SPRITE_HUT;
    // 影
    const [sx, sy] = w2s(h.x, h.y);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(sx - h.w/2*wScale() + 4, sy - h.h/2*wScale() + 4, h.w*wScale(), h.h*wScale());
    const sc = Math.max(h.w, h.h) / 40;
    drawSprite(sprite, pal, h.x, h.y, h.rot, sc, false);
  });
}

function drawPens() {
  PENS.forEach(pen => {
    if (!isVisible(pen.cx, pen.cy, pen.size + 40)) return;
    // 内側の地面 (ダート色)
    const [cx, cy] = w2s(pen.cx, pen.cy);
    const ps = pen.size * wScale();
    ctx.fillStyle = PALETTE.pen;
    ctx.fillRect(cx - ps, cy - ps, ps*2, ps*2);
    // ドット風の地面模様
    ctx.fillStyle = PALETTE.dirt2;
    const pxW = 6 * wScale();
    for (let dx = -ps; dx < ps; dx += pxW*3) {
      for (let dy = -ps; dy < ps; dy += pxW*3) {
        if ((Math.floor(dx + dy) % 5) === 0) {
          ctx.fillRect(cx + dx, cy + dy, pxW, pxW);
        }
      }
    }

    // 柵 (pixel-style: wooden posts + rails)
    const walls = penWalls(pen);
    walls.forEach(w => drawFenceSegment(w.x1, w.y1, w.x2, w.y2));

    // 中央の看板
    const signW = 40, signH = 30;
    ctx.fillStyle = PALETTE.signDark;
    ctx.fillRect(cx - 2, cy - signH/2*wScale(), 4, signH*wScale());  // ポール
    ctx.fillStyle = PALETTE.sign;
    ctx.fillRect(cx - signW/2*wScale(), cy - (signH-4)/2*wScale(), signW*wScale(), (signH-16)*wScale());
    // 絵文字 (emoji)
    ctx.fillStyle = '#2a1a10';
    ctx.font = `${Math.round(22*wScale())}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const emoji = pen.penType==='sheep'?'🐑':pen.penType==='goose'?'🪿':pen.penType==='chicken'?'🐔':pen.penType==='cow'?'🐄':pen.penType==='pig'?'🐖':'?';
    ctx.fillText(emoji, cx, cy - 2*wScale());
  });
}

function drawFenceSegment(x1, y1, x2, y2) {
  const [s1x, s1y] = w2s(x1, y1);
  const [s2x, s2y] = w2s(x2, y2);
  const dx = s2x - s1x, dy = s2y - s1y;
  const len = Math.hypot(dx, dy);
  const postSpacing = 22 * wScale();
  const nPosts = Math.max(2, Math.ceil(len / postSpacing));
  // レール (2本)
  ctx.strokeStyle = PALETTE.penWood;
  ctx.lineWidth = Math.max(2, 4 * wScale());
  ctx.lineCap = 'butt';
  const nx = -dy/len, ny = dx/len;
  for (const off of [-5, 5]) {
    ctx.beginPath();
    ctx.moveTo(s1x + nx*off*wScale(), s1y + ny*off*wScale());
    ctx.lineTo(s2x + nx*off*wScale(), s2y + ny*off*wScale());
    ctx.stroke();
  }
  // ポスト
  ctx.fillStyle = PALETTE.penPost;
  for (let i = 0; i <= nPosts; i++) {
    const t = i / nPosts;
    const px = s1x + dx*t, py = s1y + dy*t;
    const w = Math.max(3, 5*wScale());
    ctx.fillRect(px - w/2, py - w*1.6, w, w*3);
  }
}

function drawFarmer() {
  if (!FARMER) return;
  if (!isVisible(FARMER.x, FARMER.y, 40)) return;
  const pal = {
    H: PALETTE.farmerHat, h: PALETTE.farmerSkin,
    S: PALETTE.farmerShirt, P: PALETTE.farmerPants,
  };
  // 影
  const [sx, sy] = w2s(FARMER.x, FARMER.y);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + 10*wScale(), 12*wScale(), 4*wScale(), 0, 0, Math.PI*2);
  ctx.fill();
  drawSprite(SPRITE_FARMER, pal, FARMER.x, FARMER.y, 0, 1.2, false);

  // 警告リング
  if (farmerNearBarks > 0 && farmerNearBarks < 3) {
    const r = FARMER_BARK_RANGE * wScale();
    ctx.strokeStyle = `rgba(216, 96, 72, ${0.4 + Math.sin(totalT*3)*0.3})`;
    ctx.lineWidth = 3;
    ctx.setLineDash([10, 8]);
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    // カウンター
    ctx.fillStyle = 'rgba(216, 96, 72, 0.9)';
    const msg = `あと ${3 - farmerNearBarks} 回`;
    ctx.font = `bold ${Math.round(14*wScale())}px sans-serif`;
    ctx.textAlign = 'center';
    const w = ctx.measureText(msg).width + 16;
    ctx.fillRect(sx - w/2, sy - 44*wScale(), w, 20*wScale());
    ctx.fillStyle = 'white';
    ctx.fillText(msg, sx, sy - 30*wScale());
  }
}

function drawBarks() {
  barks.forEach(b => {
    const [sx, sy] = w2s(b.x, b.y);
    const r = b.r * wScale();
    ctx.strokeStyle = `rgba(255, 232, 128, ${b.life})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = `rgba(255, 232, 128, ${b.life*0.5})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(sx, sy, r*0.6, 0, Math.PI*2); ctx.stroke();
  });
}

function drawOffscreenMarkers() {
  if (!dog) return;
  const cx = CW/2, cy = CH/2;
  const margin = 44;
  function marker(tx, ty, color, label) {
    const [sx, sy] = w2s(tx, ty);
    if (sx > margin && sx < CW-margin && sy > margin && sy < CH-margin) return;
    const dx = sx - cx, dy = sy - cy;
    const a = Math.atan2(dy, dx);
    const mx = cx + Math.cos(a) * Math.min((CW/2-margin)/Math.abs(Math.cos(a)||0.001), (CH/2-margin)/Math.abs(Math.sin(a)||0.001));
    const my = cy + Math.sin(a) * Math.min((CW/2-margin)/Math.abs(Math.cos(a)||0.001), (CH/2-margin)/Math.abs(Math.sin(a)||0.001));
    ctx.save();
    ctx.translate(mx, my);
    ctx.rotate(a);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(12, 0); ctx.lineTo(-8, -8); ctx.lineTo(-5, 0); ctx.lineTo(-8, 8);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    if (label) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(mx-14, my+12, 28, 14);
      ctx.fillStyle = color;
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(label, mx, my+22);
    }
  }
  PENS.forEach(p => {
    const emoji = p.penType==='sheep'?'🐑':p.penType==='goose'?'🪿':p.penType==='chicken'?'🐔':p.penType==='cow'?'🐄':p.penType==='pig'?'🐖':'?';
    marker(p.cx, p.cy, '#ffe680', emoji);
  });
  if (FARMER) marker(FARMER.x, FARMER.y, '#ff8070', '👨‍🌾');
  ENTITIES.forEach(e => { if (e.type === 'wolf') marker(e.x, e.y, '#ff6060', '🐺'); });
}

function drawAll() {
  if (!dog) return;
  // カメラ追従
  camX += (dog.x - camX) * 0.15;
  camY += (dog.y - camY) * 0.15;

  ctx.clearRect(0, 0, CW, CH);
  drawGround();
  drawForest();
  drawPonds();
  drawTrees();
  drawHuts();
  drawPens();
  drawFarmer();

  // エンティティ (y順)
  const sorted = ENTITIES.slice().sort((a, b) => a.y - b.y);
  sorted.forEach(e => {
    if (!isVisible(e.x, e.y, 60)) return;
    if (e.type === 'dog') drawDog(e, DOG_CUSTOM);
    else if (e.type === 'tractor') drawTractor(e);
    else if (e.type === 'truck') drawTruck(e);
    else drawAnimal(e);
  });

  drawBarks();
  drawOffscreenMarkers();
}

// INPUT
// ============================================================
function getInputVector() {
  let ix = 0, iy = 0;
  if (joyActive) {
    ix = joyX; iy = joyY;
  } else {
    if (keys['w'] || keys['arrowup']) iy -= 1;
    if (keys['s'] || keys['arrowdown']) iy += 1;
    if (keys['a'] || keys['arrowleft']) ix -= 1;
    if (keys['d'] || keys['arrowright']) ix += 1;
    const m = Math.hypot(ix, iy);
    if (m > 1) { ix /= m; iy /= m; }
  }
  return [ix, iy];
}

function setupInput() {
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    keys[k] = true;
    if ((k === ' ' || k === 'b') && currentScene === 'game') {
      doBark();
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
  });

  // ジョイスティック (固定位置)
  const zone = document.getElementById('joystick');
  const knob = document.getElementById('joystick-knob');
  const maxD = 40;
  let touchId = null;
  let centerX = 0, centerY = 0;

  function resetKnob() {
    knob.style.transform = '';
    joyX = joyY = 0;
    joyActive = false;
    zone.classList.remove('active');
    touchId = null;
  }

  function handleStart(e, clientX, clientY) {
    const r = zone.getBoundingClientRect();
    centerX = r.left + r.width/2;
    centerY = r.top + r.height/2;
    joyActive = true;
    zone.classList.add('active');
    updateKnob(clientX, clientY);
  }

  function updateKnob(clientX, clientY) {
    const dx = clientX - centerX;
    const dy = clientY - centerY;
    const d = Math.hypot(dx, dy);
    const a = Math.atan2(dy, dx);
    const clamped = Math.min(d, maxD);
    const kx = Math.cos(a) * clamped, ky = Math.sin(a) * clamped;
    knob.style.transform = `translate(${kx}px, ${ky}px)`;
    joyX = Math.cos(a) * (clamped / maxD);
    joyY = Math.sin(a) * (clamped / maxD);
  }

  zone.addEventListener('touchstart', e => {
    const t = e.changedTouches[0];
    touchId = t.identifier;
    handleStart(e, t.clientX, t.clientY);
    e.preventDefault();
  }, { passive: false });
  zone.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === touchId) {
        updateKnob(t.clientX, t.clientY);
        break;
      }
    }
    e.preventDefault();
  }, { passive: false });
  zone.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === touchId) { resetKnob(); break; }
    }
  });
  zone.addEventListener('touchcancel', resetKnob);
  // マウスでもジョイスティック操作できるように (デバッグ用)
  zone.addEventListener('mousedown', e => {
    handleStart(e, e.clientX, e.clientY);
    const mv = ev => updateKnob(ev.clientX, ev.clientY);
    const up = () => {
      resetKnob();
      window.removeEventListener('mousemove', mv);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', mv);
    window.addEventListener('mouseup', up);
    e.preventDefault();
  });

  // 吠えボタン
  const barkBtn = document.getElementById('bark-btn');
  const bark = (e) => { e.preventDefault(); doBark(); };
  barkBtn.addEventListener('click', bark);
  barkBtn.addEventListener('touchstart', bark, { passive: false });
}

// ============================================================
// MAIN LOOP
// ============================================================
function loop(ts) {
  if (!lastTs) lastTs = ts;
  let dt = (ts - lastTs) / 1000;
  if (dt > 0.1) dt = 0.1;
  lastTs = ts;
  totalT += dt;

  // 吠え関係の更新
  if (barkCooldown > 0) barkCooldown = Math.max(0, barkCooldown - dt);
  barkEffect = Math.min(1.0, barkEffect + dt * 0.2);
  barks.forEach(b => { b.life -= dt * 1.6; b.r += dt * 380; });
  barks = barks.filter(b => b.life > 0);

  if (currentScene === 'game' && dog) {
    const [ix, iy] = getInputVector();
    updateDog(dt, ix, iy);
    ENTITIES = ENTITIES.filter(e => !e._remove);
    for (const e of ENTITIES) {
      if (e.type === 'dog') continue;
      updateEntity(e, dt);
    }
    // 狼スポーン
    if (LEVEL_SPEC && totalT >= GAME.nextWolfSpawn) {
      const active = ENTITIES.filter(e => e.type === 'wolf').length;
      if (active < LEVEL_SPEC.wolfMaxConcurrent) spawnWolf();
      GAME.nextWolfSpawn = totalT + LEVEL_SPEC.wolfInterval * (0.7 + Math.random()*0.6);
    }
    updateHUD();
    drawAll();
  }

  // 待機画面: プレビュー更新
  if (currentScene === 'waiting') {
    drawDogPreview();
  }

  requestAnimationFrame(loop);
}

// プレビュー描画 (DOM canvas に drawDog と同じロジックで)
function drawDogPreview() {
  const cvs = document.getElementById('dog-preview-canvas');
  const pctx = cvs.getContext('2d');
  pctx.imageSmoothingEnabled = false;
  // 背景
  pctx.fillStyle = '#2a4a28';
  pctx.fillRect(0, 0, cvs.width, cvs.height);
  // 芝テクスチャ
  pctx.fillStyle = '#3a5a38';
  for (let y = 0; y < cvs.height; y += 8) {
    for (let x = 0; x < cvs.width; x += 8) {
      if (((x/8 + y/8) & 1) === 0) pctx.fillRect(x, y, 8, 8);
    }
  }

  // 犬を描画 (カスタムを反映)
  const custom = DOG_CUSTOM;
  const sc = (custom.size === 's' ? 0.75 : custom.size === 'l' ? 1.3 : 1.0);
  const pal = {
    B: custom.color, S: shadeColor(custom.color, 0.65),
    D: shadeColor(custom.color, 0.4), L: shadeColor(custom.color, 1.15),
    K: '#1a0a0a', W: '#f8f4e8', R: '#f8a0a0', t: '#c84848',
  };
  const sprite = makeDogSprite(custom);
  const h = sprite.length, w = sprite[0].length;
  const pxSize = 7 * sc;  // プレビューでの1ピクセルサイズ
  const cx = cvs.width / 2 - w/2 * pxSize;
  const cy = cvs.height / 2 - h/2 * pxSize;
  // 影
  pctx.fillStyle = 'rgba(0,0,0,0.3)';
  pctx.beginPath();
  pctx.ellipse(cvs.width/2, cvs.height/2 + h/2*pxSize + 4, w/2*pxSize*0.7, 5, 0, 0, Math.PI*2);
  pctx.fill();
  // スプライト
  for (let r = 0; r < h; r++) {
    for (let c = 0; c < w; c++) {
      const ch = sprite[r][c];
      if (ch === '.' || !pal[ch]) continue;
      pctx.fillStyle = pal[ch];
      pctx.fillRect(Math.floor(cx + c*pxSize), Math.floor(cy + r*pxSize),
                    Math.ceil(pxSize), Math.ceil(pxSize));
    }
  }
}

const DBG_LABELS = {
  white_sheep:'白羊', black_sheep:'黒羊', bh_sheep:'頭黒羊',
  goose:'ガチョウ', chicken:'鶏', cow:'牛', pig:'豚',
  wolf:'狼', dog:'犬', tractor:'トラクター', truck:'トラック',
  farmer:'牧場主', sheep:'羊群',
};

function openDebug() {
  renderDbgTabs();
  renderDbgBody(currentDbgTab);

}

function renderDbgTabs() {
  const tabs = document.getElementById('debug-tabs');
  tabs.innerHTML = '';
  Object.keys(PARAMS).forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'dbg-tab' + (k === currentDbgTab ? ' active' : '');
    btn.textContent = DBG_LABELS[k] || k;
    btn.addEventListener('click', () => {
      currentDbgTab = k;
      renderDbgTabs();
      renderDbgBody(k);
    });
    tabs.appendChild(btn);
  });
}

function renderDbgBody(t) {
  const p = PARAMS[t];
  const body = document.getElementById('debug-body');
  body.innerHTML = '';

  // 基本パラメータ
  const basic = document.createElement('div');
  basic.className = 'dbg-section';
  basic.innerHTML = `<h3>${DBG_LABELS[t]} — 基本パラメータ</h3>`;
  const btbl = mkTable(['項目','min','max']);
  ['maxSpeed','maxForce','inertia','size','turnRate','wander','wanderTurn','goalAttract','goalR','waterSlow','baseSpeed'].forEach(k => {
    if (p[k] === undefined) return;
    const row = btbl.insertRow();
    row.insertCell().textContent = k;
    if (Array.isArray(p[k])) {
      addInput(row, p[k], 0, v => p[k][0] = v);
      addInput(row, p[k], 1, v => p[k][1] = v);
    } else {
      addInput(row, [p[k]], 0, v => p[k] = v);
      row.insertCell().textContent = '-';
    }
  });
  basic.appendChild(btbl);
  body.appendChild(basic);

  // 他移動体への反応
  if (p.react) {
    const rs = document.createElement('div');
    rs.className = 'dbg-section';
    rs.innerHTML = `<h3>他の移動体への反応</h3>
      <div class="dbg-note">
        apS/apR: 相対速度 (接近) への反応 [強度, 範囲]<br>
        prS/prR: 距離への反応 [強度, 範囲] (負=引力)<br>
        flock/flockR: 群れ引力 | sep/sepR: 個体分離
      </div>`;
    Object.entries(p.react).forEach(([grp, rc]) => {
      const sub = document.createElement('div');
      sub.className = 'dbg-react-group';
      sub.innerHTML = `<h4>→ ${DBG_LABELS[grp] || grp}</h4>`;
      const tbl = mkTable(['項目','min','max']);
      ['apS','apR','prS','prR','flock','flockR','sep','sepR'].forEach(k => {
        if (rc[k] === undefined) return;
        const row = tbl.insertRow();
        row.insertCell().textContent = k;
        if (Array.isArray(rc[k])) {
          addInput(row, rc[k], 0, v => rc[k][0] = v);
          addInput(row, rc[k], 1, v => rc[k][1] = v);
        } else {
          addInput(row, [rc[k]], 0, v => rc[k] = v);
          row.insertCell().textContent = '-';
        }
      });
      sub.appendChild(tbl);
      rs.appendChild(sub);
    });
    body.appendChild(rs);
  }

  // 環境への反応
  const env = document.createElement('div');
  env.className = 'dbg-section';
  env.innerHTML = `<h3>環境への反応</h3>`;
  const etbl = mkTable(['項目','min','max']);
  ['tree','hut','fence','pond','forest'].forEach(k => {
    if (!p[k]) return;
    ['str','range'].forEach(key => {
      const v = p[k][key];
      if (!v) return;
      const row = etbl.insertRow();
      row.insertCell().textContent = `${k}.${key}`;
      if (Array.isArray(v)) {
        addInput(row, v, 0, x => v[0] = x);
        addInput(row, v, 1, x => v[1] = x);
      }
    });
  });
  env.appendChild(etbl);
  body.appendChild(env);
}

function mkTable(headers) {
  const t = document.createElement('table');
  t.className = 'dbg-table';
  const hr = t.insertRow();
  headers.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    hr.appendChild(th);
  });
  return t;
}

function addInput(row, arr, idx, onChange) {
  const td = row.insertCell();
  const inp = document.createElement('input');
  inp.type = 'number';
  inp.step = '0.01';
  inp.value = arr[idx];
  inp.addEventListener('change', () => {
    const v = parseFloat(inp.value);
    if (!isNaN(v)) onChange(v);
  });
  td.appendChild(inp);
}

function setupDebug() {
  document.getElementById('dbg-close').addEventListener('click', () => {
    showScene(GAME._returnScene || 'menu');
  });
  document.getElementById('dbg-load-default').addEventListener('click', () => {
    if (!confirm('初期値に戻しますか？')) return;
    Object.keys(PARAMS).forEach(k => delete PARAMS[k]);
    Object.assign(PARAMS, JSON.parse(JSON.stringify(DEFAULT_PARAMS)));
    resolveParams(PARAMS);
    renderDbgBody(currentDbgTab);
  });
  document.getElementById('dbg-save-json').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(PARAMS, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'dogdoggo_params.json';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 500);
  });
  document.getElementById('dbg-load-json').addEventListener('click', () => {
    document.getElementById('dbg-load-file').click();
  });
  document.getElementById('dbg-load-file').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(reader.result);
        Object.keys(PARAMS).forEach(k => delete PARAMS[k]);
        Object.assign(PARAMS, obj);
        resolveParams(PARAMS);
        renderDbgBody(currentDbgTab);
        alert('読込完了');
      } catch (err) {
        alert('JSONの解析に失敗: ' + err.message);
      }
    };
    reader.readAsText(f);
    e.target.value = '';
  });
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  resize();
  setupMenu();
  setupWaiting();
  setupResult();
  setupDebug();
  setupInput();
  showScene('menu');
  requestAnimationFrame(loop);
});

</script>
